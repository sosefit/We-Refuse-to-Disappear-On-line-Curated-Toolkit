/* ── Header ─────────────────────────────────────────────── */
.hdr{background:var(--subj-bg);padding:2rem 2.5rem 0;transition:background .25s}
.hdr-eyebrow{font-family:'Courier New',monospace;font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:#fff;margin-bottom:.4rem}
.hdr h1{font-family:Georgia,serif;font-size:26px;font-weight:600;color:#fff}

/* ── Subject nav ─────────────────────────────────────────── */
.subject-nav{display:flex;gap:0;background:var(--subj-nav-bg);border-top:1px solid var(--subj-border);border-bottom:1px solid var(--subj-border);overflow-x:auto;transition:background .25s}
.snav-btn{font-family:'Courier New',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:9px 18px;background:transparent;border:none;border-right:1px solid var(--subj-border);color:rgba(255,255,255,.65);cursor:pointer;transition:all .15s;white-space:nowrap;display:inline-block;line-height:1;text-decoration:none}
.snav-btn:last-child{border-right:none}
.snav-btn:hover{background:var(--subj-border);color:#fff}
.snav-btn.active{color:#fff;background:var(--subj-active);font-weight:700}
.snav-home{border-right:2px solid var(--subj-home-sep)!important;margin-right:4px;text-decoration:none}

/* ── Grade tabs ──────────────────────────────────────────── */
.grade-tabs{display:flex;gap:0;border-top:1px solid var(--grade-accent);margin-top:.5rem;overflow-x:auto}
.gtab{font-family:'Courier New',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:12px 20px;background:transparent;border:none;border-right:1px solid var(--subj-border);color:#fff;cursor:pointer;transition:all .15s;position:relative;white-space:nowrap}
.gtab:last-child{border-right:none}
.gtab:hover{background:var(--grade-accent);color:var(--grade-active-text)}
.gtab.active{color:var(--grade-active-text);background:var(--grade-accent)}
.gtab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--grade-active-text)}

/* ── Layout ──────────────────────────────────────────────── */
.layout{display:flex;min-height:calc(100vh - 160px)}
.sidebar{width:210px;flex-shrink:0;background:#fff;border-right:1px solid #e5e3de;padding:1.5rem 0;position:sticky;top:0;height:calc(100vh - 160px);overflow-y:auto}
.sb-label{font-family:'Courier New',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#aaa;padding:0 1.25rem;margin-bottom:.6rem;display:block}
.sb-btn{display:block;width:100%;text-align:left;padding:7px 1.25rem 7px 1rem;font-size:12px;color:#666;background:transparent;border:none;border-left:3px solid transparent;cursor:pointer;line-height:1.4;transition:all .12s}
.sb-btn:hover{background:#f7f6f3;color:#1c1c1a;border-left-color:#ccc}
.sb-btn.active{color:var(--sb-active-text);font-weight:500;background:var(--sb-active-bg);border-left-color:var(--sb-active-border)}
.sb-all{margin-top:1rem;font-style:italic;font-size:11px;color:#aaa}
.content{flex:1;padding:2rem 2.5rem 3rem;max-width:900px}
.content-hdr{margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #e5e3de}
.content-hdr h2{font-family:Georgia,serif;font-size:20px;font-weight:600;color:#1c1c1a;margin-bottom:3px}
.content-hdr p{font-size:12px;color:#999}
.cat-block{margin-bottom:2.25rem}
.cat-title{font-family:'Courier New',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#444;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid #ece9e3}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.card{background:#fff;border:1px solid #e5e3de;border-top:3px solid var(--card-top);border-radius:0 0 8px 8px;padding:14px 16px;display:flex;flex-direction:column;gap:5px;transition:border-top-color .25s}
.card:hover{border-color:#c8dff5;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.card-type{font-family:'Courier New',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--card-top)}
.card-name{font-family:Georgia,serif;font-size:13px;font-weight:700;line-height:1.45;color:#0D1B2A}
.card-meta{font-size:11.5px;color:#444;font-style:normal;line-height:1.5}
.card-desc{font-size:12px;color:#333;line-height:1.6;flex:1}
.card-link{font-family:'Courier New',monospace;font-size:10px;font-weight:700;color:var(--link-color);text-decoration:none;margin-top:5px;display:inline-flex;align-items:center;gap:3px}
.card-link:hover{color:var(--link-hover);text-decoration:underline}

/* ── Search ──────────────────────────────────────────────── */
.search-bar{background:var(--search-bg);padding:10px 2.5rem;display:flex;align-items:center;gap:10px;border-top:1px solid var(--search-border);transition:background .25s}
.search-wrap{position:relative;flex:1;max-width:560px}
.search-input{width:100%;padding:8px 12px 8px 36px;border:1px solid var(--search-border);border-radius:6px;background:var(--search-input-bg);color:#fff;font-family:'Courier New',monospace;font-size:12px;outline:none}
.search-input::placeholder{color:rgba(255,255,255,.45)}
.search-input:focus{border-color:var(--search-focus);background:rgba(0,0,0,.3)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.5);font-size:14px;pointer-events:none}
.search-clear{background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;font-size:18px;padding:0 2px;line-height:1;display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%)}
.search-clear.visible{display:block}
.search-count{font-family:'Courier New',monospace;font-size:11px;color:rgba(255,255,255,.6);white-space:nowrap;min-width:90px}
.search-grade-tag{font-family:'Courier New',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--grade-accent);margin-bottom:2px}
.no-results{padding:3rem 0;font-size:14px;color:#aaa;font-style:italic;text-align:center}
mark{background:#fff3cd;color:#0D1B2A;border-radius:2px;padding:0 1px}

footer{background:#0D1B2A;padding:1.5rem 2.5rem}
footer p{font-family:'Courier New',monospace;font-size:11px;color:#4a6a8a;letter-spacing:.05em}

@media(max-width:680px){
  .sidebar{display:none}
  .hdr{padding:1.25rem 1rem 0}
  .content{padding:1.25rem 1rem 2rem}
  .grade-tabs{overflow-x:auto}
  .gtab{padding:10px 14px}
  .search-bar{padding:10px 1rem}
}
</style>

sia Mickle Moldavan. \"The Food Drive Task: Problem Solving for Social Justice in the Elementary Grades.\" Ohio Journal of School Mathematics, vol. 95, 2023, pp. 1–9.", "desc": "Standards-based math lesson rooted in food insecurity and equity, directly modeled for K–2 but adaptable for K–6 settings seeking justice-centered approaches.", "url": "https://ohiomathjournal.org/article/id/4184/"}, {"name": "The Trans Generation: How Trans Kids (and Their Parents) Are Creating a Gender Revolution", "meta": "Travers, Ann. The Trans Generation: How Trans Kids (and Their Parents) Are Creating a Gender Revolution. New York University Press, 2018.", "desc": "Research-grounded narratives based on interviews with trans children ages 4–20 and their parents in the US and Canada, helping elementary educators understand and support trans and gender-diverse children and their families in K–5 settings.", "url": "https://nyupress.org/9781479885794/the-trans-generation/"}, {"name": "Implementing LGBTQ+ Curriculum in Early Education Classrooms", "meta": "Walker, Mahri. Implementing LGBTQ+ Curriculum in Early Education Classrooms. Capstone Project, California State University, Monterey Bay, 2021.", "desc": "A capstone project exploring elementary-school contexts and how age-appropriate discussions of family diversity, gender expression, and identity are implemented in early education settings.", "url": "https://digitalcommons.csumb.edu/caps_thes_all/"}, {"name": "Intersex Awareness and Education: What Part Can Health and Physical Education Bodies of Learning and Teaching Play?", "meta": "Zavros-Orr, Agli, Annette Brömdal, Kirstine Hand, and Bonnie Harte. \"Intersex Awareness and Education: What Part Can Health and Physical Education Bodies of Learning and Teaching Play?\" Sport, Education and Society, vol. 28, no. 9, 2023, pp. 1047–1067.", "desc": "Presents a strategic framework for including intersex and gender-diverse bodies in Health and Physical Education curricula, drawing on a narrative inquiry with pre-service HPE teacher education students — a crucial resource for educators committed to intersectional and body-diversity affirming practice.", "url": "https://www.tandfonline.com/doi/full/10.1080/13573322.2022.2115477"}], "News Articles & Substacks": [{"name": "At This Soon-to-be Brooklyn School, the Future Is Trans", "meta": "Chaltain, Sam. \"At This Soon-to-be Brooklyn School, the Future Is Trans.\" Letters from the Future (of Learning), Substack, 3 May 2023, samchaltain.substack.com/p/at-this-soon-to-be-brooklyn-school.", "desc": "Profiles Trans formative Schools (TfS), a Brooklyn school centered on trans students, educators, and families, grounded in social justice and affirming pedagogy.", "url": "https://samchaltain.substack.com/p/at-this-soon-to-be-brooklyn-school"}, {"name": "On Teachers Letting Kids Transition Gender While Keeping It a Secret From Their Parents", "meta": "Singal, Jesse. \"On Teachers Letting Kids Transition Gender While Keeping It a Secret From Their Parents.\" Singal-Minded, Substack, 23 Jan. 2023, jessesingal.substack.com/p/on-teachers-letting-kids-transition.", "desc": "Analyzes school district policies that allow students to socially transition at school without parental notification, examining the ethical and psychological dimensions educators face when a student's gender identity at school differs from what is known at home.", "url": "https://jessesingal.substack.com/p/on-teachers-letting-kids-transition"}, {"name": "Washington Blade", "meta": "Washington Blade. Brown Naff Pitts Omnimedia, www.washingtonblade.com.", "desc": "The oldest LGBTQ+ newspaper in the United States, founded in 1969. Covers LGBTQ+ politics, rights, and community news nationally and internationally.", "url": "https://www.washingtonblade.com/"}], "Policy Reports": [{"name": "Model Local Education Agency Policy on Transgender and Nonbinary Students (Glisten and NCTE, 2020)", "meta": "Glisten and National Center for Transgender Equality. Model olicy Trackers": [{"name": "Education Law Center. \"Making the Grade: How Fair Is School Funding in Your State?\"", "meta": "Education Law Center. \"Making the Grade: How Fair Is School Funding in Your State?\" Education Law Center, edlawcenter.org/research/making-the-grade/. Accessed 3 May 2026.", "desc": "Annual report by the Education Law Center grading all 50 states on school funding equity, adequacy, and effort. Provides state-level data to inform advocates, policymakers, and community leaders working to improve public school funding and resource equity, with particular attention to underserved student populations.", "url": "https://edlawcenter.org/research/making-the-grade/"}, {"name": "National Education Policy Center. \"Policy Briefs.\"", "meta": "National Education Policy Center. \"Policy Briefs.\" National Education Policy Center, nepc.colorado.edu/publications/policy-briefs. Accessed 3 May 2026.", "desc": "University research center at the University of Colorado Boulder that publishes accessible policy briefs synthesizing education research for policymakers, educators, and the public. Equity-focused analysis is produced through its Initiative on Diversity, Equity, and Learning (IDEAL), with relevance to school reform and inclusion.", "url": "https://nepc.colorado.edu/publications/policy-briefs"}, {"name": "Williams Institute, UCLA School of Law. \"Publications.\"", "meta": "Williams Institute, UCLA School of Law. \"Publications.\" Williams Institute, williamsinstitute.law.ucla.edu/publications/. Accessed 3 May 2026.", "desc": "Think tank at UCLA School of Law producing rigorous, independent research on sexual orientation and gender identity law and public policy. Includes empirical studies on LGBTQ youth experiences in K–12 schools, school climate, legal protections, and demographic data relevant to supporting transgender and LGBTQ+ students.", "url": "https://williamsinstitute.law.ucla.edu/publications/"}], "Political & Social Organizations": [{"name": "Glisten (formerly GLSEN)", "meta": "Glisten. Glisten. n.d., glisten.org.", "desc": "Leading national organization championing LGBTQ+ issues in K–12 education through research, policy advocacy, educator training, and student GSA club support. Founded in 1990; formerly known as GLSEN (Gay, Lesbian & Straight Education Network); rebranded as Glisten in February 2026.", "url": "https://glisten.org"}, {"name": "Welcoming Schools (HRC Foundation)", "meta": "Human Rights Campaign Foundation. Welcoming Schools. n.d., www.welcomingschools.org.", "desc": "HRC Foundation's comprehensive K–12 bias-based bullying prevention program providing LGBTQ-inclusive, anti-bullying, and family-diversity resources, lesson plans, and professional development for educators.", "url": "https://www.welcomingschools.org"}], "Podcasts & Webinars": [{"name": "EdWeb.net Educator Webinars", "meta": "EdWeb.net Educator Webinars. edWeb.net, n.d., home.edweb.net.", "desc": "A free professional learning platform offering hundreds of live and on-demand webinars for PreK–12 educators on topics including inclusive classrooms, student well-being, and affirming school environments; CE certificates available and accepted in 42 states.", "url": "https://home.edweb.net"}, {"name": "Glisten Educator Webinar Series", "meta": "Glisten Educator Webinar Series. Glisten, n.d., www.glisten.org.", "desc": "A webinar series from Glisten (formerly GLSEN) offering educator-focused professional development on LGBTQ+ inclusion, pronouns, policy, and supporting transgender and gender-nonconforming students in K–12 schools.", "url": "https://www.glisten.org"}, {"name": "NAEYC Professional Learning Institute", "meta": "NAEYC Professional Learning Institute. National Association for the Education of Young Children, n.d., www.naeyc.org/our-work/professional-learning.", "desc": "Professional development webinars and resources from NAEYC addressing diversity, equity, and inclusion in early childhood and PreK–3 education, including sessions on anti-bias education, culturally responsive teaching, and equitable learning environments.", "url": "https://www.naeyc.org/our-work/professional-learning"}, {"name": "Queer America", "meta": "Queer America. Learning for Justice, n.d., www.learningforjustice.org/podcasts/queer-america.", "desc": "A podcast series from Learning for Justice, hosted by historians Leila Rupp and John D'Emilio, exploring the history of sexual orientation and gender identity in the United States to help educators integrate LGBTQ+ history into their curricula.", "url": "https://www.learningforjustice.org/podcasts/queer-america"}, {"name": "Teaching Hard History", "meta": "Teaching Hard History. Learning for Justice, n.d., www.learningforjustice.org/podcasts/teaching-hard-history.", "desc": "A podcast series from Learning for Justice hosted by historian Hasan Kwame Jeffries, Ph.D., examining the history of American slavery and the Civil Rights Movement through conversations with leading scholars and educators; includes professional development resources and episode guides for K–12 teachers.", "url": "https://www.learningforjustice.org/podcasts/teaching-hard-history"}, {"name": "Teaching While Queer: Advocacy, Community, and Resources for LGBTQ+ Educators", "meta": "Teaching While Queer: Advocacy, Community, and Resources for LGBTQ+ Educators. Teaching While Queer, n.d., teachingwhilequeer.org.", "desc": "A podcast hosted by Bryan Stanton (they/them) centering the real-world experiences of LGBTQ+ educators, covering topics including burnout, tokenism, advocacy, inclusive classroom strategies, and building community for queer teachers across K–12 and higher education.", "url": "https://teachingwhilequeer.org"}, {"name": "UnErasing LGBTQ History and Identities: A Podcast for Teachers", "meta": "UnErasing LGBTQ History and Identities: A Podcast for Teachers. History UnErased, n.d., unerased.org/resource/podcasts.", "desc": "A podcast series from History UnErased offering practical strategies and real-world advice for K–12 educators working to create LGBTQ-inclusive classrooms, featuring teachers sharing firsthand experiences and guidance on inclusion, curriculum, and navigating educator challenges.", "url": "https://unerased.org/resource/podcasts"}], "Open-Access Curricula & OER Repositories": [{"name": "Gender Spectrum", "meta": "Gender Spectrum. n.d.", "desc": "Lesson plans, discussion guides, and educator resources for supporting gender-expansive youth.", "url": "https://genderspectrum.org"}, {"name": "Learning for Justice", "meta": "Learning for Justice. n.d.", "desc": "Inclusive lesson plans, book lists, and professional development resources.", "url": "https://www.learningforjustice.org"}, {"name": "Our Family Coalition – Education Resources", "meta": "Our Family Coalition. Our Family Coalition Education Resources. n.d., ourfamily.org/programs-services/education/.", "desc": "Classroom toolkits, educator guides, and professional development resources on LGBTQ+ family diversity and inclusion, developed by California's largest LGBTQ family organization for PreK–12 educators.", "url": "https://ourfamily.org/programs-services/education/"}, {"name": "Teaching Tolerance Digital Toolbox (archived via Learning for Justice)", "meta": "Teaching Tolerance Digital Toolbox. Learning for Justice, n.d., www.learningforjustice.org.", "desc": "Classic toolkits with open-access anti-bias lessons for younger grades, now archived and accessible through the Learning for Justice website. Note: Teaching Tolerance rebranded as Learning for Justice in 2021; these resources are no longer maintained separately.", "url": "https://www.learningforjustice.org"}, {"name": "Teachstone CLASS Resources", "meta": "Teachstone CLASS Resources. Teachstone, n.d., teachstone.com.", "desc": "Evidence-based frameworks and professional development tools focused on improving classroom interactions in PreK–12 settings. Relevant to equity in early grades; not specifically LGBTQ+-focused.", "url": "https://teachstone.com"}, {"name": "Welcoming Schools – HRC Foundation", "meta": "Welcoming Schools. Human Rights Campaign Foundation, n.d., www.welcomingschools.org.", "desc": "Anti-bias curriculum and educator resources.", "url": "https://www.welcomingschools.org"}], "Activist Groups & Campaigns": [{"name": "Family Equality", "meta": "Family Equality. Family Equality. n.d., familyequality.org.", "desc": "National nonprofit advancing legal and lived equality for LGBTQ+ families through community-building, advocacy, and policy change; provides resources for educators working to affirm diverse families and household structures in schools.", "url": "https://familyequality.org"}, {"name": "Gender Spectrum", "meta": "Gender Spectrum. Gender Spectrum: Supporting Gender-Diverse Youth. n.d., genderspectrum.org.", "desc": "Advocacy and support network for trans youth and their families.", "url": "https://genderspectrum.org"}, {"name": "Rethinking Schools", "meta": "Rethinking Schools. n.d., www.rethinkingschools.org.", "desc": "Journal and website offering justice-oriented teacher-authored articles, resources, and curriculum relevant to elementary pedagogy. Covers race, class, gender, and other equity issues.", "url": "https://www.rethinkingschools.org"}, {"name": "Supporting Our Youth (SOY)", "meta": "Supporting Our Youth. Sherbourne Health, n.d., soytoronto.com.", "desc": "Toronto-based community health program of Sherbourne Health offering groups, programs, and events for 2SLGBTQ+ youth aged 29 and under. Provides community connections, mental health support, housing resources, and goal planning. Note: Canadian organization; not primarily educator-focused but valuable for understanding youth advocacy contexts.", "url": "https://soytoronto.com"}, {"name": "Trans Youth Equality Foundation (TYEF)", "meta": "Trans Youth Equality Foundation. TYEF: Advocacy and Support for Trans Children. n.d., www.transyouthequality.org.", "desc": "Provides education, advocacy, and support for transgender, nonbinary, and gender non-conforming children and youth and their families. Mission includes sharing information about the unique needs of this community and fostering healthy, caring, and safe environments.", "url": "https://www.transyouthequality.org"}, {"name": "Trans Youth Family Allies (TYFA)", "meta": "Trans Youth Family Allies. TYFA: Training and Resources for Gender-Inclusive Schools. n.d., www.imatyfa.org.", "desc": "Provides training and resources for gender-inclusive schools, empowering children and families by partnering with educators, service providers, and communities to develop supportive environments where gender may be expressed and respected.", "url": "https://www.imatyfa.org"}], "Films, Documentaries & Visual Media": [{"name": "A Kid Like Jake", "meta": "A Kid Like Jake. Directed by Silas Howard. IFC Films, 2018.", "desc": "Feature film following two Brooklyn parents navigating kindergarten applications and their gender-expansive four-year-old son. Useful for exploring adult responses to childhood gender nonconformity.", "url": "https://www.imdb.com/title/tt6884200/"}, {"name": "A Place in the Middle", "meta": "A Place in the Middle. Directed by Dean Hamer and Joe Wilson. 2014.", "desc": "Short documentary about a Hawaiian student who identifies across genders, exploring the Native Hawaiian concept of māhū and how a supportive teacher and school community affirm their identity. Includes educator guide.", "url": "https://www.aplaceinthemiddle.org"}, {"name": "Queer Kid Stuff (web series)", "meta": "Amer, Lindsay, creator. Queer Kid Stuff. YouTube, 2016–present, www.youtube.com/channel/UCecsVoeJcsXbAra7Sl4mOPw.", "desc": "LGBTQ+ educational web series for young children (ages 3 and up) created and hosted by Lindsay Amer (they/them), explaining concepts like gender identity, sexuality, and social justice in age-appropriate terms using music, a stuffed bear named Teddy, and stop-motion animation. Note: This is a YouTube web series, not an IMDB-listed film.", "url": "https://www.youtube.com/channel/UCecsVoeJcsXbAra7Sl4mOPw"}, {"name": "Being Me", "meta": "Being Me. Directed by Erin Brown Thomas. Journeyman Pictures, 2015.", "desc": "Documentary following 10-year-old Isabelle Langley and other transgender youth, exploring their journeys of self-discovery and the support they find from families and medical professionals. Offers elementary educators tools for fostering empathy and inclusion around trans student experiences.", "url": "https://www.imdb.com/title/tt2820328/"}, {"name": "Gender Revolution: A Journey with Katie Couric", "meta": "Gender Revolution: A Journey with Katie Couric. National Geographic, 2017.", "desc": "National Geographic documentary in which journalist Katie Couric explores evolving understandings of gender identity across the United States, interviewing trans children, families, scientists, and activists with accessible explanation.", "url": "https://www.youtube.com/playlist?list=PLivjPDlt6ApTL79_aIL-dHceH2PUccvly"}, {"name": "Growing Up Coy", "meta": "Growing Up Coy. Directed by Eric Juhola. 2016.", "desc": "Documentary following Coy Mathis and her family's landmark legal case for her right to use the school restroom consistent with her gender identity, exploring broader questions of transgender rights in K–12 education.", "url": "https://www.imdb.com/title/tt5648966/"}, {"name": "In a Heartbeat", "meta": "In a Heartbeat. Directed by Esteban Bravo and Beth David. Ringling College of Art and Design, 2017.", "desc": "Animated short (4 min.) depicting a closeted boy whose heart literally leaps from his chest to chase his crush, another boy. Widely praised for its wordless, inclusive depiction of same-sex affection for younger audiences. Available on YouTube.", "url": "https://www.imdb.com/title/tt6969946/"}, {"name": "It's Elementary: Talking About Gay Issues in School", "meta": "It's Elementary: Talking About Gay Issues in School. Directed by Debra Chasnoff and Helen Cohen. GroundSpark / Women's Educational Media, 1996.", "desc": "Groundbreaking 78-minute documentary showing how six elementary and middle school teachers across the U.S. address LGBTQ+ topics with students. A foundational professional development resource for elementary educators. Winner of the GLAAD Media Award for Outstanding Documentary.", "url": "https://www.imdb.com/title/tt0116659/"}, {"name": "Little Girl (Petite Fille)", "meta": "Little Girl (Petite Fille). Directed by Sébastien Lifshitz. Arte France Cinéma, 2020.", "desc": "French documentary following Sasha, an 8-year-old transgender girl, and her family's journey toward acceptance and support in navigating daily life, school, and medical consultations. Useful for teachers supporting elementary students' gender identities.", "url": "https://www.imdb.com/title/tt11753696/"}, {"name": "Pink Boy", "meta": "Pink Boy. Directed by Eric Rockey. 2015.", "desc": "Intimate 25-minute portrait of a gender-creative boy growing up in conservative rural Florida, and the butch lesbian parent navigating how to keep him safe while affirming who he is. Winner of multiple festival awards including Grand Jury Prize for Best Short at DOC NYC.", "url": "https://www.imdb.com/title/tt4177250/"}, {"name": "Raised Without Gender", "meta": "Raised Without Gender. Directed by Milene Larsson and Alana McVerry. Vice Media, 2017.", "desc": "Vice documentary (approx. 30 min.) following a family in Sweden raising their children outside strict gender norms, and visiting gender-aware kindergartens. Explores how Swedish educational policy and practice support gender-neutral child-rearing.", "url": "https://www.imdb.com/title/tt9233180/"}, {"name": "Straightlaced: How Gender's Got Us All Tied Up", "meta": "Straightlaced: How Gender's Got Us All Tied Up. Directed by Debra Chasnoff. GroundSpark, 2009.", "desc": "Documentary in which more than 50 teens from diverse backgrounds speak candidly about how gender expectations and homophobia constrict their lives. Explores how clothing, sexuality, sports, and emotion intersect with rigid gender norms. Useful for teacher study on early socialization.", "url": "https://www.imdb.com/title/tt1404412/"}, {"name": "The Bravest Knight (TV series)", "meta": "The Bravest Knight. Created by Daniel Errico. Big Bad Boo Studios / Hulu, 2019–present.", "desc": "Animated Hulu original TV series featuring Sir Cedric, a gay knight married to Prince Andrew, raising an adopted daughter. One of the first children's animated series with an openly gay main character. Note: This is a TV series, not a film. Winner of the 2020 GLAAD Media Award for Outstanding Kids and Family Programming.", "url": "https://www.imdb.com/title/tt10394790/"}, {"name": "The Family Journey: Raising Gender Nonconforming Children", "meta": "The Family Journey: Raising Gender Nonconforming Children. Directed by Jonathan Skurnik. Youth & Gender Media Project, n.d.", "desc": "Short documentary (14 min.) in which parents and siblings of gender-nonconforming children share their journeys from uncertainty to acceptance, demonstrating how love and support allow gender-nonconforming kids to thrive. Part of the Youth & Gender Media Project.", "url": "https://www.newday.com/films/the-family-journey-raising-gender-nonconforming-children"}, {"name": "Transhood", "meta": "Transhood. Directed by Sharon Liese. HBO Documentary Films, 2020.", "desc": "HBO documentary following four transgender children and their families in Kansas City over five years, exploring how each child navigates identity, family, community, and the world as they grow up.", "url": "https://www.imdb.com/title/tt11447806/"}, {"name": "We Are Little Zombies", "meta": "We Are Little Zombies. Directed by Makoto Nagahisa. Oscilloscope Laboratories, 2019.", "desc": "Japanese coming-of-age film following four emotionally numb orphans who form a band. Winner of the World Cinema Dramatic Special Jury Award for Originality at Sundance 2019. Note: This film is primarily about grief and youth identity, not gender nonconformity; its relevance to LGBTQ+ inclusion is limited and should be reviewed before classroom use.", "url": "https://www.imdb.com/title/tt9358120/"}], "Academic & Scholarly References": [{"name": "Transgender Students in Elementary School: Creating an Affirming and Inclusive School Culture", "meta": "Mangin, Melinda M. Transgender Students in Elementary School: Creating an Affirming and Inclusive School Culture. Cambridge, MA: Harvard Education Press, 2020.", "desc": "Research-based guide to creating affirming and inclusive school cultures for transgender and gender-expansive students in elementary settings, focusing on case studies from five schools.", "url": "https://hep.gse.harvard.edu/9781682535257/transgender-students-in-elementary-school/"}, {"name": "Supporting Transgender and Gender-Creative Youth: Schools, Families, and Communities in Action", "meta": "Meyer, Elizabeth J., and Annie Pullen Sansfaçon, eds. Supporting Transgender and Gender-Creative Youth: Schools, Families, and Communities in Action. Peter Lang, 2014.", "desc": "Edited collection bringing together research, social action methods, and theory on transgender youth and gender-creative children, covering school support, family acceptance, and community contexts. Note: Ann Travers contributed a chapter but is not the author or editor of this volume.", "url": "https://www.amazon.com/Supporting-Transgender-Gender-Creative-Youth-Communities/dp/1433134942"}, {"name": "Teaching About Gender Diversity: Teacher-Tested Lesson Plans for K–12 Classrooms", "meta": "Woolley, Susan W., and Lee Airton, eds. Teaching about Gender Diversity: Teacher-Tested Lesson Plans for K–12 Classrooms. Canadian Scholars, 2020.", "desc": "Lesson plans and teaching resources for K–12 classrooms on gender diversity. (Same volume as Recommended Reading #5, credited here in reverse editorial order.)", "url": "https://canadianscholars.ca/book/teaching-about-gender-diversity/"}], "label": "Elementary", "count": "59 resources · 10 categories"}, "middle": {"Recommended Readings": [{"name": "Gender Diversity and LGBTQ Inclusion in K–12 Schools", "meta": "Chappell, Sharon Verner, Karyl E. Ketchum, and Lisa Richardson. Gender Diversity and LGBTQ Inclusion in K–12 Schools: A Guide to Supporting Students, Changing Lives. Routledge, 2018.", "desc": "Practical guide equipping educators to build LGBTQ-inclusive K–12 classrooms through real-world narratives, sociocultural theory, curricular design, antidiscrimination law, and affirming school culture strategies.", "url": "https://www.routledge.com/Gender-Diversity-and-LGBTQ-Inclusion-in-K-12-Schools-A-Guide-to-Supporting-Students-Changing-Lives/Chappell-Ketchum-Richardson/p/book/9781138044517"}, {"name": "Mathematics Learning and Participation as Racialized Forms of Experience", "meta": "Martin, Danny Bernard. \"Mathematics Learning and Participation as Racialized Forms of Experience: African American Parents Speak on the Struggle for Mathematics Literacy.\" Mathematical Thinking and Learning, vol. 8, no. 3, 2006, pp. 197–229.", "desc": "Explores how race and identity shape engagement and opportunities in mathematics, drawing on studies of African American parents and adults in three communities. Foundational text for understanding racialized mathematical experiences in school contexts.", "url": "https://www.tandfonline.com/doi/abs/10.1207/s15327833mtl0803_2"}, {"name": "Gender and Sexualities in Education: A Reader", "meta": "Meyer, Elizabeth J., and Dennis Carlson, eds. Gender and Sexualities in Education: A Reader. Peter Lang, 2014.", "desc": "Scholarly reader offering key essays on gender and sexuality in educational contexts, providing middle and secondary educators frameworks to address gendered oppression, LGBTQ+ inclusion, and identity in schools.", "url": "https://www.peterlang.com/document/1051405"}, {"name": "Making the Framework FAIR", "meta": "Romesburg, Don, et al. Making the Framework FAIR: California's History–Social Science Framework Proposed LGBT Revisions Related to the FAIR Education Act. Committee on Lesbian, Gay, Bisexual, and Transgender History, 2014.", "desc": "Report by historians showing how LGBT-inclusive content was incorporated into California's K–12 History-Social Science Framework under the FAIR Education Act — a model for secondary educators developing inclusive curriculum.", "url": "https://www.academia.edu/8496435/Making_the_Framework_FAIR_California_History_Social_Science_Framework_Proposed_LGBT_Revisions_Related_to_the_FAIR_Education_Act"}], "News Articles & Substacks": [{"name": "Educators Face Hard Choice: Obey or Defy Anti-LGBTQ Policies", "meta": "Mader, Jackie. \"Educators Face Hard Choice: Obey or Defy Anti-LGBTQ Policies.\" Chalkbeat, 13 June 2023, www.chalkbeat.org/2023/6/13/23758611/lgbtq-trans-policy-pronouns-north-carolina-moore-county/.", "desc": "Reports on how anti-LGBTQ laws are forcing school staff to decide whether to comply with or resist policies they believe harm students, with examples of harassment, pronoun restrictions, and professional consequences — directly addressing educator climate and student safety.", "url": "https://www.chalkbeat.org/2023/6/13/23758611/lgbtq-trans-policy-pronouns-north-carolina-moore-county/"}, {"name": "State Laws Restricting Curriculum, Pronoun Use Cause Confusion and Chaos in Schools", "meta": "Najarro, Ileana. \"State Laws Restricting Curriculum, Pronoun Use Cause Confusion and Chaos in Schools.\" Education Week, 10 Oct. 2023, https://www.edweek.org/policy-politics/state-laws-restricting-curriculum-pronoun-use-cause-confusion-and-chaos-in-schools/2023/09.", "desc": "Details how restrictive state laws — including Florida's expansion of its 'Don't Say Gay' law through 8th grade — have created confusion, chilling effects, and staff departures in districts across the country, with reporting on curriculum bans, pronoun rules, and educator responses.", "url": "https://www.edweek.org/policy-politics/state-laws-restricting-curriculum-pronoun-use-cause-confusion-and-chaos-in-schools/2023/09"}, {"name": "Beyond 'Don't Say Gay': Other States Seek to Limit LGBTQ Youth, Teaching", "meta": "Sawchuk, Stephen. \"Beyond 'Don't Say Gay': Other States Seek to Limit LGBTQ Youth, Teaching.\" Education Week, 26 Apr. 2022, https://www.edweek.org/policy-politics/beyond-dont-say-gay-other-states-seek-to-limit-lgbtq-youth-teaching/2022/04", "desc": "Analyzes nearly 30 state bills targeting LGBTQ school clubs, pronoun use, curriculum, and library books — including how restrictions affect students and educators across grade levels including middle school.", "url": "https://www.edweek.org/policy-politics/beyond-dont-say-gay-other-states-seek-to-limit-lgbtq-youth-teaching/2022/04"}], "Policy Reports": [{"name": "Resolution on Gender and Sexual Orientation Diversity in Children and Adolescents in Schools", "meta": "American Psychological Association & National Association of School Psychologists. Resolution on Gender and Sexual Orientation Diversity in Children and Adolescents in Schools. APA & NASP, 2014.", "desc": "Jointly adopted by APA and NASP, this resolution calls for K–12 public schools to be places of safety and support for all students and offers research-backed recommendations for policies, programs, training, and inclusive school practices.", "url": "https://www.apa.org/about/policy/orientation-diversity"}, {"name": "2025 National School Climate Survey Report", "meta": "Glisten. 2025 National School Climate Survey Report. Glisten, 2025.", "desc": "Survey data on LGBTQ+ student safety, inclusion, victimization, and educational equity across middle and high schools nationwide, based on data collected during the 2023–2024 school year.", "url": "https://glisten.org/nscs2025/"}, {"name": "Welcoming Schools (HRC Foundation Program & Resource Hub)", "meta": "Human Rights Campaign Foundation. Welcoming Schools. HRC Foundation, n.d., welcomingschools.org.", "desc": "Comprehensive professional development program and free resource hub for PreK–12 educators providing lesson plans, training, book lists, and tools for creating LGBTQ+ and gender-inclusive schools and addressing bias-based bullying.", "url": "https://welcomingschools.org"}], "Policy Trackers": [{"name": "LGBTQI+ Youth Policy Research (Center for American Progress)", "meta": "Center for American Progress. \"LGBTQI+ Youth.\" americanprogress.org/topic/lgbtq-youth/. Accessed 2025.", "desc": "CAP's ongoing hub of policy briefs, reports, and analysis on LGBTQI+ youth in education, covering anti-LGBTQ school legislation, school safety, mental health impacts, and data on disproportionate discrimination affecting LGBTQ+ students.", "url": "https://www.americanprogress.org/topic/lgbtq-youth/"}, {"name": "GLAAD ALERT Desk: Anti-LGBTQ Extremism Reporting Tracker", "meta": "GLAAD. \"ALERT Desk: Anti-LGBTQ Extremism Reporting Tracker.\" GLAAD, 2022–present, glaad.org/anti-lgbtq-extremism-reporting-tracker/.", "desc": "GLAAD's ongoing tracker documenting anti-LGBTQ incidents nationwide, including those targeting educators, students, and school board meetings. Publishes annual reports with data on education-related hate incidents.", "url": "https://glaad.org/anti-lgbtq-extremism-reporting-tracker/"}, {"name": "2024 State Equality Index (Human Rights Campaign Foundation)", "meta": "Human Rights Campaign Foundation. 2024 State Equality Index: A Review of State Legislation Affecting the LGBTQ+ Community. HRC Foundation & Equality Federation Institute, 2025.", "desc": "Annual comprehensive state-by-state report rating all 50 states on LGBTQ+ laws and policies across six areas including youth and education — covering school safety policies, curricula, and anti-bullying protections.", "url": "https://reports.hrc.org/2024-state-equality-index"}, {"name": "Hate at School (SPLC / Learning for Justice, 2019)", "meta": "Southern Poverty Law Center. Hate at School. SPLC / Teaching Tolerance, 2019.", "desc": "Documents hate and bias incidents in U.S. schools based on news reports and a national educator survey of 2,700+ respondents. Covers incidents targeting students by race, religion, sexual orientation, gender identity, and immigration status, with case studies from elementary and secondary schools.", "url": "https://www.splcenter.org/20190502/hate-school"}], "Political & Social Organizations": [{"name": "Glisten Research Institute", "meta": "Glisten. \"Research.\" Glisten, n.d., glisten.org/research.", "desc": "Publishes the National School Climate Survey with breakdowns by grade level, providing nationally representative data on LGBTQ+ student safety, belonging, and educational equity.", "url": "https://glisten.org/research"}, {"name": "Glisten", "meta": "Glisten. Glisten. n.d., glisten.org.", "desc": "National K–12 advocacy organization offering curriculum, research, professional development, and policy guidance for LGBTQ-inclusive education. Formerly GLSEN; rebranded as Glisten in February 2026.", "url": "https://glisten.org"}, {"name": "Lambda Legal", "meta": "Lambda Legal. Lambda Legal. n.d., www.lambdalegal.org.", "desc": "Legal advocacy organization supporting the civil rights of LGBTQIA+ students, educators, and families nationwide through litigation, policy advocacy, and public education.", "url": "https://www.lambdalegal.org"}, {"name": "Learning for Justice", "meta": "Learning for Justice. Learning for Justice: K–12 Social Justice Curriculum. n.d., www.learningforjustice.org.", "desc": "Offers standards-aligned lessons, book lists, film guides, and professional development resources for K–12 educators on identity and justice. Formerly Teaching Tolerance; rebranded in 2021.", "url": "https://www.learningforjustice.org"}, {"name": "Trans Student Educational Resources (TSER)", "meta": "Trans Student Educational Resources. Trans Student Educational Resources. n.d., transstudent.org.", "desc": "Student-led nonprofit promoting gender-inclusive education through advocacy, resources, and training. Founded in 2011; the only national organization led by trans youth.", "url": "https://transstudent.org"}], "Podcasts & Webinars": [{"name": "APA Webinar Series on LGBTQ Youth", "meta": "American Psychological Association. APA Webinar Series on LGBTQ Youth. APA, n.d., www.apa.org.", "desc": "Professional development webinars on mental health and school climate for adolescents, produced by the APA for educators and counselors in K–12 settings.", "url": "https://www.apa.org"}, {"name": "Sounds Fake but Okay", "meta": "Costello, Sarah, and Kayla Kaszyca, hosts. Sounds Fake but Okay. n.d., soundsfakepod.com.", "desc": "Weekly podcast in which an aromantic asexual and a biromantic demisexual discuss love, relationships, sexuality, and identity. Winner of the 2020 Discover Pods Award for Best LGBTQ+ Culture Podcast.", "url": "https://www.soundsfakepod.com"}, {"name": "Making Gay History", "meta": "Marcus, Eric, host. Making Gay History: LGBTQ Oral Histories from the Archive. Making Gay History, n.d., makinggayhistory.com.", "desc": "Oral history podcast drawing on Eric Marcus's archive of rare first-person interviews to profile LGBTQ+ pioneers, activists, and witnesses to history.", "url": "https://makinggayhistory.com"}, {"name": "OutCasting", "meta": "OutCasting. Produced by Media for the Public Good. n.d., mfpg.org.", "desc": "Public radio's LGBTQ youth program — produced by and for LGBTQ teens and straight allies — distributed nationally on the Pacifica Radio Network.", "url": "https://mfpg.org/"}, {"name": "History Is Gay", "meta": "Pfeffer, Leigh, and Gretchen Felker-Martin, hosts. History Is Gay. n.d., historyisgaypodcast.com.", "desc": "Podcast examining overlooked LGBTQ+ people and events throughout history — from queer pirates to Sappho. Hosted by self-described queer nerds Gretchen and Leigh.", "url": "https://www.historyisgaypodcast.com/"}, {"name": "Queer America", "meta": "Rupp, Leila, and John D'E nal Geographic, 2017.", "desc": "National Geographic documentary in which journalist Katie Couric explores evolving understandings of gender identity, interviewing trans children, families, scientists, and activists.", "url": "https://www.youtube.com/playlist?list=PLivjPDlt6ApTL79_aIL-dHceH2PUccvly"}, {"name": "Growing Up Coy", "meta": "Growing Up Coy. Directed by Eric Juhola. 2016.", "desc": "Documentary following Coy Mathis and her family's landmark legal case for her right to use the school restroom consistent with her gender identity.", "url": "https://www.imdb.com/title/tt5648966/"}, {"name": "Growing Up Trans", "meta": "Growing Up Trans. Directed by Miri Navasky and Karen O'Connor. PBS Frontline, 2015.", "desc": "PBS Frontline documentary following eight transgender youth ages 9–19 and their families as they navigate identity, medical decisions, and community responses.", "url": "https://www.imdb.com/title/tt4689752/"}, {"name": "I'm Just Anneke", "meta": "I'm Just Anneke. Directed by Jonathan Skurnik. Youth & Gender Media Project, 2010.", "desc": "Short documentary (11 min.) following Anneke, a 12-year-old gender-fluid youth from Vancouver, as she navigates puberty, identity, family, and school. Winner of the Changemaker Award 2010.", "url": "https://www.imdb.com/title/tt1753935/"}, {"name": "Let's Get Real", "meta": "Let's Get Real. Directed by Debra Chasnoff. GroundSpark / Women's Educational Media, 2003.", "desc": "Documentary in which middle schoolers speak candidly about name-calling, bullying, and bias — told entirely from youth perspectives. Designed for teacher study in middle school settings.", "url": "https://www.newday.com/films/lets-get-real"}, {"name": "Picture a Scientist", "meta": "Picture a Scientist. Directed by Ian Cheney and Sharon Shattuck. Submarine Deluxe / NOVA, 2020.", "desc": "Documentary profiling women and nonbinary scientists facing gender discrimination in STEM fields, featuring powerful testimony about institutional bias. Relevant for science and math classrooms.", "url": "https://www.imdb.com/title/tt11906032/"}, {"name": "Pink Boy", "meta": "Pink Boy. Directed by Eric Rockey. 2015.", "desc": "Intimate 25-minute portrait of a gender-creative boy in rural Florida and the butch lesbian parent navigating where it is safe for him to be himself. Multiple festival awards.", "url": "https://www.imdb.com/title/tt4177250/"}, {"name": "Raised Without Gender", "meta": "Raised Without Gender. Directed by Milene Larsson and Alana McVerry. Vice Media, 2017.", "desc": "Vice documentary following a family in Sweden raising their children outside strict gender norms and visiting gender-aware kindergartens.", "url": "https://www.imdb.com/title/tt9233180/"}, {"name": "Real Boy", "meta": "Real Boy. Directed by Shaleece Haas. 2016.", "desc": "Documentary following trans teen musician Bennett Wallace through his transition and search for community, with an intimate portrait of his father's parallel journey of acceptance.", "url": "https://www.imdb.com/title/tt3993760/"}, {"name": "Straightlaced: How Gender's Got Us All Tied Up", "meta": "Straightlaced: How Gender's Got Us All Tied Up. Directed by Debra Chasnoff. GroundSpark, 2009.", "desc": "Documentary in which more than 50 diverse California teens speak candidly about how gender expectations and homophobia constrict their lives.", "url": "https://www.imdb.com/title/tt1404412/"}, {"name": "The Family Journey: Raising Gender Nonconforming Children", "meta": "The Family Journey: Raising Gender Nonconforming Children. Directed by Jonathan Skurnik. Youth & Gender Media Project, n.d.", "desc": "Short documentary (14 min.) in which parents and siblings of gender-nonconforming children share their journeys from uncertainty to acceptance. Part of the Youth & Gender Media Project.", "url": "https://www.newday.com/films/the-family-journey-raising-gender-nonconforming-children"}, {"name": "The Mask You Live In", "meta": "The Mask You Live In. Directed by Jennifer Siebel ences": [{"name": "Putting the 'T' in 'Resource': The Benefits of LGBT-Related School Resources for Transgender Youth", "meta": "Greytak, Emily A., Joseph G. Kosciw, and Madelyn J. Boesen. \"Putting the 'T' in 'Resource': The Benefits of LGBT-Related School Resources for Transgender Youth.\" Journal of LGBT Youth, vol. 10, no. 1–2, 2013, pp. 45–63.", "desc": "Quantitative study linking the availability of LGBT-related school resources — supportive educators, GSAs, and inclusive curriculum — to improved academic outcomes and safety for transgender youth.", "url": "https://www.tandfonline.com/doi/abs/10.1080/19361653.2012.718522"}, {"name": "Naming New Realities: Supporting Trans Youth in Education", "meta": "Sinclair-Palm, Julia, and Jen Gilbert. \"Naming New Realities: Supporting Trans Youth in Education.\" Sex Education, vol. 18, no. 4, 2018, pp. 321–327.", "desc": "Calls for educational practices that recognize and affirm trans youths' lived realities in schools, examining how naming, pronouns, and institutional recognition shape belonging and safety.", "url": "https://www.tandfonline.com/doi/full/10.1080/14681811.2018.1452347"}], "label": "Middle School", "count": "71 resources · 10 categories"}, "high": {"Recommended Readings": [{"name": "Data Feminism", "meta": "D'Ignazio, Catherine, and Lauren F. Klein. Data Feminism. MIT Press, 2020.", "desc": "Introduces an intersectional feminist approach to data and statistics, directly relevant to high school math and data science curricula and equity work.", "url": "https://data-feminism.mitpress.mit.edu/"}, {"name": "Trans Anthology Project: Reflections of Self-Discovery and Acceptance", "meta": "Kirby, Heather H., and Chrissy Boylan. Trans Anthology Project: Reflections of Self-Discovery and Acceptance. Kirby Creative Clinical Solutions, 2024.", "desc": "Collection of over 200 lived experiences from trans, nonbinary, and gender-diverse youth and their parents, offering authentic narratives of identity, resilience, and affirmation.", "url": "https://www.transanthologyproject.com/"}, {"name": "LGBTQ Youth and Education: Policies and Practices", "meta": "Mayo, Cris. LGBTQ Youth and Education: Policies and Practices. Teachers College Press, 2017.", "desc": "Examines how policy and pedagogy intersect in secondary schools, providing frameworks for teachers resisting exclusionary laws and creating affirming learning environments.", "url": "https://eric.ed.gov/?id=ED617676"}, {"name": "Gender Identity Justice in Schools and Communities", "meta": "Miller, sj. About Gender Identity Justice in Schools and Communities. Teachers College Press, 2019.", "desc": "Expands frameworks of refusal and trans+ justice across K–12 and higher education, offering practical and theoretical tools for educators navigating restrictive policies.", "url": "https://www.tcpress.com/products/about-gender-identity-justice-in-schools-and-communities_9780807761250"}, {"name": "The Educator's Guide to LGBT+ Inclusion", "meta": "Shane, Kryss. The Educator's Guide to LGBT+ Inclusion: A Practical Resource for K–12 Teachers, Administrators, and School Support Staff. Jessica Kingsley Publishers, 2020.", "desc": "Offers clear, research-backed strategies for creating affirming and inclusive school communities across all grade levels and subject areas.", "url": "https://us.jkp.com/products/the-educators-guide-to-lgbt-inclusion"}], "News Articles & Substacks": [{"name": "Outreach Events Engage Queer and Transgender Youth in STEM", "meta": "Cartier, Kimberly M. S. \"Outreach Events Engage Queer and Transgender Youth in STEM.\" Eos, 10 Dec. 2018, eos.org/articles/outreach-events-engage-queer-and-transgender-youth-in-stem.", "desc": "Reports on the 'Queer Science' program at the University of Minnesota, connecting queer and transgender scientists with LGBTQ+ high school students for hands-on math and science workshops.", "url": "https://eos.org/articles/outreach-events-engage-queer-and-transgender-youth-in-stem"}, {"name": "The P h teacher discusses how his lived experience helps model respectful behavior and challenge gender norms in his high school math classes.", "url": "https://www.lgbtqnation.com/2025/07/as-a-trans-male-teacher-i-am-uniquely-poised-to-teach-boys-to-respect-women/"}], "Policy Reports": [{"name": "2025 National School Climate Survey: The Experiences of LGBTQ+ Youth in Our Nation's Schools", "meta": "Glisten. 2025 National School Climate Survey: The Experiences of LGBTQ+ Youth in Our Nation's Schools. Glisten, 2026.", "desc": "The 13th installment of Glisten's NSCS, drawing on survey data from April–October 2024 (2,800 students) and focus groups from June–July 2025. Finds 2 in 3 LGBTQ+ students felt unsafe due to their sexual orientation or gender identity, and that the 2024–2025 school year felt more hostile amid escalating anti-LGBTQ+ political rhetoric.", "url": "https://glisten.org/nscs2025/"}, {"name": "The 2021 National School Climate Survey: The Experiences of LGBTQ+ Youth in Our Nation's Schools", "meta": "Kosciw, Joseph G., Caitlin M. Clark, and Leesh L. Menard. The 2021 National School Climate Survey: The Experiences of LGBTQ+ Youth in Our Nation's Schools. GLSEN, 2022.", "desc": "The 12th installment of GLSEN's NSCS, documenting pervasive anti-LGBTQ+ harassment and the critical role of supportive educators, inclusive curricula, GSAs, and school policies in creating safer learning environments.", "url": "https://eric.ed.gov/?id=ED625378"}, {"name": "Policy Spotlight: Curriculum Censorship & Hostile School Climate Bills", "meta": "Movement Advancement Project. Policy Spotlight: Curriculum Censorship & Hostile School Climate Bills. MAP, Mar. 2022.", "desc": "Analyzes the wave of state bills censoring discussions of race, religion, and LGBTQ people in schools and undermining safe school climates; documents near-quadrupling of such bills from 2020 to 2022.", "url": "https://www.lgbtmap.org/2022-spotlight-school-bills-report"}, {"name": "Under Fire: Erasing LGBTQ People from Schools and Public Life", "meta": "Movement Advancement Project. Under Fire: Erasing LGBTQ People from Schools and Public Life. MAP, Mar. 2023.", "desc": "Second in MAP's Under Fire series; documents eight coordinated tactics used to erase LGBTQ people from schools, including curriculum censorship, book bans, bathroom bills, and laws that penalize or criminalize supportive educators.", "url": "https://www.mapresearch.org/under-fire-report"}, {"name": "The Impact of 2024 Anti-Transgender Legislation on Youth", "meta": "Redfield, Elana, Kerith J. Conron, and Christy Mallory. The Impact of 2024 Anti-Transgender Legislation on Youth. Williams Institute, UCLA School of Law, Apr. 2024.", "desc": "Estimates how 2024 laws — gender-affirming care bans, sports bans, bathroom bans, pronoun restrictions — affect transgender youth ages 13–17 nationwide; maps policy exposure across school contexts.", "url": "https://williamsinstitute.law.ucla.edu/publications/2024-anti-trans-legislation/"}, {"name": "Anti-LGBTQ+ School Policies and LGBTQ+ Young People", "meta": "The Trevor Project. Anti-LGBTQ+ School Policies and LGBTQ+ Young People. Research Brief. Trevor Project, Aug. 2024.", "desc": "Demonstrates that LGBTQ+ students in schools with restrictive policies — on pronouns, bathrooms, and GSAs — face significantly elevated risks of depression, suicidality, and victimization, and have access to fewer protective resources.", "url": "https://www.thetrevorproject.org/research-briefs/anti-lgbtq-school-policies-and-lgbtq-young-people/"}], "Policy Trackers": [{"name": "State Policies Impacting LGBTQIA+ Students", "meta": "Education Commission of the States. State Policies Impacting LGBTQIA+ Students. ECS, Oct. 2022, www.ecs.org/state-policies-impacting-lgbtqia-students-in-2022/.", "desc": "ECS policy brief summarizing enacted and pending state legislation affecting LGBTQ+ students across instruction, school climate, athletic participation, and student health — with national data on ng the historical and ongoing impact of the Gender Identity Disorder (GID) diagnosis in the DSM.", "url": "https://www.imdb.com/title/tt4681822/"}, {"name": "Gender: The Space Between", "meta": "Capatides, Christina, and Carter Adams. Gender: The Space Between. CBSN, 2017.", "desc": "CBSN documentary exploring gender identity beyond the binary, featuring personal narratives and expert commentary. Accessible, current-events-style explainer for classroom use.", "url": "http://www.cbsnews.com/videos/gender-the-space-between/"}, {"name": "Lady Valor: The Kristin Beck Story", "meta": "Carlin, Sandrine Orabona, and Marc Ostrick, dirs. Lady Valor: The Kristin Beck Story. CNN Films, 2014.", "desc": "Documents former Navy SEAL Kristin Beck's public coming out as a transgender woman after 20 years of decorated military service, challenging stereotypes about gender and heroism.", "url": "https://www.imdb.com/title/tt3499084/"}, {"name": "Changing the Game", "meta": "Changing the Game. Directed by Michael Barnett. Hulu / Motto Pictures, 2019.", "desc": "Documentary following three transgender high school athletes as they compete in their chosen sports and navigate state policies that determine whether they can participate.", "url": "https://www.imdb.com/title/tt10011320/"}, {"name": "Straightlaced: How Gender's Got Us All Tied Up", "meta": "Chasnoff, Debra, dir. Straightlaced: How Gender's Got Us All Tied Up. GroundSpark, 2009.", "desc": "Sixty-eight teens from diverse backgrounds share candid perspectives on gender norms, peer pressure, homophobia, and the social policing of masculinity and femininity.", "url": "https://www.imdb.com/title/tt1404412/"}, {"name": "Every Body", "meta": "Cohen, Julie, dir. Every Body. Focus Features / NBC News Studios, 2023.", "desc": "Oscar-nominated director Julie Cohen profiles three intersex people -- River Gallo, Alicia Roth Weigel, and Sean Saifa Wall -- as they challenge a medical system of non-consensual surgeries and fight for intersex ri tes the lives of transgender hijra people in Pakistan, exploring religious, cultural, and political dimensions of trans identity in a global context.", "url": "https://www.imdb.com/title/tt2229473/"}, {"name": "The Family Journey: Raising Gender Nonconforming Children", "meta": "Poole, Francine, dir. The Family Journey: Raising Gender Nonconforming Children. 2011.", "desc": "Families reflect on their experiences supporting gender-nonconforming children, emphasizing affirming parenting, school advocacy, and community connection.", "url": "https://www.newday.com/films/the-family-journey-raising-gender-nonconforming-children"}, {"name": "American in Transition", "meta": "Pérez, André, dir. American in Transition. 2019.", "desc": "Web-based documentary project sharing personal stories of transgender people from across the United States, emphasizing diversity of experience across region, race, and age.", "url": "https://marlboro.emerson.edu/andre-perez-america-in-transition/"}, {"name": "Before Stonewall", "meta": "Schiller, Greta, and Robert Rosenberg, dirs. Before Stonewall. Before Stonewall Inc., 1984.", "desc": "Comprehensive oral history documentary on LGBTQ life in America before the 1969 Stonewall riots, drawing on interviews and archival footage to illuminate community, identity, and resistance.", "url": "https://www.imdb.com/title/tt0088782/"}, {"name": "Check It", "meta": "Silverman, Dana, and Toby Oppenheimer, dirs. Check It. 2016.", "desc": "Follows Black gay and trans youth in Washington, D.C. who form a gang for mutual protection and solidarity, turning their collective strength toward fashion and entrepreneurship.", "url": "https://www.imdb.com/title/tt5299014/"}, {"name": "Screaming Queens: The Riot at Compton's Cafeteria", "meta": "Silverman, Victor, and Susan Stryker, dirs. Screaming Queens: The Riot at Compton's Cafeteria. Frameline, 2005.", "desc": "Documents the 1966 Compton's Cafeteria riot in San Francisco's Tenderloin, predating Stonewall, in which trans women and drag queens fought back against police harassment.", "url": "https://www.youtube.com/watch?v=G-WASW9dRBU"}, {"name": "Woman on Fire", "meta": "Sokolow, Julie, dir. Woman on Fire. Sokolow Productions, 2016.", "desc": "Story of Brooke Guinan, New York City's first openly transgender firefighter, documenting her challenges, courage, and visibility as a trailblazer.", "url": "https://www.imdb.com/title/tt4991812/"}, {"name": "Stay on Board: The Leo Baker Story", "meta": "Suckow, Nicola, and Giovanni Reda, dirs. Stay on Board: The Leo Baker Story. Netflix, 2022.", "desc": "Trans professional skateboarder Leo Baker walks away from a potential Olympic dream to live authentically outside the gender binary, exploring the costs and courage of self-determination.", "url": "https://www.imdb.com/title/tt21100124/"}, {"name": "Family in Transition", "meta": "Trainin, Ofir, dir. Family in Transition. 2018.", "desc": "Israeli documentary following a family navigating a parent's gender transition, examining resilience, love, and generational change across cultural and religious contexts.", "url": "https://www.imdb.com/title/tt8731308/"}, {"name": "TRANSformation", "meta": "TRANSformation. MTV, n.d.", "desc": "MTV documentary following trans teens and young adults as they pursue gender-affirming lives, seeking acceptance from family and community.", "url": "https://www.youtube.com/watch?v=qA5fNBQNVyE"}, {"name": "XY Chelsea", "meta": "Travers Hawkins, Tim, dir. XY Chelsea. Showtime / Dogwoof, 2019.", "desc": "Intimate documentary following Chelsea Manning from her 2017 prison release through her public life as a trans woman, activist, and Senate candidate, exploring identity, courage, and consequence.", "url": "https://www.imdb.com/title/tt6905676/"}, {"name": "Treasure: From Tragedy to TransJustice", "meta": "Treasure: From Tragedy to TransJustice. 2012.", "desc": "Documents the 2011 murder of Shelly 'Treasure' Hilliard, a young Black trans woman in Detroit, and the community activism that arose in response.", "url": "https://video.alexanderstreet.com/watch/treasure-from-tragedy-to-trans-justice"}], "Academic & Scholarly References": [{"name": "Recent Legal Challenges Involving a Child's Gender Identity in School", "meta": "Eckes, Suzanne E., and Maggie L. Paino. \"Recent Legal Challenges Involving a Child's Gender Identity in School: An Exploration of the 'Fundamental' Rights of Parents.\" Wisconsin Journal of Law, Gender, & Society 38 (2023): 36.", "desc": "Surveys the emerging wave of litigation framing parental 'fundamental rights' in conflicts over students' gender identities at school, analyzing how courts are balancing student privacy, trans-inclusive school policies, and parental authority.", "url": "https://repository.law.wisc.edu/s/uwlaw/item/323261"}, {"name": "Putting the ‘T’ in ‘Resource", "meta": "Greytak, Emily A., Joseph G. Kosciw, and Madelyn J. Boesen. \"Putting the ‘T’ in ‘Resource’: The Benefits of LGBT-Related School Resources for Transgender Youth.\" Journal of LGBT Youth, vol. 10, no. 1–2, 2013, pp. 45–63.", "desc": "Empirical study linking the availability of LGBT-related school resources — including GSAs, supportive educators, and inclusive curriculum — to significantly improved academic, social, and mental health outcomes for transgender youth.", "url": "https://www.tandfonline.com/doi/abs/10.1080/19361653.2012.718522"}, {"name": "Transgender Solidarity and Gender Out of Place", "meta": "Mayo, Cris. \"Transgender Solidarity and Gender Out of Place.\" Educational Studies, vol. 60, no. 5, 2024, pp. 483–494.", "desc": "Theorizes 'gender out of place' as a framework for understanding trans students' disruption of normative school spaces, and argues for practices of trans solidarity in educational settings as a counter to legislative erasure.", "url": "https://doi.org/10.1080/00131946.2024.2379042"}, {"name": "Teaching, Affirming, and Recognizing Trans and Gender Creative Youth: A Queer Literacy Framework", "meta": "Miller, sj, ed. Teaching, Affirming, and Recognizing Trans and Gender Creative Youth: A Queer Literacy Framework. Palgrave Macmillan, 2016.", "desc": "Cornerstone edited volume offering a Queer Literacy Framework for affirming trans and gender-creative youth in K–12 classrooms. Won the 2017 AERA Exemplary Research Award for Outstanding Book. Chapters by practitioners and scholars across grade levels and disciplines.", "url": "https://link.springer.com/book/10.1057/978-1-137-56766-6"}], "label": "High School", "count": "130 resources · 10 categories"}, "post": {"Recommended Readings": [{"name": "Currah, Sex Is as Sex Does", "meta": "Currah, Paisley. Sex Is as Sex Does: Governing Transgender Identity. New York University Press, 2022.", "desc": "Political science analysis of how U.S. government agencies — from the DMV to Homeland Security — each set their own sex classification rules, trapping transgender and non-binary people in a contradictory web of legal definitions. Winner of the APSA Sexuality and Politics Book Award. Finalist, PROSE Award.", "url": "https://nyupress.org/9780814717103/sex-is-as-sex-does/"}, {"name": "Black Queer Students’ Counter-Stories of Invisibility in Undergraduate STEM", "meta": "Leyva, Luis A., R. Taylor McNeill, B. R. Balmer, Brittany L. Marshall, V. Elizabeth King, and Zander D. Alley. \"Black Queer Students’ Counter-Stories of Invisibility in Undergraduate STEM as a White, Cisheteropatriarchal Space.\" American Educational Research Journal, vol. 59, no. 5, 2022, pp. 863–904.", "desc": "Draws on Black queer studies to examine four Black queer undergraduates’ experiences of intersectional oppression and agency in STEM spaces framed as White and cisheteropatriarchal, contributing a six-author counter-storytelling study with implications for STEM equity and math education.", "url": "https://doi.org/10.3102/00028312221096455"}, {"name": "Gender and Sexualities in Education: A Reader", "meta": "Meyer, Elizabeth J., and Dennis Carlson, eds. Gender and Sexualities in Education: A Reader. Peter Lang, 2014.", "desc": "Comprehensive anthology bridging queer theory, critical pedagogy, and education policy across 30+ chapters, offering frameworks for advanced study and teacher preparation on gender and sexual diversity in K–12 and higher education.", "url": "https://www.peterlang.com/document/1051405"}, {"name": "Trans+ and Gender Identity Diverse Students’ Right to Use a Bathroom", "meta": "Miller, sj. \"Trans+ and Gender Identity Diverse Students’ Right to Use a Bathroom: Debating Human Dignity.\" Democratic Discord in Schools: Cases and Commentaries in Educational Ethics, edited by Meira Levinson and Jacob Fay, Harvard Education Press, 2019, pp. 191–194.", "desc": "Case study exploring the ethical, legal, and human rights dimensions of restroom access for trans+ and gender-diverse students, advancing frameworks for dignity, inclusion, and educational justice. Contributed to a Harvard Education Press volume of K–12 ethics cases.", "url": "https://sjmiller.info/book-chapters/"}, {"name": "Queer Identity and Theory Intersections in Mathematics Education", "meta": "Moore, Alexander S. \"Queer Identity and Theory Intersections in Mathematics Education: A Theoretical Literature Review.\" Mathematics Education Research Journal, vol. 33, no. 4, 2021, pp. 651–687.", "desc": "Systematic theoretical review of the literature at the intersection of queer identity and mathematical identity, building a framework using intersectionality theory to conceptualize how queer students’ experiences in mathematics are shaped at the confluence of social and disciplinary identity.", "url": "https://doi.org/10.1007/s13394-020-00354-7"}, {"name": "Creating an LGBT+ Inclusive University", "meta": "Shane, Kryss. Creating an LGBT+ Inclusive University: A Practical Resource Guide for Faculty and Administrators. Routledge, 2022.", "desc": "Strategic resource for higher education faculty and administrators providing practical tools for embedding LGBT+ inclusion across teaching, policy, campus climate, and student services. Part of Shane’s series of inclusion guides across K–12, workplace, and university contexts.", "url": "https://www.routledge.com/Creating-an-LGBT-Inclusive-University-A-Practical-Resource-Guide-for-Faculty/Shane/p/book/9781032180847"}, {"name": "Transgender History", "meta": "Stryker, Susan. Transgender History: The Roots of Today’s Revolution. 2nd ed., Seal Press, 2017.", "desc": "Authoritative and accessible overview tracing U.S. trans history from the mid-twentieth century through the 2010s, covering activism, community formation, medical and legal struggles, and cultural transformation. The revised subtitle is 'The Roots of Today’s Revolution.' Foundational for scholars and practitioners in gender studies.", "url": "https://www.amazon.com/Transgender-History-second-Todays-Revolution/dp/158005689X"}, {"name": "Queering Mathematics", "meta": "Yeh, Cathery, and Laurie Rubel. \"Queering Mathematics: Disrupting Binary Oppositions in Mathematics Pre-Service Teacher Education.\" Borders in Mathematics Pre-Service Teacher Education, edited by Nenad Radakovic and Limin Jao, Springer, 2020, pp. 227–243.", "desc": "Book chapter drawing on Anzaldúa’s borderlands theory and Nail’s border theory to examine how binary thinking around gender and sexuality operates in mathematics education, proposing queering as a practice for disrupting these borders in pre-service teacher preparation.", "url": "https://doi.org/10.1007/978-3-030-44292-7_11"}], "News Articles & Substacks": [{"name": "TRANSformation at Brown University Pushes Back Against Attacks on Trans Rights Globally", "meta": "Ahlquist, Steve. \"TRANSformation at Brown University Pushes Back Against Attacks on Trans Rights Globally.\" Uprise RI, steveahlquist.substack.com/p/transformation-at-brown-university.", "desc": "Coverage of a Global Trans Solidarity Rally at Brown University organized by student group TRANSformation during sc": "Nation’s largest family and ally organization supporting LGBTQ+ people through education, advocacy, and grassroots community chapters, with resources for parents, educators, and students at every grade level.", "url": "https://www.pflag.org"}, {"name": "Pink Haven Coalition", "meta": "Pink Haven Coalition. n.d., www.pinkhaven.org.", "desc": "Supports transgender people in prisons and immigration detention centers through advocacy, mutual aid, and connection to legal resources.", "url": "https://www.pinkhaven.org"}, {"name": "Spectra: The Association for LGBTQ+ Mathematicians", "meta": "Spectra: The Association for LGBTQ+ Mathematicians. n.d., https://www.lgbtmath.org/.", "desc": "Professional association of LGBTQIA+ mathematicians organizing conferences, panels, and workshops; supporting student chapters; and advancing visibility and community for queer and trans people in mathematics.", "url": "https://www.lgbtmath.org/"}, {"name": "The Trevor Project", "meta": "The Trevor Project. n.d., www.thetrevorproject.org.", "desc": "Leading national organization providing crisis intervention, suicide prevention, and mental health support for LGBTQ+ youth ages 13–24, with research and advocacy on policies affecting LGBTQ+ student well-being.", "url": "https://www.thetrevorproject.org"}, {"name": "Transgender Law Center", "meta": "Transgender Law Center. n.d., transgenderlawcenter.org.", "desc": "The nation’s largest trans-led civil rights organization advancing rights for transgender and gender-nonconforming people through impact litigation, policy advocacy, and direct legal services, including work in higher education contexts.", "url": "https://transgenderlawcenter.org"}], "Podcasts & Webinars": [{"name": "Gender Reveal", "meta": "Gender Reveal. Hosted by Tuck Woodstock. n.d., www.genderpodcast.com.", "desc": "Weekly podcast exploring the vast diversity of trans and nonbinary experiences through interviews with artists, activists, academics, and everyday trans people. Relevant for educators seeking trans and nonbinary perspectives across identity, politics, and culture.", "url": "https://www.genderpodcast.com"}, {"name": "Welcoming Schools – HRC Foundation", "meta": "Human Rights Campaign Foundation. Welcoming Schools. n.d., https://www.hrc.org/our-work/welcoming-schools.", "desc": "Comprehensive K–5 anti-bias and LGBTQ+-inclusive program from the HRC Foundation providing lesson plans, educator guides, read-aloud resources, and professional development for creating affirming, family-diverse elementary school environments. Note: Welcoming Schools is primarily a curriculum and resource hub, not a dedicated webinar series.", "url": "https://www.hrc.org/our-work/welcoming-schools"}, {"name": "Making Gay History", "meta": "Making Gay History. Hosted by Eric Marcus. n.d., makinggayhistory.com.", "desc": "Oral history podcast bringing LGBTQ+ pioneers and civil rights activists to life through rare archival recordings, with each episode centering a different trailblazer from the last century of queer history.", "url": "https://makinggayhistory.com"}, {"name": "Math Ed Podcast, Ep. 2404: Luis Leyva – Queer of Color Justice in Undergraduate Mathematics Education", "meta": "Math Ed Podcast. “Luis Leyva – Queer of Color Justice in Undergraduate Mathematics Education.” Episode 2404. Hosted by Samuel Otten. 31 Mar. 2024, mathedpodcast.com.", "desc": "Luis Leyva (Vanderbilt University) discusses his article “Queer of Color Justice in Undergraduate Mathematics Education,” published in Notices of the American Mathematical Society (Vol. 71, 2024), exploring how undergraduate mathematics environments can better support queer students of color through inclusive pedagogy and belonging. 35 minutes.", "url": "https://www.podomatic.com/podcasts/mathed/episodes/2024-03-31T06_15_14-07_00"}, {"name": "Math Therapy Podcast, S4E10: Queering Math with Dr. Anthony Bonato", "meta": "Math Therapy. “S4E10: Queering Math w/ Dr. Anthony Bonato.” Hosted by Vanessa Vakharia. 26 May 2022, www.maththerapypodcast.com/1734392/episodes/10642920.", "desc": "Host Vanessa Vakharia (The Math Guru) and Toronto Metropolitan University mathematics professor Dr. Anthony Bonato discuss what it means to be queer in academic mathematics, barriers to inclusion, advocacy for diversity, and the need to invite every person to the mathematical table. Note: recorded December 2021; released May 26, 2022. 27 minutes.", "url": "https://www.maththerapypodcast.com/1734392/episodes/10642920"}, {"name": "Teaching Math Teaching Podcast, Ep. 44: Kyle Whipple – LGBTQ+ Inclusion in Mathematics Education", "meta": "Teaching Math Teaching Podcast. “Kyle Whipple: LGBTQ+ Inclusion in Mathematics Education.” Episode 44. Association for Mathematics Teacher Educators, 28 Apr. 2021, www.teachingmathteachingpodcast.com/44.", "desc": "Dr. Kyle Whipple (University of Wisconsin–Eau Claire) discusses curriculum examples, classroom culture shifts, and practical strategies for LGBTQ+ inclusion in mathematics education. Hosted by AMTE (Association for Mathematics Teacher Educators). 25 minutes.", "url": "https://www.teachingmathteachingpodcast.com/44"}, {"name": "TransLash Podcast with Imara Jones", "meta": "TransLash. TransLash Podcast with Imara Jones. translash.org, n.d.", "desc": "Weekly podcast hosted by journalist and activist Imara Jones covering anti-trans legislation, grassroots activism, trans culture, and the human stories behind the headlines. Centering Black trans voices throughout.", "url": "https://translash.org"}], "Open-Access Curricula & OER Repositories": [{"name": "Glisten Inclusive Lesson Plans", "meta": "Glisten. Inclusive Lesson Plans. n.d., https://glisten.org/resources/inclusive-lesson-plans/.", "desc": "Open-access educator guides from Glisten for embedding LGBTQ+ topics across content areas, including mathematics, with practical classroom tools, lesson frameworks, and professional development resources for K–12 teachers.", "url": "https://glisten.org/resources/inclusive-lesson-plans/"}, {"name": "It Gets Better EDU", "meta": "It Gets Better Project. It Gets Better EDU. n.d., itgetsbetter.org/edu/.", "desc": "Free educator and student leader resources from the It Gets Better Project, including EduGuides with discussion questions, activities, and lesson plans built around LGBTQ+ storytelling and affirmation. Includes a Youth Voices ambassador program.", "url": "https://itgetsbetter.org/edu/"}, {"name": "LGBTQIA+ Resources for P-20 Educators in Teacher Education, Allied Health, and Human Services", "meta": "Miller, sj. LGBTQIA+ Resources for P-20 Educators in Teacher Education, Allied Health, and Human Services. New Mexico OER Consortium / University of New Mexico, 2026, nmoer.pressbooks.pub/lgtbqresources/.", "desc": "Open-access Pressbooks OER by sj Miller (Santa Fe Community College) curating practical frameworks, lesson resources, documentary guides, pronoun posters, and podcast lists for educators in K–12, teacher education, allied health, and human services seeking to build inclusive environments for LGBTQIA+ individuals. Creative Commons licensed.", "url": "https://nmoer.pressbooks.pub/lgtbqresources/"}, {"name": "OER Commons – LGBTQ+ Inclusive Education Hub", "meta": "OER Commons. LGBTQ+ Inclusive Education Hub. n.d., https://oercommons.org/browse?f.keyword=lgbtq", "desc": "Open educational resources platform hosting openly licensed, adaptable LGBTQ+-inclusive teaching materials, lesson plans, and curricula across grade levels. Search ‘LGBTQ’ within OER Commons to access curated collections.", "url": "https://oercommons.org/browse?f.keyword=lgbtq"}, {"name": "LGBTQIA+ Math Resources – SABES Mathematics and Adult Numeracy Curriculum", "meta": "SABES and TODOS: Mathematics for ALL. LGBTQIA+ Math Resources. n.d., sabes.org/content/lgbtqia-math-resources/.", "desc": "Curated repository from SABES providing articles, lesson plans, classroom activities, and a recorded webinar explicitly designed to support LGBTQIA+ inclusion and identity-affirmation in K–12 and adult education mathematics contexts.", "url": "https://sabes.org/content/lgbtqia-math-resources/math-and-numeracy-sabes-mathematics-and-adult-numeracy-curriculum"}], "Activist Groups & Campaigns": [{"name": "Advocates for Trans Equality (A4TE)", "meta": "Advocates for Trans Equality. n.d., transequality.org.", "desc": "National trans-led nonprofit formed in October 2024 from the merger of the National Center for Transgender Equality (NCTE) and TLDEF, advancing legal rights and political equality for transgender people through policy advocacy, litigation, and direct services including ID document support.", "url": "https://transequality.org"}, {"name": "Glisten – Day of Silence & Solidarity Week", "meta": "Glisten. Day of Silence and Solidarity Week. n.d., https://glisten.org/campaigns/dayofsilence/.", "desc": "Student-led national campaigns organized by Glisten: Day of Silence raises awareness of the silencing effect of anti-LGBTQ+ bullying and harassment in schools; Solidarity Week centers LGBTQ+ visibility and allyship across school communities. Both provide educator and student toolkits.", "url": "https://glisten.org/campaigns/dayofsilence/"}, {"name": "It Gets Better Project", "meta": "It Gets Better Project. n.d., itgetsbetter.org.", "desc": "Global nonprofit using storytelling and digital media to uplift and affirm LGBTQ+ youth worldwide, promoting inclusion and empowerment through video campaigns, the It Gets Better EDU educator platform, and the Youth Voices ambassador program.", "url": "https://itgetsbetter.org"}, {"name": "oSTEM", "meta": "oSTEM. Out in Science, Technology, Engineering, and Mathematics. n.d., www.ostem.org.", "desc": "Nationwide professional society with 100+ collegiate and professional chapters dedicated to empowering LGBTQ+ people in STEM, including mathematics, through community building, leadership training, mentorship, and career resources.", "url": "https://www.ostem.org"}, {"nam
