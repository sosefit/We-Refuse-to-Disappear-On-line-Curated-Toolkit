e": "Radical Math", "meta": "Radical Math. n.d., radicalmath.org.", "desc": "Educator-founded initiative providing tools, lesson plans, and resources for teaching mathematics through a social and racial justice lens. Content addresses economic inequality, immigration, and environmental justice. Note: LGBTQIA+ is not a primary labeled focus area — inclusion is addressed intersectionally rather than through dedicated LGBTQIA+ materials.", "url": "https://radicalmath.org"}, {"name": "Spectra: The Association for LGBTQ+ Mathematicians", "meta": "Spectra: The Association for LGBTQ+ Mathematicians. n.d., spectra-math.org.", "desc": "National network and advocacy organization supporting LGBTQIA+ mathematicians and students through visibility campaigns, networking, mentoring, conference programming, and student chapter development within mathematics education and research.", "url": "https://www.lgbtmath.org/"}, {"name": "Trans Youth Equality Foundation (TYEF)", "meta": "Trans Youth Equality Foundation. n.d., www.transyouthequality.org.", "desc": "Organization providing education, advocacy, and support for transgender and gender-diverse youth and their families, with resources for school inclusion, family support, and community-building across K–12 settings.", "url": "https://www.transyouthequality.org"}], "Films, Documentaries & Visual Media": [{"name": "The Freedom to Exist: A Soul of a Nation Presentation", "meta": "ABC News Studios. The Freedom to Exist: A Soul of a Nation Presentation. ABC News Studios, 2023.", "desc": "ABC News documentary examining the lived experiences of LGBTQ+ Americans amid a wave of anti-trans legislation, part of the Soul of a Nation series.", "url": "https://www.hulu.com/series/the-freedom-to-exist-a-soul-of-a-nation-presentation-e9635b6f-950b-46f9-bb3a-73f4afe3a828"}, {"name": "Archivo de la Memoria Trans (AMT)", "meta": "Archivo de la Memoria Trans. Buenos Aires, Argentina. n.d.", "desc": "Community-run collective documenting trans, travesti, and gender-diverse lives across Argentina and Latin America through photographs, videos, press clippings, police files, and personal objects spanning the 20th century. Founded by María Belén Correa and Cecilia Estalles; operates entirely on donations and volunteer labor.", "url": "https://www.facebook.com/archivotrans"}, {"name": "Trans", "meta": "Arnold, Chris, dir. Trans. 2012.", "desc": "Documentary highlighting multiple transgender experiences across age, race, and geography in the United States.", "url": "https://www.imdb.com/title/tt2351417/"}, {"name": "Digital Transgender Archive (DTA)", "meta": "Digital Transgender Archive. Northeastern University, n.d., www.digitaltransgenderarchive.net.", "desc": "International collaboration among 60+ institutions providing an online hub for digitized historical materials, born-digital materials, and information on archival holdings related to global trans history. Emphasizes self-identified trans communities, genders outside Western binaries, and under-documented voices of Black, Indigenous, and people of color.", "url": "https://www.digitaltransgenderarchive.net"}, {"name": "Disclosure", "meta": "Feder, Sam, dir. Disclosure. Netflix, 2020.", "desc": "Laverne Cox executive produces this wide-ranging examination of Hollywood's historical depictions of trans people and the real-world consequences for trans lives and public understanding.", "url": "https://www.samfederfilms.com/disclosure"}, {"name": "GLBT Historical Society Archives", "meta": "GLBT Historical Society. Dr. John P. De Cecco Archives and Special Collections. n.d., www.glbthistory.org.", "desc": "One of the largest LGBTQ+ archives in the U.S., with 1,000+ collections occupying 4,000+ linear feet, including significant holdings of transgender history, oral histories, photographs, artifacts, and ephemera. Founded 1985; located in San Francisco, CA.", "url": "https://www.glbthistory.org"}, {"name": "Growing Up Coy", "meta": "Growing Up Coy. Directed by Eric Juhola. 2016.", "desc": "Documentary following Coy Mathis and her family's landmark legal case for her right to use the school restroom consistent with her gender identity, exploring broader questions of transgender rights in K–12 education.", "url": "https://www.imdb.com/title/tt5648966/"}, {"name": "IHLIA LGBTI Heritage", "meta": "IHLIA LGBTI Heritage. Amsterdam, Netherlands, n.d., ihlia.nl.", "desc": "The largest LGBTI heritage collection in Europe, housed at OBA (Amsterdam Public Library). Holds significant transgender-related archival materials from 150+ countries in 60+ languages, including the Open Up! collection focusing on Central, Eastern, and Southeastern Europe and non-Western regions.", "url": "https://ihlia.nl/en/"}, {"name": "Jean-Nickolaus Tretter Collection in Gay, Lesbian, Bisexual and Transgender Studies", "meta": "Jean-Nickolaus Tretter Collection in Gay, Lesbian, Bisexual and Transgender Studies. University of Minnesota Libraries, n.d., www.lib.umn.edu/collections/special/tretter.", "desc": "The largest LGBTQ+ archival repository in the Midwest, with 500+ collections of queer and trans materials in 58 languages spanning all time periods. Home of the Tretter Transgender Oral History Project (TTOHP), currently the largest trans oral history project in the world, with 200+ interviews.", "url": "https://www.lib.umn.edu/collections/special/tretter"}, {"name": "The Most Dangerous Year", "meta": "Knowlton, Vlada, dir. The Most Dangerous Year. Marymoor Productions / Passion River Films, 2018.", "desc": "Filmmaker and parent Vlada Knowlton documents the civil rights battle in Washington State against six anti-transgender ‘bathroom bills,’ centering the perspective of families with young trans children. Premiered at the 2018 Seattle International Film Festival.", "url": "https://www.imdb.com/title/tt5532368/"}, {"name": "Little Girl (Petite Fille)", "meta": "Little Girl (Petite Fille). Directed by Sébastien Lifshitz. Arte France Cinéma, 2020.", "desc": "French documentary following Sasha, an 8-year-old transgender girl, and her family's journey toward acceptance and support in navigating daily life, school, and medical consultations. Useful for teachers supporting elementary students' gender identities.", "url": "https://www.imdb.com/title/tt11753696/"}, {"name": "Museum of Transology (MoT)", "meta": "Museum of Transology. London, UK, n.d., museumoftransology.com.", "desc": "Community-archive and museum founded in 2014 by E-J Scott. Holds nearly 1,500 digitized objects donated by trans, non-binary, and intersex people, each accompanied by a handwritten message explaining its significance. Physical collection housed at Bishopsgate Institute, London; open-source model encourages replication globally.", "url": "https://www.museumoftransology.com"}, {"name": "ONE National Gay & Lesbian Archives (ONE Archives Foundation)", "meta": "ONE Archives Foundation. ONE National Gay & Lesbian Archives. University of Southern California, n.d., www.onearchives.org.", "desc": "The world’s largest LGBTQ+ archive, located at USC Libraries. Holds extensive historical materials including trans lives and narratives; a key supplementary resource for trans history research alongside trans-specific archives.", "url": "https://www.onearchives.org"}, {"name": "Orlando, My Political Biography", "meta": "Preciado, Paul B., dir. Orlando, My Political Biography. 2023.", "desc": "Paul B. Preciado re-imagines Virginia Woolf’s Orlando through 26 trans and non-binary people who each embody aspects of the character, blending autobiography, philosophy, and documentary.", "url": "https://www.imdb.com/title/tt26448981/"}, {"name": "Trans History Archives (Resource Hub)", "meta": "Trans Lifeline. Trans History Archives. n.d., translifeline.org/resource_category/trans-history/.", "desc": "Curated online resource hub maintained by Trans Lifeline linking to digitized historical materials, born-digital resources, and information on archival holdings related to transgender history worldwide. Useful entry point for educators and researchers accessing global trans history archives.", "url": "https://translifeline.org/resource_category/trans-history/"}, {"name": "Transgender Archives at the University of Victoria (TAV)", "meta": "Transgender Archives at the University of Victoria. University of Victoria Libraries, n.d., www.uvic.ca/transgenderarchives/.", "desc": "The world’s largest dedicated trans archive, holding materials spanning 120+ years in 15 languages from 23 countries on six continents. Includes the Mapping Transgender Activism Project, an online discovery tool for periodicals, and extensive collections from Reed Erickson, the University of Ulster Trans-Gender Archive, and others. Open to the public.", "url": "https://www.uvic.ca/transgenderarchives/index.php"}], "Academic & Scholarly References": [{"name": "Book Banning and Contractual Expectations of White Cisheteropatriarchy", "meta": "Adelman, Madelaine, Daniel D. Liou, Courtney Langerud, Michael Rady, and Shweta Moorthy. “Book Banning and Contractual Expectations of White Cisheteropatriarchy: A Praxis for Epistemic Justice in K–12 Schools.” Discourse: Studies in the Cultural Politics of Education, vol. 45, no. 5–6, 2024, pp. 734–753.", "desc": "Analyzes how book bans reinforce white cisheteropatriarchal curricular expectations and harm LGBTQ+ students, offering an epistemic justice praxis grounded in the racial contract. Centers GLSEN’s Rainbow Library as a counterforce.", "url": "https://doi.org/10.1080/01596306.2024.2426302"}, {"name": "Gender: Your Guide (2nd ed.)", "meta": "Airton, Lee. Gender: Your Guide: The Gender-Friendly Primer on What to Know, What to Say, and What to Do in the New Gender Culture. 2nd ed., Adams Media, 2024.", "desc": "Accessible, warmly written primer on gender diversity, terminology, pronouns, and allyship for general audiences. Updated 2024 edition covers conversion therapy bans, trans youth in sports, and online community developments.", "url": "https://www.simonandschuster.com/books/Gender-Your-Guide-2nd-Edition/Lee-Airton/9781507220313"}, {"name": "Whole-of-School Approaches", "meta": "Bartholomaeus, Clare, and Damien W. Riggs. “Whole-of-School Approaches to Supporting Transgender Students, Staff, and Parents.” International Journal of Transgenderism, vol. 18, no. 4, 2017, pp. 361–366.", "desc": "Outlines system-wide strategies for creating trans-affirming school climates by engaging students, staff, and families collectively rather than focusing narrowly on individual trans students.", "url": "https://doi.org/10.1080/15532739.2017.1355648"}, {"name": "Pleasure Activism", "meta": "brown, adrienne maree, ed. Pleasure Activism: The Politics of Feeling Good. AK Press, 2019.", "desc": "Interdisciplinary anthology centering the political dimensions of joy, healing, and desire, with essays by Audre Lorde, micha cárdenas, and others examining how pleasure and embodied freedom are acts of resistance and world-making.", "url": "https://www.akpress.org/pleasure-activism.html"}, {"name": "Queering Human Rights Education (IJHRE Special Issue)", "meta": "Donahue, David, Lori Selke, Maria Autrey Noriega, and Mauro Sifuentes. “Queering Human Rights Education: Research, Praxis and Liberation for LGBTQIA2S+.” International Journal of Human Rights Education, vol. 9, no. 1, 2025.", "desc": "Introduces a special issue centering queer liberatory approaches to human rights education, framing queer as noun, adjective, and verb to challenge binary thinking and center LGBTQIA2S+ joy, resistance, and liberation across educational and community spaces.", "url": "https://repository.usfca.edu/ijhre/vol9/iss1/1"}, {"name": "Beyond Bathroom Bills", "meta": "Farley, Amy N., and Bethy Leonardi. “Beyond Bathroom Bills and the Gender Identity Debate: Complicating the Policy Conversation about Supporting Trans Students in Schools.” Educational Policy, vol. 35, no. 2, 2021, pp. 274–303.", "desc": "Uses critical trans politics to analyze survey data from families of trans and gender-expansive youth in one mountain state, finding that parents desire transformative rather than narrowly bathroom-focused school policies.", "url": "https://doi.org/10.1177/0895904820986770"}, {"name": "Trap Door", "meta": "Gossett, Reina, Eric A. Stanley, and Johanna Burton, eds. Trap Door: Trans Cultural Production and the Politics of Visibility. MIT Press, 2017.", "desc": "Foundational critical anthology examining the paradoxes and possibilities of trans visibility through art, activism, and cultural production, with contributions from scholars and activists including micha cárdenas, CeCe McDonald, Miss Major, and Dean Spade.", "url": "https://mitpress.mit.edu/9780262544894/trap-door/"}, {"name": "Scholars Call on Educational Field to Protect LGBTQ+ Youth", "meta": "Herder, Liann. “Scholars Call on Educational Field to Protect LGBTQ+ Youth.” Diverse: Issues in Higher Education, 21 Feb. 2023.", "desc": "News feature summarizing an open statement by educational scholars calling for schools to serve as safe, affirming environments for LGBTQ+ students, particularly trans youth, in response to a wave of 2023 anti-LGBTQ+ legislation.", "url": "https://www.diverseeducation.com/demographics/lgbtq/article/15307085/scholars-call-on-educational-field-to-protect-lgbtq-youth"}, {"name": "Supporting Transgender Students and Gender-Expansive Education", "meta": "Martino, Wayne. “Supporting Transgender Students and Gender-Expansive Education in Schools: Investigating Policy, Pedagogy, and Curricular Implications.” Teachers College Record, vol. 124, no. 8, 2022, pp. 3–16.", "desc": "Introduction to a landmark special issue on trans and nonbinary education; maps policy, pedagogical, and curricular levers for gender-expansive schooling and calls for moving beyond individualized accommodation toward systemic change.", "url": "https://doi.org/10.1177/01614681221121513"}, {"name": "LGBTQ Youth and Education (2nd ed.)", "meta": "Mayo, Cris. LGBTQ Youth and Education: Policies and Practices. 2nd ed., Teachers College Press, 2022.", "desc": "Comprehensive and theoretically grounded analysis of policies and practices affecting LGBTQ youth in K–12 and postsecondary education, examining curriculum, school climate, family dynamics, and legal frameworks. Updated 2022 edition.", "url": "https://eric.ed.gov/?id=ED617676"}, {"name": "Supporting Gender-Inclusive Schools", "meta": "McQuillan, Mollie T., and Jennifer Leininger. “Supporting Gender-Inclusive Schools: Educators’ Beliefs about Gender Diversity Training and Implementation Plans.” Leading Socially Just Schools, edited by [editors], Routledge, 2023, pp. 162–182.", "desc": "Examines educator beliefs about gender diversity professional development and how those beliefs shape implementation planning for gender-inclusive school practices.", "url": "http://taylorfrancis.com/chapters/edit/10.4324/9781003357667-16/supporting-gender-inclusive-schools-educators-beliefs-gender-diversity-training-implementation-plans-mollie-mcquillan-jennifer-leininger"}, {"name": "Disruptive Power of Policy Erasure", "meta": "McQuillan, Mollie T., Benjamin A. Lebovitz, and LaShanda Harbin. “The Disruptive Power of Policy Erasure: How State Legislators and School Boards Fail to Take Up Trans-Affirming Policies While Leaning into Anti-LGBTQ+ Policies.” Educational Policy, vol. 38, no. 3, 2024, pp. 642–699.", "desc": "Examines policy analysis across three Midwestern states to show how ‘policy erasure’—the absence of trans-inclusive protections—coexists with expanding anti-LGBTQ+ legislation, and how LGBTQ+ and CRT curricular bans overlap.", "url": "https://doi.org/10.1177/08959048231218206"}, {"name": "Gender-Inclusivity Leadership Spectrum", "meta": "McQuillan, Mollie T., Janel Anderson, and Lydia Gandy-Fastovich. “‘Sometimes It’s Hard to Do the Right Thing’: The Gender-Inclusivity Leadership Spectrum of How PK–12 Administrators Understand Gender Diversity Laws, Policies, and Implementation.” American Educational Research Journal, vol. 62, no. 1, 2025, pp. 14–52.", "desc": "Applies sensemaking theory to 36 interviews with administrators to delineate resistant, emergent, and gender-inclusive leadership approaches along a Gender-Inclusivity Leadership Spectrum.", "url": "https://doi.org/10.3102/00028312241281731"}, {"name": "Gender Identity Justice in Schools and Communities", "meta": "Miller, sj. About Gender Identity Justice in Schools and Communities. Teachers College Press, 2019.", "desc": "Framework and practical guidance for advancing gender identity justice in schools and communities, building on Miller’s Queer Literacy Framework to offer tools for administrators, teachers, and community members.", "url": "https://www.tcpress.com/products/about-gender-identity-justice-in-schools-and-communities_9780807761250"}, {"name": "The Impact and Role of Emotions in Schools", "meta": "Miller, sj. “The Impact and Role of Emotions in Schools for Teachers and Students with Complex Gender Identities.” Teachers College Record, vol. 121, no. 13, 2019.", "desc": "Argues for centering affect and emotion in schooling for teachers and students with complex gender identities, drawing on trans+ frameworks to show how emotional experience shapes learning, belonging, and identity in K–12 contexts.", "url": "https://doi.org/10.1177/016146811912101307"}, {"name": "Reframing Schooling to Liberate Gender Identity", "meta": "Miller, sj. “Reframing Schooling to Liberate Gender Identity.” Multicultural Perspectives, vol. 20, no. 2, 2018, pp. 70–80.", "desc": "Articulates a liberatory reframing of schooling around gender identity, proposing that schools move beyond surface representation toward structural transformation that affirms trans and gender-complex students and teachers.", "url": "https://doi.org/10.1080/15210960.2018.1447067"}, {"name": "Sex and Gender in Transition in US Schools", "meta": "Miller, sj, Cris Mayo, and Catherine A. Lugg. “Sex and Gender in Transition in US Schools: Ways Forward.” Sex Education, vol. 18, no. 4, 2017, pp. 345–359.", "desc": "Interdisciplinary analysis of the legal, policy, and lived landscape for transgender youth in U.S. schools, mapping current struggles and pathways toward gender justice across law, pedagogy, and community.", "url": "https://doi.org/10.1080/14681811.2017.1415204"}, {"name": "Queer and Trans Resilience", "meta": "Singh, Anneliese A., R. Finan, and R. Estevez. \"Queer and Trans Resilience: Moving from Affirmation to Liberation in Our Collective Healing.\" Identity as Resilience in Minoritized Communities: Strengths-Based Approaches to Research and Practice, edited by J. M. Koch, E. E. Townsend-Bell, and R. D. Hubach, Springer Nature, 2023, pp. 1–22.", "desc": "Summarizes key constructs related to affirmative and liberatory helping approaches with queer and 2STNB (two-spirit, trans, nonbinary) people, including strength-based perspectives, family resilience, and policy and practice intersections. Grounded in Dr. Singh's 2021 Chautauqua Conference keynote on queer and trans resilience.", "url": "https://link.springer.com/chapter/10.1007/978-3-031-38977-1_1"}, {"name": "Normal Life", "meta": "Spade, Dean. Normal Life: Administrative Violence, Critical Trans Politics, and the Limits of Law. 2nd ed., Duke University Press, 2015.", "desc": "Rigorous critique of rights-only legal frameworks for trans liberation, arguing that administrative systems cause pervasive harm and that grassroots organizing and systemic transformation are necessary for trans justice.", "url": "https://www.dukeupress.edu/normal-life-revised"}, {"name": "Differences in Trans Employees’ and Students’ School Experiences", "meta": "Suárez, Mario I., Mollie T. McQuillan, Harper B. Keenan, and Lee Iskander. “Differences in Trans Employees’ and Students’ School Experiences.” Educational Researcher, vol. 51, no. 5, 2022, pp. 352–358.", "desc": "Survey-based research brief comparing the workplace and school experiences of 296 trans PK–12 workers and students in the U.S. and Canada, revealing high levels of discrimination and a significant gap in administrative guidance for trans staff versus trans students.", "url": "https://doi.org/10.3102/0013189X221100834"}, {"name": "Envisioning Queer Curricula", "meta": "Suárez, Mario I., Samantha M. Meister, and Amanda L. Lindner. “Envisioning Queer Curricula: A Systematic Review of LGBTIQ+ Topics in Teacher Practitioner Literature.” Journal of LGBT Youth, vol. 18, no. 3, 2021, pp. 239–255.", "desc": "Systematic review of LGBTIQ+ content across 13 leading practitioner journals accessible to PreK–12 teachers, finding that LGBTIQ+ topics remain underrepresented—especially in mathematics and science—and identifying trends before and after Miller’s 2015 Queer Literacy Framework.", "url": "https://eric.ed.gov/?id=EJ1298753"}, {"name": "Trans Studies in K–12 Education", "meta": "Suárez, Mario I., and Melinda M. Mangin, eds. Trans Studies in K–12 Education: Creating an Agenda for Research and Practice. Harvard Education Press, 2022.", "desc": "Groundbreaking edited collection linking research and classroom practice to advance trans studies across K–12 education through critical inquiry, policy analysis, and pedagogy.", "url": "https://hep.gse.harvard.edu/9781682537817/trans-studies-in-k-12-education/"}, {"name": "Anti-LGBTQ+ Sex Education Laws", "meta": "Tran, Jennifer T., Nele Loecher, Kristin A. Kosyluk, and José A. Bauermeister. “Anti-LGBTQ+ Sex Education Laws: The Effects on Students and Implications for Schools and School Practitioners.” Psychology in the Schools, vol. 60, no. 12, 2023, pp. 5062–5075.", "desc": "Synthesizes the historical context and empirical literature on anti-LGBTQ+ sex education laws, examines their documented harms on student wellbeing and identity, and recommends concrete actions for school practitioners in restrictive policy environments.", "url": "https://doi.org/10.1002/pits.23013"}], "label": "Cross-band Resources", "count": "126 resources · 10 categories"}, "sped": {"Recommended Readings": [], "News Articles & Substacks": [], "Policy Reports": [], "Policy Trackers": [], "Political & Social Organizations": [], "Podcasts & Webinars": [], "Open-Access Curricula & OER Repositories": [], "Activist Groups & Campaigns": [], "Films, Documentaries & Visual Media": [], "Academic & Scholarly References": [], "label": "Special Education", "count": "Resources coming soon"}}, "ss": {"elem": {"Recommended Readings": [{"name": "Learning for Justice – Best Practices for Serving LGBTQ Students", "meta": "Collins, Cory, and Jey Ehrenhalt. \"Best Practices for Serving LGBTQ Students.\" Learning for Justice / SPLC, 3 July 2022.", "desc": "Comprehensive, field-tested guide for K–12 school leaders and educators covering school policy assessment, inclusive classroom culture and instruction, and family and community engagement. Includes glossary and recommended LGBTQ+ books, films, and historical figures.", "url": "https://www.splcenter.org/resources/reports/best-practices-for-serving-lgbtq-students/"}, {"name": "Teachers' Strategies for Supporting Transgender and/or Gender-Expansive Elementary School Students", "meta": "Mangin, Melinda M. \"Teachers’ Strategies for Supporting Transgender and/or Gender-Expansive Elementary School Students.\" Educational Researcher, vol. 51, no. 5, 2022, pp. 324–335.", "desc": "Qualitative study with observations and interviews from 31 elementary teachers across five schools, identifying three core strategies: decreasing gendered practices, increasing discussions about gender, and affirming children's gender identity and expression. Finds consistency of support challenged by entrenched habits and beliefs.", "url": "https://doi.org/10.3102/0013189X221084666"}, {"name": "LGBTQ+-Inclusive Professional Development in Elementary Schools", "meta": "McQuillan, Mollie T., Erin K. Gill, and Xue Gong. \"LGBTQ+-Inclusive Professional Development in Elementary Schools: Does It Matter to Schoolwide Discipline?\" Journal of School Leadership, vol. 33, no. 4, 2023, pp. 382–408.", "desc": "Mixed-methods study examining whether sustained, intensive LGBTQ+-inclusive professional development (IPD) in a large Midwestern district's elementary schools relates to schoolwide disciplinary rates, finding schools with IPD experienced significant declines in disciplinary incidents including assaults and endangering behaviors.", "url": "https://doi.org/10.1177/10526846231174051"}, {"name": "Contextualizing LGBT+ History within the Social Studies Curriculum", "meta": "National Council for the Social Studies. \"Contextualizing LGBT+ History within the Social Studies Curriculum.\" NCSS, 2019.", "desc": "NCSS position statement affirming the civic, ethical, and moral imperatives of advancing LGBTQ+-inclusive social studies curriculum, with resources for PK–12 educators. Widely cited as national guidance for bringing LGBTQ+ history and family diversity into elementary and secondary social studies practice.", "url": "https://www.socialstudies.org/position-statements/contextualizing-lgbt-history-within-social-studies-curriculum"}, {"name": "OutHistory – Digital Archives and Exhibits", "meta": "OutHistory. OutHistory: The Website for Lesbian, Gay, Bisexual, Transgender, and Queer History. OutHistory / Fund for the City of New York, 2008–.", "desc": "Public history website featuring 200+ scholar-curated digital exhibitions on LGBTQ history in the U.S. and Canada, built from primary sources. Used by educators at all grade levels to introduce students to primary source analysis relating to the LGBTQ past. Includes community-contributed histories, oral histories, and a historian-authored bookshelf.", "url": "https://outhistory.org/"}, {"name": "A Rapid Realist Review of Universal Interventions", "meta": "Schlief, Merle, Theodora Stefanidou, Talen Wright, Grace Levy, Alexandra Pitman, and Gemma Lewis. \"A Rapid Realist Review of Universal Interventions to Promote Inclusivity and Acceptance of Diverse Sexual and Gender Identities in Schools.\" Nature Human Behaviour, vol. 7, no. 4, 2023, pp. 556–567.", "desc": "Systematic realist review of 53 studies across five intervention themes — student pride clubs, inclusive antibullying policies, inclusive curricula, workshops, and staff training — finding interventions work best when staff are trained and school climate is supportive, with less effectiveness for boys, gender minority students, and bisexual students.", "url": "https://doi.org/10.1038/s41562-023-01521-z"}, {"name": "The Trans Generation", "meta": "Travers, Ann. The Trans Generation: How Trans Kids (and Their Parents) Are Creating a Gender Revolution. New York University Press, 2018.", "desc": "Award-winning sociological study based on interviews with 19 transgender kids (ages 4–20) and 23 parents across the U.S. and Canada, examining how binary-enforcing institutions — schools, bathrooms, sports teams, medical clinics — shape trans children's lives. Winner of the 2019 PROSE Award.", "url": "https://nyupress.org/9781479885794/the-trans-generation/"}, {"name": "Implementing LGBTQ+ Curriculum in Early Education", "meta": "Walker, Mahri. Implementing LGBTQ+ Curriculum in Early Education: Challenges and Opportunities. California State University, Monterey Bay, 2021.", "desc": "Qualitative capstone thesis examining early education contexts and how age-appropriate discussions of family diversity, gender expression, and identity can be implemented in elementary settings, with attention to teacher preparation and institutional barriers.", "url": "https://digitalcommons.csumb.edu/caps_thes_all/1271"}, {"name": "Teaching About Gender Diversity", "meta": "Woolley, Susan W., and Lee Airton, eds. Teaching About Gender Diversity: Teacher-Tested Lesson Plans for K–12 Classrooms. Canadian Scholars, 2020.", "desc": "Edited collection of teacher-tested interdisciplinary lesson plans for K–12 educators across subject areas including ELA, STEM, and health/PE. Organized by grade band (elementary K–5, middle 6–9, secondary 10–12). Includes mathematics lessons engaging gender terminology, stereotypes, and the social construction of binary gender.", "url": "https://canadianscholars.ca/books/teaching-about-gender-diversity"}], "News Articles & Substacks": [{"name": "At This Soon-to-be Brooklyn School, the Future Is Trans", "meta": "Chaltain, Sam. “At This Soon-to-be Brooklyn School, the Future Is Trans.” Letters from the Future (of Learning), 3 May 2023.", "desc": "Profiles Trans formative Schools (TfS), a Brooklyn-based trans-centered educational community designed to center trans joy and social justice through rigorous academics, identity exploration, and progressive practices, with the goal of opening a trans middle school.", "url": "https://samchaltain.substack.com/p/at-this-soon-to-be-brooklyn-school"}, {"name": "Student Voice: For LGBTQ Teens, ‘Hope Does Exist’", "meta": "Hartman, Luke. “Student Voice: For LGBTQ Teens, ‘Hope Does Exist.’” PBS NewsHour Classroom, 7 Feb. 2019.", "desc": "First-person reflection by Luke Hartman, alumnus of Immanuel Christian School, on growing up LGBTQ+ in a faith-based environment, the importance of visibility and support, and reaching out to organizations like The Trevor Project for help and hope.", "url": "https://www.pbs.org/newshour/classroom/classroom-voices/student-voices/2019/02/student-voice-for-lgbtq-teens-hope-does-exist"}, {"name": "PBS NewsHour – LGBTQ Tag Page (ongoing)", "meta": "PBS NewsHour. “LGBT.” PBS NewsHour, ongoing, www.pbs.org/newshour/tag/lgbt.", "desc": "Curated PBS NewsHour tag page aggregating ongoing news segments, reports, and interviews on LGBTQ+ issues including youth mental health, anti-LGBTQ+ legislation, trans athlete bans, and school climate.", "url": "https://www.pbs.org/newshour/tag/lgbt"}, {"name": "LGBTQ+ Students Feel the Weight of a Push for Parents’ Rights", "meta": "Stanford, Libby. “LGBTQ+ Students Feel the Weight of a Push for Parents’ Rights.” Education Week, 14 Sept. 2023.", "desc": "Examines the documented toll of parental rights legislative campaigns on LGBTQ+ students' mental health and school belonging, with expert guidance for educators navigating Don't Say Gay laws and parental notification mandates.", "url": "https://www.edweek.org/leadership/lgbtq-students-feel-the-weight-of-a-push-for-parents-rights/2023/09"}, {"name": "Washington Blade", "meta": "Washington Blade. Washington Blade, 1969–, www.washingtonblade.com.", "desc": "One of the oldest LGBTQ+ newspapers in the U.S., providing ongoing coverage of LGBTQ+ politics, policy, culture, and community news. Useful for tracking legislative developments and national LGBTQ+ news affecting education.", "url": "https://www.washingtonblade.com/"}], "Policy Reports": [{"name": "Inclusive Curricular Standards Policies (Glisten, December 2024)", "meta": "Glisten. \"Inclusive Curricular Standards Policies.\" Glisten Navigator, 13 Dec. 2024, maps.glsen.org/inclusive-curricular-standards-policies/.", "desc": "A state-by-state interactive map tracking which jurisdictions have enacted LGBTQ+ inclusive curricular standards laws or administrative policies, which states have censored LGBTQ+ instruction, and whether parental opt-in/out notification provisions apply. Last updated December 2024.", "url": "https://maps.glsen.org/inclusive-curricular-standards-policies/"}, {"name": "Model Local Education Agency Policy on Transgender and Nonbinary Students (Glisten and NCTE, 2020)", "meta": "Glisten and National Center for Transgender Equality. Model Local Education Agency Policy on Transgender and Nonbinary Students. 2020, www.glsen.org/activity/model-local-education-agency-policy-on-transgender-nonbinary-students.", "desc": "A practical policy template for school districts covering student privacy and confidentiality, use of preferred names and pronouns, harassment protections, dress codes, facility access, and records handling—designed to safeguard transgender and nonbinary students across K–12 settings.", "url": "https://www.glsen.org/activity/model-local-education-agency-policy-on-transgender-nonbinary-students"}, {"name": "Schools in Transition: A Guide for Supporting Transgender Students in K–12 Schools (NCLR, Gender Spectrum, ACLU, HRC Foundation, and NEA, 2015)", "meta": "National Center for Lesbian Rights, Gender Spectrum, American Civil Liberties Union, Human Rights Campaign Foundation, and National Education Association. Schools in Transition: A Guide for Supporting Transgender Students in K–12 Schools. 2015.", "desc": "A coalition guide for school administrators, educators, and parents providing practical, field-tested guidance on supporting transgender students from kindergarten through twelfth grade. Covers foundational gender concepts, affirming school climate, restroom and facility access, working with families, and the legal landscape.", "url": "https://www.aclu.org/publications/schools-transition"}], "Policy Trackers": [{"name": "Education Law Center", "meta": "Education Law Center. Education Law Center. Education Law Center, 1973–, edlawcenter.org.", "desc": "National nonprofit litigation and policy organization pursuing equity and justice for public school students, with particular focus on school funding, anti-discrimination, and the rights of underserved students including LGBTQ+ students. Publishes the annual Making the Grade school funding report and advocates in state and federal courts.", "url": "https://edlawcenter.org/"}, {"name": "National Education Policy Center (NEPC)", "meta": "National Education Policy Center. National Education Policy Center. University of Colorado Boulder, ongoing, nepc.colorado.edu.", "desc": "University-based policy research center producing accessible policy briefs, research, and expert third-party reviews of think tank reports on a wide range of K–12 education topics including equity, school funding, and inclusive education. Resource for independent evidence-based analysis of educational reform impacts.", "url": "https://nepc.colorado.edu/"}, {"name": "PEN America – Index of Educational Gag Orders", "meta": "PEN America. Index of Educational Gag Orders. PEN America, 2021–, pen.org/educational-censorship/index-of-educational-gag-orders/.", "desc": "Continuously updated database tracking state legislative and policy efforts to restrict teaching about race, gender, LGBTQ+ identities, and American history in K–12 and higher education. Includes bill text summaries, status, and annual reports. A primary resource for understanding censorship threats to inclusive curriculum.", "url": "https://pen.org/educational-censorship/index-of-educational-gag-orders/"}, {"name": "Trans Legislation Tracker – Bill Tracker Dashboard", "meta": "Trans Legislation Tracker. Trans Legislation Tracker. Ongoing, translegislation.com.", "desc": "Interactive, continuously updated bill tracker monitoring anti-trans legislation state by state and federally across 14 categories including education, healthcare, sports, pronouns, and bathroom access. Includes yearly recaps and excerpts of bill text. Tracked 773+ bills in 2025 alone.", "url": "https://translegislation.com/"}, {"name": "Williams Institute, UCLA School of Law – Education and Youth Research", "meta": "Williams Institute. Williams Institute. UCLA School of Law, 2001–, williamsinstitute.law.ucla.edu/issues/education/.", "desc": "Leading think tank at UCLA Law producing empirical research on sexual orientation and gender identity law and public policy. Education and youth pages aggregate reports on LGBTQ+ youth school experiences, anti-trans legislation impacts, state-level data, and legal analyses. Referenced by policymakers, courts, and advocates nationwide.", "url": "https://williamsinstitute.law.ucla.edu/issues/education/"}, {"name": "Teach Truth Days of Action (Zinn Education Project / AAPF)", "meta": "Zinn Education Project and African American Policy Forum. Teach Truth Days of Action. Zinn Education Project, 2021–, www.zinnedproject.org/news/teach-truth-day-of-action/.", "desc": "Annual educator and community mobilization campaign defending the freedom to learn against educational gag orders and curriculum censorship. Co-organized with the African American Policy Forum (AAPF) and 65+ coalition organizations. In 2025, Zinn Education Project transitioned the campaign to year-round social justice organizing.", "url": "https://www.zinnedproject.org/news/teach-truth-day-of-action/"}], "Political & Social Organizations": [{"name": "Glisten (formerly GLSEN)", "meta": "Glisten. Glisten. 2026–, glisten.org.", "desc": "National K–12 advocacy organization championing LGBTQ+ issues in education. Offers curriculum resources, National School Climate Survey research, educator professional development, policy advocacy, and student GSA club support through a network of 15 chapters in 13 states.", "url": "https://glisten.org/"}, {"name": "GSA Network", "meta": "GSA Network. GSA Network. GSA Network, 1998–, www.gsanetwork.org.", "desc": "National racial and gender justice organization empowering and training trans, queer, two-spirit (TQ2S+) and allied youth to organize intersectional movements for safer schools and healthier communities through GSA clubs, the STAR Freedom School, Gender Justice Leadership Programs, and direct youth organizing resources.", "url": "https://www.gsanetwork.org/resources"}, {"name": "Welcoming Schools (HRC Foundation)", "meta": "Human Rights Campaign Foundation. Welcoming Schools. HRC Foundation, n.d., welcomingschools.org.", "desc": "HRC Foundation's comprehensive K–5 bias-based bullying prevention and LGBTQ-inclusive program providing anti-bullying curricula, lesson plans, professional development, and family-diversity resources for elementary educators. The most comprehensive program of its kind for K–5.", "url": "https://welcomingschools.org/"}, {"name": "OutHistory", "meta": "OutHistory. OutHistory: LGBTQ History Online. OutHistory / Fund for the City of New York, 2008–, outhistory.org.", "desc": "Public digital history platform featuring 200+ scholar-curated exhibitions on LGBTQ history in the U.S. and Canada, built from primary sources. Used by educators at all grade levels to introduce students to LGBTQ historical analysis and community histories.", "url": "https://outhistory.org/"}, {"name": "PFLAG National", "meta": "PFLAG. PFLAG National. PFLAG, 1972–, pflag.org.", "desc": "The nation's largest organization dedicated to supporting, educating, and advocating for LGBTQ+ people and their families, including school inclusion resources, chapter networks, and guides for parents, educators, and allies.", "url": "https://pflag.org/"}], "Podcasts & Webinars": [{"name": "Facing History & Ourselves – LGBTQ+ Webinars and Professional Learning", "meta": "Facing History & Ourselves. LGBTQIA+ Resources from Facing History. Facing History & Ourselves, ongoing, www.facinghistory.org/ideas-week/lgbtqia-resources-facing-history.", "desc": "On-demand and live webinars, expert interviews, classroom lessons, and curated reading lists for educators on LGBTQIA+ histories and classroom inclusion. Includes on-demand webinars with Eric Marcus (Making Gay History podcast), one-hour sessions on teaching LGBTQ civil rights history, and intersectional educator resources. Certificate of Completion available.", "url": "https://www.facinghistory.org/ideas-week/lgbtqia-resources-facing-history"}, {"name": "Glisten – Intentional Inclusion Professional Development Series", "meta": "Glisten. Intentional Inclusion Professional Development Series. Glisten, ongoing, glisten.org/professional-development/.", "desc": "Glisten's educator-focused professional development series covering pronouns, racial and disability justice, student and educator legal rights, model school policies, and differentiated role-specific best practices for K–12 school staff. Available virtually.", "url": "https://glisten.org/professional-development/"}, {"name": "History UnErased – ‘Deep Dives & Backstories’ Podcast", "meta": "History UnErased. Deep Dives & Backstories. History UnErased, 2021–, www.unerased.org/resource/podcasts.", "desc": "Monthly podcast from History UnErased exploring LGBTQ+ US history topics that supplement their K–12 curriculum, featuring primary source stories and educator-focused content. Each episode is paired with virtual Soirée discussion events open to the public.", "url": "https://www.unerased.org/resource/podcasts"}, {"name": "Welcoming Schools – E-Learning and Professional Development", "meta": "Human Rights Campaign Foundation. Welcoming Schools E-Learning. HRC Foundation, ongoing, welcomingschools.org/e-learning.", "desc": "HRC Foundation’s e-learning courses and professional development for PK–12 educators, support staff, and administrators on creating LGBTQ+-inclusive and gender-affirming schools. Self-paced online courses available via HRC LEARN, covering bullying prevention, transgender and non-binary student support, and family diversity. Over 125,000 educators in 43 states trained.", "url": "https://welcomingschools.org/e-learning"}, {"name": "Teaching Hard History (Learning for Justice)", "meta": "Jeffries, Hasan Kwame, host. Teaching Hard History. Learning for Justice / SPLC, 2018–, www.learningforjustice.org/podcasts/teaching-hard-history.", "desc": "Four-season podcast series from Learning for Justice covering the hard history of American slavery, Reconstruction, Jim Crow, and the Civil Rights Movement through leading scholars and educators. Relaunched in 2025 with new resource pages per episode. Educators can earn professional development certificates. Note: this podcast does not focus on LGBTQ+ inclusion; it addresses racial justice and US history.", "url": "https://www.learningforjustice.org/podcasts/teaching-hard-history"}, {"name": "ONE Archives Foundation – Teaching LGBTQ History Webinar Series", "meta": "ONE Archives Foundation. Teaching LGBTQ History Webinars. ONE Archives Foundation, 2020–2022, www.onearchives.org/education-webinars/.", "desc": "Free K–12 educator webinar series (2020–2022) on teaching LGBTQ+ history in classrooms and virtual environments, with activities and digital resources aligned with the California FAIR Education Act and History-Social Science Framework. Presented in collaboration with educators and community partners. Note: as of 2026 the organization has rebranded to One Institute (oneinstitute.org).", "url": "https://www.onearchives.org/education-webinars/"}, {"name": "Queer America (Learning for Justice)", "meta": "Rupp, Leila, and John D’Emilio, hosts. Queer America. Learning for Justice / SPLC, 2018–, www.learningforjustice.org/podcasts/queer-america.", "desc": "13-episode history podcast from Learning for Justice exploring LGBTQ+ history from colonial America to the present. Hosts Leila Rupp and John D’Emilio guide educators through historical concepts, primary source suggestions, and practical classroom exercises. Educators can earn professional development certificates for listening.", "url": "https://www.learningforjustice.org/podcasts/queer-america"}, {"name": "Teaching While Queer (Bryan Stanton)", "meta": "Stanton, Bryan, host. Teaching While Queer: Advocacy, Community, and Resources for LGBTQ+ Educators. 2022–, teachingwhilequeer.org/podcast.", "desc": "Podcast centering LGBTQ+ educators and the real-world realities of teaching while queer, covering book bans, identity erasure, gender-affirming pedagogy, educator burnout, and institutional harm. Hosted by Bryan Stanton (they/them), founder of the Teaching While Queer movement and award-winning educator with an MFA in Theatre Pedagogy.", "url": "https://teachingwhilequeer.org/podcast/"}], "Open-Access Curricula & OER Repositories": [{"name": "Gender Spectrum", "meta": "Gender Spectrum. n.d.", "desc": "Lesson plans, discussion guides, and educator resources for supporting gender-expansive youth.", "url": "https://genderspectrum.org"}, {"name": "Learning for Justice", "meta": "Learning for Justice. n.d.", "desc": "Inclusive lesson plans, book lists, and professional development resources.", "url": "https://www.learningforjustice.org"}, {"name": "Our Family Coalition – Education Resources", "meta": "Our Family Coalition. Our Family Coalition Education Resources. n.d., ourfamily.org/programs-services/education/.", "desc": "Classroom toolkits, educator guides, and professional development resources on LGBTQ+ family diversity and inclusion, developed by California's largest LGBTQ family organization for PreK–12 educators.", "url": "https://ourfamily.org/programs-services/education/"}, {"name": "Teaching Tolerance Digital Toolbox (archived via Learning for Justice)", "meta": "Teaching Tolerance Digital Toolbox. Learning for Justice, n.d., www.learningforjustice.org.", "desc": "Classic toolkits with open-access anti-bias lessons for younger grades, now archived and accessible through the Learning for Justice website. Note: Teaching Tolerance rebranded as Learning for Justice in 2021; these resources are no longer maintained separately.", "url": "https://www.learningforjustice.org"}, {"name": "Teachstone CLASS Resources", "meta": "Teachstone CLASS Resources. Teachstone, n.d., teachstone.com.", "desc": "Evidence-based frameworks and professional development tools focused on improving classroom interactions in PreK–12 settings. Relevant to equity in early grades; not specifically LGBTQ+-focused.", "url": "https://teachstone.com"}, {"name": "Welcoming Schools – HRC Foundation", "meta": "Welcoming Schools. Human Rights Campaign Foundation, n.d., www.welcomingschools.org.", "desc": "Anti-bias curriculum and educator resources.", "url": "https://www.welcomingschools.org"}], "Activist Groups & Campaigns": [{"name": "Family Equality", "meta": "Family Equality. Family Equality. n.d., familyequality.org.", "desc": "National nonprofit advancing legal and lived equality for LGBTQ+ families through community-building, advocacy, and policy change; provides resources for educators working to affirm diverse families and household structures in schools.", "url": "https://familyequality.org"}, {"name": "Gender Spectrum", "meta": "Gender Spectrum. Gender Spectrum: Supporting Gender-Diverse Youth. n.d., genderspectrum.org.", "desc": "Advocacy and support network for trans youth and their families.", "url": "https://genderspectrum.org"}, {"name": "Rethinking Schools", "meta": "Rethinking Schools. n.d., www.rethinkingschools.org.", "desc": "Journal and website offering justice-oriented teacher-authored articles, resources, and curriculum relevant to elementary pedagogy. Covers race, class, gender, and other equity issues.", "url": "https://www.rethinkingschools.org"}, {"name": "Supporting Our Youth (SOY)", "meta": "Supporting Our Youth. Sherbourne Health, n.d., soytoronto.com.", "desc": "Toronto-based community health program of Sherbourne Health offering groups, programs, and events for 2SLGBTQ+ youth aged 29 and under. Provides community connections, mental health support, housing resources, and goal planning. Note: Canadian organization; not primarily educator-focused but valuable for understanding youth advocacy contexts.", "url": "https://soytoronto.com"}, {"name": "Trans Youth Equality Foundation (TYEF)", "meta": "Trans Youth Equality Foundation. TYEF: Advocacy and Support for Trans Children. n.d., www.transyouthequality.org.", "desc": "Provides education, advocacy, and support for transgender, nonbinary, and gender non-conforming children and youth and their families. Mission includes sharing information about the unique needs of this community and fostering healthy, caring, and safe environments.", "url": "https://www.transyouthequality.org"}, {"name": "Trans Youth Family Allies (TYFA)", "meta": "Trans Youth Family Allies. TYFA: Training and Resources for Gender-Inclusive Schools. n.d., www.imatyfa.org.", "desc": "Provides training and resources for gender-inclusive schools, empowering children and families by partnering with educators, service providers, and communities to develop supportive environments where gender may be expressed and respected.", "url": "https://www.imatyfa.org"}], "Films, Documentaries & Visual Media": [{"name": "A Kid Like Jake", "meta": "A Kid Like Jake. Directed by Silas Howard. IFC Films, 2018.", "desc": "Feature film following two Brooklyn parents navigating kindergarten applications and their gender-expansive four-year-old son. Useful for exploring adult responses to childhood gender nonconformity.", "url": "https://www.imdb.com/title/tt6884200/"}, {"name": "A Place in the Middle", "meta": "A Place in the Middle. Directed by Dean Hamer and Joe Wilson. 2014.", "desc": "Short documentary about a Hawaiian student who identifies across genders, exploring the Native Hawaiian concept of māhū and how a supportive teacher and school community affirm their identity. Includes educator guide.", "url": "https://www.aplaceinthemiddle.org"}, {"name": "Queer Kid Stuff (web series)", "meta": "Amer, Lindsay, creator. Queer Kid Stuff. YouTube, 2016–present, www.youtube.com/channel/UCecsVoeJcsXbAra7Sl4mOPw.", "desc": "LGBTQ+ educational web series for young children (ages 3 and up) created and hosted by Lindsay Amer (they/them), explaining concepts like gender identity, sexuality, and social justice in age-appropriate terms using music, a stuffed bear named Teddy, and stop-motion animation. Note: This is a YouTube web series, not an IMDB-listed film.", "url": "https://www.youtube.com/channel/UCecsVoeJcsXbAra7Sl4mOPw"}, {"name": "Being Me", "meta": "Being Me. Directed by Erin Brown Thomas. Journeyman Pictures, 2015.", "desc": "Documentary following 10-year-old Isabelle Langley and other transgender youth, exploring their journeys of self-discovery and the support they find from families and medical professionals. Offers elementary educators tools for fostering empathy and inclusion around trans student experiences.", "url": "https://www.imdb.com/title/tt2820328/"}, {"name": "Gender Revolution: A Journey with Katie Couric", "meta": "Gender Revolution: A Journey with Katie Couric. National Geographic, 2017.", "desc": "National Geographic documentary in which journalist Katie Couric explores evolving understandings of gender identity across the United States, interviewing trans children, families, scientists, and activists with accessible explanation.", "url": "https://www.youtube.com/playlist?list=PLivjPDlt6ApTL79_aIL-dHceH2PUccvly"}, {"name": "Growing Up Coy", "meta": "Growing Up Coy. Directed by Eric Juhola. 2016.", "desc": "Documentary following Coy Mathis and her family's landmark legal case for her right to use the school restroom consistent with her gender identity, exploring broader questions of transgender rights in K–12 education.", "url": "https://www.imdb.com/title/tt5648966/"}, {"name": "In a Heartbeat", "meta": "In a Heartbeat. Directed by Esteban Bravo and Beth David. Ringling College of Art and Design, 2017.", "desc": "Animated short (4 min.) depicting a closeted boy whose heart literally leaps from his chest to chase his crush, another boy. Widely praised for its wordless, inclusive depiction of same-sex affection for younger audiences. Available on YouTube.", "url": "https://www.imdb.com/title/tt6969946/"}, {"name": "It's Elementary: Talking About Gay Issues in School", "meta": "It's Elementary: Talking About Gay Issues in School. Directed by Debra Chasnoff and Helen Cohen. GroundSpark / Women's Educational Media, 1996.", "desc": "Groundbreaking 78-minute documentary showing how six elementary and middle school teachers across the U.S. address LGBTQ+ topics with students. A foundational professional development resource for elementary educators. Winner of the GLAAD Media Award for Outstanding Documentary.", "url": "https://www.imdb.com/title/tt0116659/"}, {"name": "Little Girl (Petite Fille)", "meta": "Little Girl (Petite Fille). Directed by Sébastien Lifshitz. Arte France Cinéma, 2020.", "desc": "French documentary following Sasha, an 8-year-old transgender girl, and her family's journey toward acceptance and support in navigating daily life, school, and medical consultations. Useful for teachers supporting elementary students' gender identities.", "url": "https://www.imdb.com/title/tt11753696/"}, {"name": "Pink Boy", "meta": "Pink Boy. Directed by Eric Rockey. 2015.", "desc": "Intimate 25-minute portrait of a gender-creative boy growing up in conservative rural Florida, and the butch lesbian parent navigating how to keep him safe while affirming who he is. Winner of multiple festival awards including Grand Jury Prize for Best Short at DOC NYC.", "url": "https://www.imdb.com/title/tt4177250/"}, {"name": "Raised Without Gender", "meta": "Raised Without Gender. Directed by Milene Larsson and Alana McVerry. Vice Media, 2017.", "desc": "Vice documentary (approx. 30 min.) following a family in Sweden raising their children outside strict gender norms, and visiting gender-aware kindergartens. Explores how Swedish educational policy and practice support gender-neutral child-rearing.", "url": "https://www.imdb.com/title/tt9233180/"}, {"name": "Straightlaced: How Gender's Got Us All Tied Up", "meta": "Straightlaced: How Gender's Got Us All Tied Up. Directed by Debra Chasnoff. GroundSpark, 2009.", "desc": "Documentary in which more than 50 teens from diverse backgrounds speak candidly about how gender expectations and homophobia constrict their lives. Explores how clothing, sexuality, sports, and emotion intersect with rigid gender norms. Useful for teacher study on early socialization.", "url": "https://www.imdb.com/title/tt1404412/"}, {"name": "The Bravest Knight (TV series)", "meta": "The Bravest Knight. Created by Daniel Errico. Big Bad Boo Studios / Hulu, 2019–present.", "desc": "Animated Hulu original TV series featuring Sir Cedric, a gay knight married to Prince Andrew, raising an adopted daughter. One of the first children's animated series with an openly gay main character. Note: This is a TV series, not a film. Winner of the 2020 GLAAD Media Award for Outstanding Kids and Family Programming.", "url": "https://www.imdb.com/title/tt10394790/"}, {"name": "The Family Journey: Raising Gender Nonconforming Children", "meta": "The Family Journey: Raising Gender Nonconforming Children. Directed by Jonathan Skurnik. Youth & Gender Media Project, n.d.", "desc": "Short documentary (14 min.) in which parents and siblings of gender-nonconforming children share their journeys from uncertainty to acceptance, demonstrating how love and support allow gender-nonconforming kids to thrive. Part of the Youth & Gender Media Project.", "url": "https://www.newday.com/films/the-family-journey-raising-gender-nonconforming-children"}, {"name": "Transhood", "meta": "Transhood. Directed by Sharon Liese. HBO Documentary Films, 2020.", "desc": "HBO documentary following four transgender children and their families in Kansas City over five years, exploring how each child navigates identity, family, community, and the world as they grow up.", "url": "https://www.imdb.com/title/tt11447806/"}, {"name": "We Are Little Zombies", "meta": "We Are Little Zombies. Directed by Makoto Nagahisa. Oscilloscope Laboratories, 2019.", "desc": "Japanese coming-of-age film following four emotionally numb orphans who form a band. Winner of the World Cinema Dramatic Special Jury Award for Originality at Sundance 2019. Note: This film is primarily about grief and youth identity, not gender nonconformity; its relevance to LGBTQ+ inclusion is limited and should be reviewed before classroom use.", "url": "https://www.imdb.com/title/tt9358120/"}], "Academic & Scholarly References": [{"name": "Transgender Students in Elementary School: Creating an Affirming and Inclusive School Culture", "meta": "Mangin, Melinda M. Transgender Students in Elementary School: Creating an Affirming and Inclusive School Culture. Cambridge, MA: Harvard Education Press, 2020.", "desc": "Research-based guide to creating affirming and inclusive school cultures for transgender and gender-expansive students in elementary settings, focusing on case studies from five schools.", "url": "https://hep.gse.harvard.edu/9781682535257/transgender-students-in-elementary-school/"}, {"name": "Supporting Transgender and Gender-Creative Youth: Schools, Families, and Communities in Action", "meta": "Meyer, Elizabeth J., and Annie Pullen Sansfaçon, eds. Supporting Transgender and Gender-Creative Youth: Schools, Families, and Communities in Action. Peter Lang, 2014.", "desc": "Edited collection bringing together research, social action methods, and theory on transgender youth and gender-creative children, covering school support, family acceptance, and community contexts. Note: Ann Travers contributed a chapter but is not the author or editor of this volume.", "url": "https://www.amazon.com/Supporting-Transgender-Gender-Creative-Youth-Communities/dp/1433134942"}, {"name": "Teaching About Gender Diversity: Teacher-Tested Lesson Plans for K–12 Classrooms", "meta": "Woolley, Susan W., and Lee Airton, eds. Teaching about Gender Diversity: Teacher-Tested Lesson Plans for K–12 Classrooms. Canadian Scholars, 2020.", "desc": "Lesson plans and teaching resources for K–12 classrooms on gender diversity. (Same volume as Recommended Reading #5, credited here in reverse editorial order.)", "url": "https://canadianscholars.ca/book/teaching-about-gender-diversity/"}], "label": "Elementary", "count": "67 resources · 10 categories"}, "middle": {"Recommended Readings": [{"name": "Gender Diversity and LGBTQ Inclusion in K–12 Schools", "meta": "Chappell, Sharon Verner, Karyl E. Ketchum, and Lisa Richardson. Gender Diversity and LGBTQ Inclusion in K–12 Schools: A Guide to Supporting Students, Changing Lives. Routledge, 2018.", "desc": "Practical guide for K–12 educators exploring effective practices to support LGBTQ and gender-diverse students across elementary, middle, and high school contexts, with focus on curriculum, pedagogy, and school environment. Grounded in sociocultural and critical theory, antidiscrimination law, and real-world educator narratives.", "url": "https://doi.org/10.4324/9781315172293"}, {"name": "Gender and Sexualities in Education: A Reader", "meta": "Meyer, Elizabeth J., and Dennis Carlson, eds. Gender and Sexualities in Education: A Reader. Peter Lang, 2014.", "desc": "Comprehensive reader collecting key essays for teachers seeking to understand and resist gendered oppression across educational contexts, covering sexuality, gender identity, queer theory, intersectionality, and policy in K–12 and higher education.", "url": "https://www.peterlang.com/document/1051405"}, {"name": "Making the Framework FAIR", "meta": "Romesburg, Don, Leila J. Rupp, and David M. Donahue, eds. Making the Framework FAIR: California History–Social Science Framework Proposed LGBT Revisions Related to the FAIR Education Act. Committee on Lesbian, Gay, Bisexual, and Transgender History, 2014.", "desc": "Comprehensive scholarly report prepared for the California Department of Education providing proposed LGBT-inclusive revisions to the K–12 History–Social Science Framework in response to the FAIR Education Act, with contributions from 17 historians. Developed by the Committee on LGBT History, an affiliate of the American Historical Association.", "url": "http://clgbthistory.org/wp-content/uploads/2010/09/Making-the-Framework-FAIR-FINAL.pdf"}], "News Articles & Substacks": [{"name": "Chaltain, Sam – “At This Soon-to-be Brooklyn School, the Future Is Trans”", "meta": "Chaltain, Sam. “At This Soon-to-be Brooklyn School, the Future Is Trans.” Letters from the Future (of Learning), 3 May 2023, samchaltain.substack.com/p/at-this-soon-to-be-brooklyn-school.", "desc": "Profiles Trans formative Schools (TfS), a Brooklyn-based trans-centered educational community designed around rigorous academics, joyful connections, and social justice, with the goal of opening a trans middle school — a direct model for affirming middle-grade pedagogy.", "url": "https://samchaltain.substack.com/p/at-this-soon-to-be-brooklyn-school"}, {"name": "NPR Fresh Air – “How School Systems, Educators and Parents Can Support Transgender Children”", "meta": "Key, Aidan. “How School Systems, Educators and Parents Can Support Transgender Children.” Fresh Air, NPR, 28 June 2023.", "desc": "Educator and author Aidan Key (Trans Children in Today’s Schools) discusses why schools are seeing more transgender students, how anti-LGBTQ curriculum laws affect classroom practice, and concrete strategies for K–12 educators and administrators navigating this landscape.", "url": "https://www.npr.org/2023/06/28/1184805981/how-school-systems-educators-and-parents-can-support-transgender-children"}, {"name": "EdWeek Staff – “Teachers Say They Have Little Influence in Curriculum Debates”", "meta": "Pendharkar, Eesha. “Teachers Say They Have Little Influence in Curriculum Debates.” Education Week, 23 Feb. 2024.", "desc": "Reports on Pew Research Center national survey data finding most K–12 teachers feel they lack influence over curriculum decisions on race and LGBTQ+ topics, and that such topics rarely arise in middle school social studies and English classrooms — directly relevant to the structural context of middle-grade inclusive teaching.", "url": "https://www.edweek.org/leadership/teachers-say-they-have-little-influence-in-curriculum-debates/2024/02"}, {"name": "Stanford, Libby – “LGBTQ+ Students Feel the Weight of a Push for Parents’ Rights”", "meta": "Stanford, Libby. “LGBTQ+ Students Feel the Weight of a Push for Parents’ Rights.” Education Week, 14 Sept. 2023.", "desc": "Examines how parental rights campaigns are affecting LGBTQ+ students’ mental health and school belonging across grade levels, with expert guidance for educators navigating Don’t Say Gay laws, pronoun notification mandates, and classroom culture debates relevant to middle school contexts.", "url": "https://www.edweek.org/leadership/lgbtq-students-feel-the-weight-of-a-push-for-parents-rights/2023/09"}, {"name": "Stanford, Libby & Pendharkar, Eesha – “Laws on Trans, Nonbinary Student Pronouns Put Teachers in a Bind”", "meta": "Stanford, Libby, and Eesha Pendharkar. “Laws on Trans, Nonbinary Student Pronouns Put Teachers in a Bind.” Education Week, 14 June 2023.", "desc": "Investigates how state laws requiring teachers to use birth-sex pronouns or notify parents of gender-identity disclosures create professional and ethical dilemmas for K–12 educators, with direct implications for middle school social studies and homeroom teachers.", "url": "https://www.edweek.org/leadership/laws-on-trans-nonbinary-student-pronouns-put-teachers-in-a-bind/2023/05"}, {"name": "The Banned Resistance (Substack)", "meta": "The Banned Resistance. The Banned Resistance. Ongoing, thebannedresistance.substack.com.", "desc": "Educator-authored Substack offering reflections on advocacy, LGBTQ+ rights in schools, book bans, and teaching under restrictive policies. Written by Missouri educators and advocates with direct experience of anti-trans legislative sessions. Includes posts connecting NCTE and educator resources to classroom practice in restrictive policy climates.", "url": "https://thebannedresistance.substack.com/"}, {"name": "“Supreme Court Weighs Who Should Decide Public School Curriculum”", "meta": "“Supreme Court Weighs Who Should Decide Public School Curriculum.” NPR, 22 Apr. 2025.", "desc": "Reports on the Supreme Court case (Mahmoud v. McKnight) in which parents sought the right to opt children out of lessons featuring LGBTQ+ books used in middle grades, raising fundamental questions about local school board authority over social studies and ELA curriculum.", "url": "https://www.npr.org/2025/04/22/nx-s1-5360067/supreme-court-public-schools-lgbtq-books"}], "Policy Reports": [{"name": "2025 National School Climate Survey: The Experiences of LGBTQ+ Youth in Our Nation's Schools", "meta": "Glisten. 2025 National School Climate Survey: The Experiences of LGBTQ+ Youth in Our Nation's Schools. Glisten, 2026.", "desc": "The 13th installment of Glisten's NSCS, drawing on survey data from April–October 2024 (2,800 students) and focus groups from June–July 2025. Finds 2 in 3 LGBTQ+ students felt unsafe due to their sexual orientation or gender identity, and that the 2024–2025 school year felt more hostile amid escalating anti-LGBTQ+ political rhetoric.", "url": "https://glisten.org/nscs2025/"}], "Policy Trackers": [{"name": "LGBTQI+ Youth Policy Research (Center for American Progress)", "meta": "Center for American Progress. \"LGBTQI+ Youth.\" americanprogress.org/topic/lgbtq-youth/. Accessed 2025.", "desc": "CAP's ongoing hub of policy briefs, reports, and analysis on LGBTQI+ youth in education, covering anti-LGBTQ school legislation, school safety, mental health impacts, and data on disproportionate discrimination affecting LGBTQ+ students.", "url": "https://www.americanprogress.org/topic/lgbtq-youth/"}, {"name": "Hate at School (SPLC / Learning for Justice, 2019)", "meta": "Southern Poverty Law Center. Hate at School. SPLC / Teaching Tolerance, 2019.", "desc": "Documents hate and bias incidents in U.S. schools based on news reports and a national educator survey of 2,700+ respondents. Covers incidents targeting students by race, religion, sexual orientation, gender identity, and immigration status, with case studies from elementary and secondary schools.", "url": "https://www.splcenter.org/20190502/hate-school"}], "Political & Social Organizations": [{"name": "Glisten", "meta": "Glisten. Glisten. n.d., glisten.org.", "desc": "National K–12 advocacy organization offering curriculum, research, professional development, and policy guidance for LGBTQ-inclusive education. Formerly GLSEN; rebranded as Glisten in February 2026.", "url": "https://glisten.org"}, {"name": "Glisten Research Institute", "meta": "Glisten. \"Research.\" Glisten, n.d., glisten.org/research.", "desc": "Publishes the National School Climate Survey with breakdowns by grade level, providing nationally representative data on LGBTQ+ student safety, belonging, and educational equity.", "url": "https://glisten.org/research"}, {"name": "Lambda Legal", "meta": "Lambda Legal. Lambda Legal. n.d., www.lambdalegal.org.", "desc": "Legal advocacy organization supporting the civil rights of LGBTQIA+ students, educators, and families nationwide through litigation, policy advocacy, and public education.", "url": "https://www.lambdalegal.org"}, {"name": "Learning for Justice", "meta": "Learning for Justice. Learning for Justice: K–12 Social Justice Curriculum. n.d., www.learningforjustice.org.", "desc": "Offers standards-aligned lessons, book lists, film guides, and professional development resources for K–12 educators on identity and justice. Formerly Teaching Tolerance; rebranded in 2021.", "url": "https://www.learningforjustice.org"}, {"name": "Trans Student Educational Resources (TSER)", "meta": "Trans Student Educational Resources. Trans Student Educational Resources. n.d., transstudent.org.", "desc": "Student-led nonprofit promoting gender-inclusive education through advocacy, resources, and training. Founded in 2011; the only national organization led by trans youth.", "url": "https://transstudent.org"}], "Podcasts & Webinars": [{"name": "APA Webinar Series on LGBTQ Youth", "meta": "American Psychological Association. APA Webinar Series on LGBTQ Youth. APA, n.d., www.apa.org.", "desc": "Professional development webinars on mental health and school climate for adolescents, produced by the APA for educators and counselors in K–12 settings.", "url": "https://www.apa.org"}, {"name": "APA Webinar Series on LGBTQ Youth", "meta": "American Psychological Association. APA Webinar Series on LGBTQ Youth. APA, n.d., www.apa.org.", "desc": "Professional development webinars on mental health and school climate for adolescents, produced by the APA for educators and counselors in K–12 settings.", "url": "https://www.apa.org"}, {"name": "Sounds Fake but Okay", "meta": "Costello, Sarah, and Kayla Kaszyca, hosts. Sounds Fake but Okay. n.d., soundsfakepod.com.", "desc": "Weekly podcast in which an aromantic asexual and a biromantic demisexual discuss love, relationships, sexuality, and identity. Winner of the 2020 Discover Pods Award for Best LGBTQ+ Culture Podcast.", "url": "https://www.soundsfakepod.com"}, {"name": "Making Gay History", "meta": "Marcus, Eric, host. Making Gay History: LGBTQ Oral Histories from the Archive. Making Gay History, n.d., makinggayhistory.com.", "desc": "Oral history podcast drawing on Eric Marcus's archive of rare first-person interviews to profile LGBTQ+ pioneers, activists, and witnesses to history.", "url": "https://makinggayhistory.com"}, {"name": "OutCasting", "meta": "OutCasting. Produced by Media for the Public Good. n.d., mfpg.org.", "desc": "Public radio's LGBTQ youth program — produced by and for LGBTQ teens and straight allies — distributed nationally on the Pacifica Radio Network.", "url": "https://mfpg.org/"}, {"name": "History Is Gay", "meta": "Pfeffer, Leigh, and Gretchen Felker-Martin, hosts. History Is Gay. n.d., historyisgaypodcast.com.", "desc": "Podcast examining overlooked LGBTQ+ people and events throughout history — from queer pirates to Sappho. Hosted by self-described queer nerds Gretchen and Leigh.", "url": "https://www.historyisgaypodcast.com/"}, {"name": "Queer America", "meta": "Rupp, Leila, and John D'Emilio, hosts. Queer America. Learning for Justice, n.d., www.learningforjustice.org/podcasts/queer-america.", "desc": "Learning for Justice podcast series hosted by historians exploring the history of sexual orientation and gender identity in the United States, designed for K–12 educators.", "url": "https://www.learningforjustice.org/podcasts/queer-america"}, {"name": "Teaching While Queer", "meta": "Teaching While Queer. n.d., teachingwhilequeer.org.", "desc": "Podcast hosted by Bryan Stanton (they/them) centering LGBTQ+ educators' real-world experiences across K–12 and higher education, covering advocacy, tokenism, burnout, and classroom inclusion.", "url": "https://teachingwhilequeer.org"}], "Open-Access Curricula & OER Repositories": [{"name": "Share My Lesson – LGBTQ-Inclusive Lessons", "meta": "American Federation of Teachers. \"Share My Lesson.\" AFT, n.d., sharemylesson.com.", "desc": "Free, educator-submitted lesson plans including LGBTQ-inclusive content for K–12 classrooms, from the AFT's open-access professional development platform.", "url": "https://sharemylesson.com"}, {"name": "Middle School Math FlexBooks", "meta": "CK-12 Foundation. Middle School Math FlexBooks. CK-12 Foundation, 2024, www.ck12.org.", "desc": "Free, adaptive digital textbooks supporting differentiated learning in grades 6–8 mathematics.", "url": "https://www.ck12.org"}, {"name": "Gender Spectrum", "meta": "Gender Spectrum. Gender Spectrum. n.d., genderspectrum.org.", "desc": "Lesson plans, discussion guides, and educator resources for supporting gender-expansive youth in K–12 settings.", "url": "https://genderspectrum.org"}, {"name": "Teaching LGBTQ History", "meta": "History UnErased. Teaching LGBTQ History. History UnErased, n.d., www.unerased.org.", "desc": "Primary-source–based lesson plans and curricula for integrating LGBTQ+ history into K–12 classrooms, developed with support from the National Endowment for the Humanities.", "url": "https://www.unerased.org"}, {"name": "Welcoming Schools", "meta": "Human Rights Campaign Foundation. Welcoming Schools. HRC Foundation, n.d., www.welcomingschools.org.", "desc": "Anti-bias curriculum and educator resources for K–12 schools emphasizing LGBTQ+ inclusion, family diversity, and preventing bias-based bullying.", "url": "https://www.welcomingschools.org"}, {"name": "LGBTQ+ Inclusive Education Resource Hub", "meta": "ONE Archives Foundation. LGBTQ+ Inclusive Education Resource Hub. ONE Archives Foundation, n.d., onearchives.org.", "desc": "Open-access curriculum resources integrating LGBTQ+ history into U.S. classrooms, developed in partnership with the ONE National Gay & Lesbian Archives at USC Libraries.", "url": "https://www.onearchives.org"}, {"name": "6–8 Math Curriculum", "meta": "Open Up Resources. 6–8 Math Curriculum. Open Up Resources, 2022, openupresources.org.", "desc": "Open Educational Resource curriculum emphasizing universal design, cultural responsiveness, and collaborative problem-solving for grades 6–8 mathematics.", "url": "https://openupresources.org"}, {"name": "Our Family Coalition – Education Resources", "meta": "Our Family Coalition. Education Resources. Our Family Coalition, n.d., ourfamily.org/programs-services/education/.", "desc": "Classroom toolkits, educator guides, and professional development resources on LGBTQ+ family diversity and inclusion from California's largest LGBTQ family organization.", "url": "https://ourfamily.org/programs-services/education/"}, {"name": "Smithsonian Learning Lab – LGBTQ+ Collections", "meta": "Smithsonian Institution. \"LGBTQ+ Collections.\" Smithsonian Learning Lab, n.d., learninglab.si.edu.", "desc": "Curated collections of LGBTQ+ artifacts, oral histories, and lesson plans available as open-access resources for K–12 classrooms.", "url": "https://learninglab.si.edu"}, {"name": "Zinn Education Project", "meta": "Zinn Education Project. Zinn Education Project. n.d., www.zinnedproject.org.", "desc": "Open-access lessons on people's history, including queer and trans-inclusive content, for middle and high school classrooms; organized by historical period and theme.", "url": "https://www.zinnedproject.org"}], "Activist Groups & Campaigns": [{"name": "Destination Tomorrow", "meta": "Destination Tomorrow. Destination Tomorrow. n.d., destinationtomorrow.org.", "desc": "Grassroots LGBTQ+ community center (Bronx, Atlanta, DC) offering housing, healthcare, career readiness, and youth programming for LGBTQ+ community members of color.", "url": "https://destinationtomorrow.org"}, {"name": "Gender Spectrum", "meta": "Gender Spectrum. Gender Spectrum. n.d., genderspectrum.org.", "desc": "Advocacy and support network offering educator resources, school training, and family guidance to promote gender-inclusive environments for gender-expansive youth.", "url": "https://genderspectrum.org"}, {"name": "GSA Network", "meta": "GSA Network. GSA Network. n.d., gsanetwork.org.", "desc": "Next-generation racial and gender justice organization training trans, queer, Two-Spirit, and allied youth leaders through school-based GSA clubs. Full name: Genders & Sexualities Alliance Network.", "url": "https://gsanetwork.org"}, {"name": "InterACT: Advocates for Intersex Youth", "meta": "interACT: Advocates for Intersex Youth. interACT. n.d., interactadvocates.org.", "desc": "Leading organization advancing the human rights of children born with intersex traits through legal advocacy, public engagement, and an intersex youth leadership program for ages 13–29.", "url": "https://interactadvocates.org"}, {"name": "Born Perfect", "meta": "National Center for Lesbian Rights. Born Perfect: The Campaign to End Conversion Therapy. NCLR, n.d., bornperfect.org.", "desc": "National NCLR campaign to end conversion therapy through legislation, public education, and legal advocacy; provides model bills and educator-facing talking points.", "url": "https://bornperfect.org"}, {"name": "National Queer Asian Pacific Islander Alliance (NQAPIA)", "meta": "National Queer Asian Pacific Islander Alliance. NQAPIA. n.d., www.nqapia.org.", "desc": "Federation of LGBTQ API organizations building capacity for political mobilization, anti-racism, and education equity campaigns nationally.", "url": "https://www.nqapia.org"}, {"name": "Trans Youth Equality Foundation (TYEF)", "meta": "Trans Youth Equality Foundation. Trans Youth Equality Foundation. n.d., www.transyouthequality.org.", "desc": "Provides education, advocacy, and support for transgender, nonbinary, and gender non-conforming children and youth and their families.", "url": "https://www.transyouthequality.org"}, {"name": "Trans Youth Family Allies (TYFA)", "meta": "Trans Youth Family Allies. Trans Youth Family Allies. n.d., www.imatyfa.org.", "desc": "Provides training and resources for gender-inclusive schools, empowering children and families by partnering with educators and service providers.", "url": "https://www.imatyfa.org"}, {"name": "StopBullying.gov", "meta": "U.S. Department of Health and Human Services. StopBullying.gov. HHS, n.d., www.stopbullying.gov.", "desc": "Federal initiative equipping educators, counselors, and parents with research-based anti-bullying strategies, with specific attention to LGBTQ+ youth as a particularly at-risk population.", "url": "https://www.stopbullying.gov"}, {"name": "Youth BreakOUT!", "meta": "Youth BreakOUT! Youth BreakOUT! n.d., youthbreakout.org.", "desc": "New Orleans–based youth-led organization creating safe spaces, advocacy, and leadership development for LGBTQ+ youth of color.", "url": "https://www.youthbreakout.org"}], "Films, Documentaries & Visual Media": [{"name": "A Kid Like Jake", "meta": "A Kid Like Jake. Directed by Silas Howard. IFC Films, 2018.", "desc": "Feature film following Brooklyn parents navigating kindergarten applications while coming to terms with their gender-expansive four-year-old. Useful for exploring adult responses to childhood gender nonconformity.", "url": "https://www.imdb.com/title/tt6884200/"}, {"name": "Being Thunder", "meta": "Being Thunder. Directed by Stéphanie Lamorré. Film Movement, 2021.", "desc": "Documentary following Sherenté Harris, a Two-Spirit Narragansett teenager from Rhode Island, as they perform traditional dance at regional powwows despite discrimination from tribal elders.", "url": "https://www.imdb.com/title/tt14908696/"}, {"name": "Changing the Game", "meta": "Changing the Game. Directed by Michael Barnett. Hulu / Motto Pictures, 2019.", "desc": "Documentary following three transgender high school athletes as they compete in their chosen sports and navigate state policies that determine whether they can participate.", "url": "https://www.imdb.com/title/tt10011320/"}, {"name": "Family Acceptance Project – Family Video Series", "meta": "Family Acceptance Project. Family Video Series. SF State University, n.d., familyproject.sfsu.edu/family-videos.", "desc": "Research-based short documentary series showing diverse families' journeys toward affirming their LGBTQ children. Used by educators and counselors for family engagement. Note: this is a resource page, not a standalone theatrical film.", "url": "https://familyproject.sfsu.edu/family-videos"}, {"name": "Gay Chorus Deep South", "meta": "Gay Chorus Deep South. Directed by David Charles Rodrigues. MTV Documentary Films, 2019.", "desc": "Documentary following the San Francisco Gay Men's Chorus on a tour through Mississippi, Tennessee, Alabama, and the Carolinas, building unexpected connections through music in response to anti-LGBTQ legislation.", "url": "https://www.imdb.com/title/tt8840232/"}, {"name": "Gender Matters", "meta": "Gender Matters. Vice Media, 2015.", "desc": "Six short Vice films profiling trans and gender nonconforming young adults navigating identity, community, and self-expression.", "url": "https://www.youtube.com/watch?v=YmGbJlL558U"}, {"name": "Gender Revolution: A Journey with Katie Couric", "meta": "Gender Revolution: A Journey with Katie Couric. National Geographic, 2017.", "desc": "National Geographic documentary in which journalist Katie Couric explores evolving understandings of gender identity, interviewing trans children, families, scientists, and activists.", "url": "https://www.youtube.com/playlist?list=PLivjPDlt6ApTL79_aIL-dHceH2PUccvly"}, {"name": "Growing Up Coy", "meta": "Growing Up Coy. Directed by Eric Juhola. 2016.", "desc": "Documentary following Coy Mathis and her family's landmark legal case
