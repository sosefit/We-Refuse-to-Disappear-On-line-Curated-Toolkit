 for her right to use the school restroom consistent with her gender identity.", "url": "https://www.imdb.com/title/tt5648966/"}, {"name": "Growing Up Trans", "meta": "Growing Up Trans. Directed by Miri Navasky and Karen O'Connor. PBS Frontline, 2015.", "desc": "PBS Frontline documentary following eight transgender youth ages 9–19 and their families as they navigate identity, medical decisions, and community responses.", "url": "https://www.imdb.com/title/tt4689752/"}, {"name": "I'm Just Anneke", "meta": "I'm Just Anneke. Directed by Jonathan Skurnik. Youth & Gender Media Project, 2010.", "desc": "Short documentary (11 min.) following Anneke, a 12-year-old gender-fluid youth from Vancouver, as she navigates puberty, identity, family, and school. Winner of the Changemaker Award 2010.", "url": "https://www.imdb.com/title/tt1753935/"}, {"name": "Let's Get Real", "meta": "Let's Get Real. Directed by Debra Chasnoff. GroundSpark / Women's Educational Media, 2003.", "desc": "Documentary in which middle schoolers speak candidly about name-calling, bullying, and bias — told entirely from youth perspectives. Designed for teacher study in middle school settings.", "url": "https://www.newday.com/films/lets-get-real"}, {"name": "Picture a Scientist", "meta": "Picture a Scientist. Directed by Ian Cheney and Sharon Shattuck. Submarine Deluxe / NOVA, 2020.", "desc": "Documentary profiling women and nonbinary scientists facing gender discrimination in STEM fields, featuring powerful testimony about institutional bias. Relevant for science and math classrooms.", "url": "https://www.imdb.com/title/tt11906032/"}, {"name": "Pink Boy", "meta": "Pink Boy. Directed by Eric Rockey. 2015.", "desc": "Intimate 25-minute portrait of a gender-creative boy in rural Florida and the butch lesbian parent navigating where it is safe for him to be himself. Multiple festival awards.", "url": "https://www.imdb.com/title/tt4177250/"}, {"name": "Raised Without Gender", "meta": "Raised Without Gender. Directed by Milene Larsson and Alana McVerry. Vice Media, 2017.", "desc": "Vice documentary following a family in Sweden raising their children outside strict gender norms and visiting gender-aware kindergartens.", "url": "https://www.imdb.com/title/tt9233180/"}, {"name": "Real Boy", "meta": "Real Boy. Directed by Shaleece Haas. 2016.", "desc": "Documentary following trans teen musician Bennett Wallace through his transition and search for community, with an intimate portrait of his father's parallel journey of acceptance.", "url": "https://www.imdb.com/title/tt3993760/"}, {"name": "Straightlaced: How Gender's Got Us All Tied Up", "meta": "Straightlaced: How Gender's Got Us All Tied Up. Directed by Debra Chasnoff. GroundSpark, 2009.", "desc": "Documentary in which more than 50 diverse California teens speak candidly about how gender expectations and homophobia constrict their lives.", "url": "https://www.imdb.com/title/tt1404412/"}, {"name": "The Family Journey: Raising Gender Nonconforming Children", "meta": "The Family Journey: Raising Gender Nonconforming Children. Directed by Jonathan Skurnik. Youth & Gender Media Project, n.d.", "desc": "Short documentary (14 min.) in which parents and siblings of gender-nonconforming children share their journeys from uncertainty to acceptance. Part of the Youth & Gender Media Project.", "url": "https://www.newday.com/films/the-family-journey-raising-gender-nonconforming-children"}, {"name": "The Mask You Live In", "meta": "The Mask You Live In. Directed by Jennifer Siebel Newsom. The Representation Project, 2015.", "desc": "Documentary examining societal pressures on boys to conform to narrow masculine ideals and the consequences for their mental health and relationships.", "url": "https://therepproject.org/films/the-mask-you-live-in/"}, {"name": "Transgender Basics", "meta": "Transgender Basics. Gender Identity Project, New York City, 2005.", "desc": "Short introductory film explaining transgender concepts and terminology, produced by the NYC Gender Identity Project.", "url": "https://www.youtube.com/watch?v=UXI9w0PbBXY"}, {"name": "Transhood", "meta": "Transhood. Directed by Sharon Liese. HBO Documentary Films, 2020.", "desc": "HBO documentary following four transgender children and their families in Kansas City over five years, exploring how each navigates identity, family, community, and the world.", "url": "https://www.youtube.com/watch?v=0CGDD-2Cass"}, {"name": "We Are Little Zombies", "meta": "We Are Little Zombies. Directed by Makoto Nagahisa. Oscilloscope Laboratories, 2019.", "desc": "Japanese coming-of-age film following four emotionally numb orphans who form a band. Sundance 2019 Special Jury Award. Note: Primary themes are grief and adolescent identity — LGBTQ+ classroom relevance is limited; review before use.", "url": "https://www.imdb.com/title/tt9358120/"}, {"name": "Will and Harper", "meta": "Will and Harper. Directed by Josh Greenbaum. Netflix, 2024.", "desc": "Documentary following actor Will Ferrell and his close friend Harper Steele, a trans woman, on a road trip across America exploring friendship, gender identity, and self-discovery.", "url": "https://www.imdb.com/title/tt30321133/"}, {"name": "Woman on Fire", "meta": "Woman on Fire. Directed by Julie Sokolow. 2016.", "desc": "Documentary about Brooke Guinan, New York City's first openly transgender firefighter, exploring her transition within the FDNY and its impact on her family.", "url": "https://www.imdb.com/title/tt4991812/"}], "Academic & Scholarly References": [{"name": "Putting the 'T' in 'Resource': The Benefits of LGBT-Related School Resources for Transgender Youth", "meta": "Greytak, Emily A., Joseph G. Kosciw, and Madelyn J. Boesen. \"Putting the 'T' in 'Resource': The Benefits of LGBT-Related School Resources for Transgender Youth.\" Journal of LGBT Youth, vol. 10, no. 1–2, 2013, pp. 45–63.", "desc": "Quantitative study linking the availability of LGBT-related school resources — supportive educators, GSAs, and inclusive curriculum — to improved academic outcomes and safety for transgender youth.", "url": "https://www.tandfonline.com/doi/abs/10.1080/19361653.2012.718522"}, {"name": "Naming New Realities: Supporting Trans Youth in Education", "meta": "Sinclair-Palm, Julia, and Jen Gilbert. \"Naming New Realities: Supporting Trans Youth in Education.\" Sex Education, vol. 18, no. 4, 2018, pp. 321–327.", "desc": "Calls for educational practices that recognize and affirm trans youths' lived realities in schools, examining how naming, pronouns, and institutional recognition shape belonging and safety.", "url": "https://www.tandfonline.com/doi/full/10.1080/14681811.2018.1452347"}], "label": "Middle School", "count": "71 resources · 10 categories"}, "high": {"Recommended Readings": [{"name": "History UnErased", "meta": "History UnErased. History UnErased. History UnErased, 2018–, www.unerased.org.", "desc": "Nation’s premier K–12 LGBTQ-inclusive and intersectional US history, civics, and social studies curriculum aligned with state standards, partnered with nearly 3,000 schools in 18 states. Includes bilingual materials, fast facts, videos, podcasts, and professional development. For middle and high school social studies.", "url": "https://www.unerased.org/"}, {"name": "Trans Anthology Project", "meta": "Kirby, Heather H., and Chrissy Boylan. Trans Anthology Project: Reflections of Self-Discovery and Acceptance. Trans Anthology Project, 2024.", "desc": "Part guidebook, part anthology, this Kirkus-starred collection brings together 200+ firsthand accounts from gender-diverse teens, young adults, and their parents, supplemented by clinical educational insights. Covers gender identity, coming out, social and legal transitioning, mental health, religion, and family dynamics. A resource for educators building inclusive classroom culture.", "url": "https://bookshop.org/p/books/trans-anthology-project-reflections-of-self-discovery-and-acceptance-chrissy-boylan/3688611cd8a16050"}, {"name": "LGBTQ Youth and Education: Policies and Practices", "meta": "Mayo, Cris. LGBTQ Youth and Education: Policies and Practices. Teachers College Press, 2013.", "desc": "Foundational scholarly text examining how policy and pedagogy intersect in K–12 schools, providing frameworks for teachers on GSAs, anti-bullying policy, inclusive curriculum, and resisting exclusionary laws. Winner of the AERA Critics’ Choice Book Award.", "url": "https://eric.ed.gov/?id=ED617676"}, {"name": "about Gender Identity Justice in Schools and Communities", "meta": "Miller, sj. about Gender Identity Justice in Schools and Communities. Teachers College Press, 2019.", "desc": "Premiere volume in the Teachers College Press School: Questions series, walking educators through theory and practice to bring gender identity justice into K–12 classrooms and schools. Addresses root causes of gender identity injustice, asset-based approaches to complex gender identities, and community-building strategies. Winner of the 2019 AERA Distinguished Contributions to Gender Equity Award.", "url": "https://www.tcpress.com/about-gender-identity-justice-in-schools-and-communities-9780807761250"}, {"name": "‘The Impact and Role of Emotions in Schools’", "meta": "Miller, sj. “The Impact and Role of Emotions in Schools for Teachers and Students with Complex Gender Identities.” Teachers College Record, vol. 121, no. 13, 2019, pp. 1–16.", "desc": "Examines how affect and emotion shape the school experiences of teachers and students with complex gender identities, illuminating pathways toward empathy, equity, and affirmation. Part of a special issue of TCR on gender identity in education.", "url": "https://doi.org/10.1177/016146811912101307"}, {"name": "National Council for the Social Studies – Contextualizing LGBT+ History within the Social Studies Curriculum", "meta": "National Council for the Social Studies. “Contextualizing LGBT+ History within the Social Studies Curriculum.” NCSS, 2019.", "desc": "NCSS position statement affirming the civic, ethical, and moral imperatives of advancing LGBTQ+-inclusive social studies curriculum across grade levels, including middle and secondary, with resources for educators and links to LGBTQ+ instructional materials in Social Education.", "url": "https://www.socialstudies.org/position-statements/contextualizing-lgbt-history-within-social-studies-curriculum"}, {"name": "The Educator’s Guide to LGBT+ Inclusion", "meta": "Shane, Kryss. The Educator’s Guide to LGBT+ Inclusion: A Practical Resource for K–12 Teachers, Administrators, and School Support Staff. Jessica Kingsley Publishers, 2020.", "desc": "Practical, research-backed guide for K–12 educators and school staff on creating affirming and inclusive school communities for LGBT+ students, covering policy, classroom practice, school environment, and family communication. Includes foreword from PostSecret and afterword by Trevor Project co-founder James Lecesne.", "url": "https://us.jkp.com/products/the-educators-guide-to-lgbt-inclusion"}], "News Articles & Substacks": [{"name": "Field, Kelly – “Teachers, Deputized to Fight the Culture Wars, Are Often Reluctant to Serve” (Hechinger Report, May 23, 2022)", "meta": "Field, Kelly. “Teachers, Deputized to Fight the Culture Wars, Are Often Reluctant to Serve.” The Hechinger Report, 23 May 2022.", "desc": "Investigates how new state laws restricting instruction on LGBTQ+ topics and race left teachers across the country confused, scared, and uncertain about their relationships with vulnerable students. Profiles high school teachers navigating gag orders and book bans in real classrooms.", "url": "https://hechingerreport.org/teachers-deputized-to-fight-the-culture-wars-are-often-reluctant-to-serve/"}, {"name": "“Students and Teachers in Florida Can Say Gay Again without Fear of Punishment” (March 13, 2024)", "meta": "Prieur, Bobbie. “Students and Teachers in Florida Can Say Gay Again without Fear of Punishment.” NPR, 13 Mar. 2024.", "desc": "Reports on the settlement of litigation against Florida’s Parental Rights in Education Act, clarifying that teachers and students can freely discuss LGBTQ+ identities, that safe space stickers can remain in classrooms, that GSAs can return, and that LGBTQ+-themed books can be reinstated — directly relevant to secondary educators’ rights.", "url": "https://www.npr.org/2024/03/13/1238225241/students-and-teachers-in-florida-can-say-gay-again-without-fear-of-punishment"}, {"name": "Salman, Javeria – “School Clubs for Gay Students Move Underground after Kentucky’s Anti-LGBTQ Law” (Hechinger Report, Dec. 18, 2023)", "meta": "Salman, Javeria. “School Clubs for Gay Students Move Underground after Kentucky’s Anti-LGBTQ Law Goes into Effect.” The Hechinger Report, 18 Dec. 2023.", "desc": "Profiles how LGBTQ+ student groups (GSAs) in rural Kentucky were forced from school campuses to public libraries after the state’s sweeping SB 150 law restricted instruction on gender and sexuality. Centers the experiences of high school students, a trans-bereaved mother, and teachers under the new law’s vague mandates.", "url": "https://hechingerreport.org/school-clubs-for-gay-students-move-underground-after-kentuckys-anti-lgbtq-law-goes-into-effect/"}, {"name": "Salman, Javeria – “Teaching Social Studies in a Polarized World” (Hechinger Report, Dec. 7, 2023)", "meta": "Salman, Javeria. “Teaching Social Studies in a Polarized World.” The Hechinger Report, 7 Dec. 2023.", "desc": "Reports from the National Council for the Social Studies conference on how anti-LGBTQ+ and anti-CRT laws are reshaping what social studies teachers can teach, with Virginia, Kentucky, Tennessee, and Texas educators describing the chilling effect on classroom practice. Directly relevant to LGBTQ+ inclusion in social studies curriculum.", "url": "https://hechingerreport.org/teaching-social-studies-in-a-polarized-world/"}, {"name": "Sosin, Kate – “Florida LGBTQ+ Students Lost Years under ‘Don’t Say Gay.’ Now What?” (The 19th, 2024)", "meta": "Sosin, Kate. “Florida LGBTQ+ Students Lost Years under ‘Don’t Say Gay.’ Now What?” The 19th, 2024, 19thnews.org.", "desc": "Profiles LGBTQ+ high school students in Florida reflecting on years of exclusion under the Parental Rights in Education Act, and what the settlement means for their ability to exist openly in school. Centering student voices on gag orders in secondary settings.", "url": "https://19thnews.org/author/kate-sosin/"}, {"name": "The Banned Resistance (Substack)", "meta": "The Banned Resistance. The Banned Resistance. Ongoing, thebannedresistance.substack.com.", "desc": "Educator-authored Substack from Missouri teachers and advocates offering first-person accounts of teaching under anti-LGBTQ+ and book ban legislation, connecting educator resistance to NCTE resources and policy analysis. Addresses both middle and high school contexts.", "url": "https://thebannedresistance.substack.com/"}, {"name": "Washington Post – “The Virginia Beach Students Battling Youngkin’s School Transgender Policies” (Sept. 20, 2023)", "meta": "“The Virginia Beach Students Battling Youngkin’s School Transgender Policies.” The Washington Post, 20 Sept. 2023.", "desc": "Profiles Virginia Beach high schoolers who spoke at every school board meeting for a year to defend their LGBTQ+ peers against Gov. Youngkin’s model policies rolling back trans student protections. Centers student activism and the social dynamics of trans inclusion in secondary schools.", "url": "https://www.washingtonpost.com/education/2023/09/20/youngkin-school-transgender-policies-virginia-beach/"}], "Policy Reports": [{"name": "2025 National School Climate Survey: The Experiences of LGBTQ+ Youth in Our Nation's Schools", "meta": "Glisten. 2025 National School Climate Survey: The Experiences of LGBTQ+ Youth in Our Nation's Schools. Glisten, 2026.", "desc": "The 13th installment of Glisten's NSCS, drawing on survey data from April–October 2024 (2,800 students) and focus groups from June–July 2025. Finds 2 in 3 LGBTQ+ students felt unsafe due to their sexual orientation or gender identity, and that the 2024–2025 school year felt more hostile amid escalating anti-LGBTQ+ political rhetoric.", "url": "https://glisten.org/nscs2025/"}, {"name": "The 2021 National School Climate Survey: The Experiences of LGBTQ+ Youth in Our Nation's Schools", "meta": "Kosciw, Joseph G., Caitlin M. Clark, and Leesh L. Menard. The 2021 National School Climate Survey: The Experiences of LGBTQ+ Youth in Our Nation's Schools. GLSEN, 2022.", "desc": "The 12th installment of GLSEN's NSCS, documenting pervasive anti-LGBTQ+ harassment and the critical role of supportive educators, inclusive curricula, GSAs, and school policies in creating safer learning environments.", "url": "https://eric.ed.gov/?id=ED625378"}, {"name": "Under Fire: Erasing LGBTQ People from Schools and Public Life", "meta": "Movement Advancement Project. Under Fire: Erasing LGBTQ People from Schools and Public Life. MAP, Mar. 2023.", "desc": "Second in MAP's Under Fire series; documents eight coordinated tactics used to erase LGBTQ people from schools, including curriculum censorship, book bans, bathroom bills, and laws that penalize or criminalize supportive educators.", "url": "https://www.mapresearch.org/under-fire-report"}, {"name": "Policy Spotlight: Curriculum Censorship & Hostile School Climate Bills", "meta": "Movement Advancement Project. Policy Spotlight: Curriculum Censorship & Hostile School Climate Bills. MAP, Mar. 2022.", "desc": "Analyzes the wave of state bills censoring discussions of race, religion, and LGBTQ people in schools and undermining safe school climates; documents near-quadrupling of such bills from 2020 to 2022.", "url": "https://www.lgbtmap.org/2022-spotlight-school-bills-report"}, {"name": "The Impact of 2024 Anti-Transgender Legislation on Youth", "meta": "Redfield, Elana, Kerith J. Conron, and Christy Mallory. The Impact of 2024 Anti-Transgender Legislation on Youth. Williams Institute, UCLA School of Law, Apr. 2024.", "desc": "Estimates how 2024 laws — gender-affirming care bans, sports bans, bathroom bans, pronoun restrictions — affect transgender youth ages 13–17 nationwide; maps policy exposure across school contexts.", "url": "https://williamsinstitute.law.ucla.edu/publications/2024-anti-trans-legislation/"}, {"name": "Anti-LGBTQ+ School Policies and LGBTQ+ Young People", "meta": "The Trevor Project. Anti-LGBTQ+ School Policies and LGBTQ+ Young People. Research Brief. Trevor Project, Aug. 2024.", "desc": "Demonstrates that LGBTQ+ students in schools with restrictive policies — on pronouns, bathrooms, and GSAs — face significantly elevated risks of depression, suicidality, and victimization, and have access to fewer protective resources.", "url": "https://www.thetrevorproject.org/research-briefs/anti-lgbtq-school-policies-and-lgbtq-young-people/"}], "Policy Trackers": [{"name": "State Policies Impacting LGBTQIA+ Students", "meta": "Education Commission of the States. State Policies Impacting LGBTQIA+ Students. ECS, Oct. 2022, www.ecs.org/state-policies-impacting-lgbtqia-students-in-2022/.", "desc": "ECS policy brief summarizing enacted and pending state legislation affecting LGBTQ+ students across instruction, school climate, athletic participation, and student health — with national data on LGBTQ+ high school demographics and mental health impacts.", "url": "https://www.ecs.org/state-policies-impacting-lgbtqia-students-in-2022/"}, {"name": "State Legislation Tracker", "meta": "Equality Federation. State Legislation Tracker. Equality Federation, n.d., www.equalityfederation.org/state-legislation-tracker.", "desc": "Continuously updated tracker of state-level LGBTQ+ bills — pro and anti — introduced each legislative session, sortable by state and issue area including education, healthcare, sports, and nondiscrimination.", "url": "https://www.equalityfederation.org/state-legislation-tracker"}, {"name": "Legislative Tracker: All Anti-L ristin Beck Story. CNN Films, 2014.", "desc": "Documents former Navy SEAL Kristin Beck's public coming out as a transgender woman after 20 years of decorated military service, challenging stereotypes about gender and heroism.", "url": "https://www.imdb.com/title/tt3499084/"}, {"name": "Changing the Game", "meta": "Changing the Game. Directed by Michael Barnett. Hulu / Motto Pictures, 2019.", "desc": "Documentary following three transgender high school athletes as they compete in their chosen sports and navigate state policies that determine whether they can participate.", "url": "https://www.imdb.com/title/tt10011320/"}, {"name": "Straightlaced: How Gender's Got Us All Tied Up", "meta": "Chasnoff, Debra, dir. Straightlaced: How Gender's Got Us All Tied Up. GroundSpark, 2009.", "desc": "Sixty-eight teens from diverse backgrounds share candid perspectives on gender norms, peer pressure, homophobia, and the social policing of masculinity and femininity.", "url": "https://www.imdb.com/title/tt1404412/"}, {"name": "Every Body", "meta": "Cohen, Julie, dir. Every Body. Focus Features / NBC News Studios, 2023.", "desc": "Oscar-nominated director Julie Cohen profiles three intersex people -- River Gallo, Alicia Roth Weigel, and Sean Saifa Wall -- as they challenge a medical system of non-consensual surgeries and fight for intersex rights.", "url": "https://www.imdb.com/title/tt27074938/"}, {"name": "Man Made", "meta": "Cooper, T, dir. Man Made. 2018.", "desc": "Follows four transgender men competing in an all-trans bodybuilding competition, exploring masculinity, identity, and the power of chosen community.", "url": "https://www.imdb.com/title/tt8323404/"}, {"name": "Family Acceptance Project -- Family Video Series", "meta": "Family Acceptance Project. Family Acceptance Project -- Family Video Series. San Francisco State University, n.d., familyproject.sfsu.edu.", "desc": "Families share their journeys of learning to accept and affirm their LGBTQ children, modeling conversations about family support, religious reconciliation, and youth mental health.", "url": "https://familyproject.sfsu.edu"}, {"name": "Hineini: Coming Out in a Jewish High School", "meta": "Fayngold, Irena, dir. Hineini: Coming Out in a Jewish High School. 2005.", "desc": "Chronicles lesbian student Shulamit Izen's effort to start a gay-straight alliance at a Jewish high school in the Boston area, exploring the tensions between queer identity and religious community.", "url": "https://www.imdb.com/title/tt0846699/"}, {"name": "Disclosure", "meta": "Feder, Sam, dir. Disclosure. Netflix, 2020.", "desc": "Laverne Cox executive produces this wide-ranging examination of Hollywood's historical depictions of trans people and the real-world consequences for trans lives and public understanding.", "url": "https://www.samfederfilms.com/disclosure"}, {"name": "The Death and Life of Marsha P. Johnson", "meta": "France, David, dir. The Death and Life of Marsha P. Johnson. Netflix, 2017.", "desc": "Investigates the mysterious 1992 death of legendary trans activist Marsha P. Johnson while documenting her life, the Stonewall uprising, and the ongoing fight for trans rights.", "url": "https://www.imdb.com/title/tt5233558/"}, {"name": "Transhood", "meta": "Geddes, Sharon, dir. Transhood. HBO, 2020.", "desc": "HBO documentary following four trans kids and their families over five years in Kansas City, showing the long arc of gender identity, family dynamics, and community as the children grow into adolescence.", "url": "https://www.youtube.com/watch?v=0CGDD-2Cass"}, {"name": "Gender Revolution: A Journey with Katie Couric", "meta": "Gender Revolution: A Journey with Katie Couric. National Geographic, 2017.", "desc": "National Geographic documentary in which journalist Katie Couric explores evolving understandings of gender identity, interviewing trans children, families, scientists, and activists.", "url": "https://www.youtube.com/playlist?list=PLivjPDlt6ApTL79_aIL-dHceH2PUccvly"}, {"nam utiny. ACLU, 2024.", "desc": "Documents ACLU attorney Chase Strangio's historic legal fight on behalf of trans youth at the U.S. Supreme Court, providing real-time access to the arguments and community stakes.", "url": "https://www.heightenedscrutinydoc.com/dirstate"}, {"name": "Circus of Books", "meta": "Mason, Rachel, dir. Circus of Books. Netflix, 2020.", "desc": "Rachel Mason's documentary about her parents' iconic Los Angeles gay bookstore and porn distributor, exploring family, faith, community, and the history of queer media.", "url": "https://www.imdb.com/title/tt8727582/"}, {"name": "Gay Chorus Deep South", "meta": "McCarthy, David, dir. Gay Chorus Deep South. Variance Films, 2019.", "desc": "The San Francisco Gay Men's Chorus tours the Deep South, performing in communities hostile to LGBTQ+ people and engaging in conversation about empathy, visibility, and common humanity.", "url": "https://www.imdb.com/title/tt8840232/"}, {"name": "Training Rules", "meta": "Mosbacher, Dee, and Fawn Yacker, dirs. Training Rules. WomanVision, 2009.", "desc": "Documents Penn State women's basketball coach Rene Portland's 27-year policy of \"No Drinking, No Drugs, No Lesbians\" and the 2006 legal case filed by player Jennifer Harris, exposing discrimination in collegiate women's sports.", "url": "https://www.imdb.com/title/tt1481562/"}, {"name": "The Brandon Teena Story", "meta": "Muska, Susan, and Gréta Ólafsdóttir, dirs. The Brandon Teena Story. Bless Bless Productions, 1998.", "desc": "Documentary about the 1993 murder of Brandon Teena, a trans man in rural Nebraska, told through interviews with family, friends, and perpetrators. Essential context for trans history and justice.", "url": "https://www.imdb.com/title/tt0144801/"}, {"name": "Edie & Thea: A Very Long Engagement", "meta": "Muska, Susan, and Gréta Ólafsdóttir, dirs. Edie & Thea: A Very Long Engagement. Bless Bless Productions, 2009.", "desc": "Documents the 42-year relationship and ultimate marriage of lesbian activists Edie Windsor and Thea Spyer, whose love story later anchored the landmark Supreme Court case United States v. Windsor.", "url": "https://www.imdb.com/title/tt1512779/"}, {"name": "I'm Just Anneke", "meta": "Müller, Michiel, dir. I'm Just Anneke. 2010.", "desc": "Short Dutch film following a teenager navigating gender nonconformity at home and school, suitable for middle and high school classroom viewing.", "url": "https://www.imdb.com/title/tt1753935/"}, {"name": "The Dreamlife of Georgie Stone", "meta": "Newell, Maya, dir. The Dreamlife of Georgie Stone. Netflix, 2022.", "desc": "Short documentary filmed over 10 years following Australian trans activist Georgie Stone from childhood through adolescence as she fights in court to change laws governing trans youth healthcare.", "url": "https://www.imdb.com/title/tt16426596/"}, {"name": "I Am the Queen", "meta": "Noriega, Eduardo, dir. I Am the Queen. 2015.", "desc": "Follows Puerto Rican trans women participating in a Chicago pageant, exploring identity, community, performance, and the intersections of gender and Latinx culture.", "url": "https://fawesome.tv/movies/10587636/i-am-the-queen"}, {"name": "Transgenders: Pakistan's Open Secret", "meta": "Obaid-Chinoy, Sharmeen, dir. Transgenders: Pakistan's Open Secret. PBS / New York Times Op-Docs, 2009.", "desc": "Investigates the lives of transgender hijra people in Pakistan, exploring religious, cultural, and political dimensions of trans identity in a global context.", "url": "https://www.imdb.com/title/tt2229473/"}, {"name": "The Family Journey: Raising Gender Nonconforming Children", "meta": "Poole, Francine, dir. The Family Journey: Raising Gender Nonconforming Children. 2011.", "desc": "Families reflect on their experiences supporting gender-nonconforming children, emphasizing affirming parenting, school advocacy, and community connection.", "url": "https://www.newday.com/films/the-family-journey-raising-gender-nonconforming-children"}, {"name": "American in Transition", "meta": "Pérez, André, dir. American in Transition. 2019.", "desc": "Web-based documentary project sharing personal stories of transgender people from across the United States, emphasizing diversity of experience across region, race, and age.", "url": "https://marlboro.emerson.edu/andre-perez-america-in-transition/"}, {"name": "Before Stonewall", "meta": "Schiller, Greta, and Robert Rosenberg, dirs. Before Stonewall. Before Stonewall Inc., 1984.", "desc": "Comprehensive oral history documentary on LGBTQ life in America before the 1969 Stonewall riots, drawing on interviews and archival footage to illuminate community, identity, and resistance.", "url": "https://www.imdb.com/title/tt0088782/"}, {"name": "Check It", "meta": "Silverman, Dana, and Toby Oppenheimer, dirs. Check It. 2016.", "desc": "Follows Black gay and trans youth in Washington, D.C. who form a gang for mutual protection and solidarity, turning their collective strength toward fashion and entrepreneurship.", "url": "https://www.imdb.com/title/tt5299014/"}, {"name": "Screaming Queens: The Riot at Compton's Cafeteria", "meta": "Silverman, Victor, and Susan Stryker, dirs. Screaming Queens: The Riot at Compton's Cafeteria. Frameline, 2005.", "desc": "Documents the 1966 Compton's Cafeteria riot in San Francisco's Tenderloin, predating Stonewall, in which trans women and drag queens fought back against police harassment.", "url": "https://www.youtube.com/watch?v=G-WASW9dRBU"}, {"name": "Woman on Fire", "meta": "Sokolow, Julie, dir. Woman on Fire. Sokolow Productions, 2016.", "desc": "Story of Brooke Guinan, New York City's first openly transgender firefighter, documenting her challenges, courage, and visibility as a trailblazer.", "url": "https://www.imdb.com/title/tt4991812/"}, {"name": "Stay on Board: The Leo Baker Story", "meta": "Suckow, Nicola, and Giovanni Reda, dirs. Stay on Board: The Leo Baker Story. Netflix, 2022.", "desc": "Trans professional skateboarder Leo Baker walks away from a potential Olympic dream to live authentically outside the gender binary, exploring the costs and courage of self-determination.", "url": "https://www.imdb.com/title/tt21100124/"}, {"name": "Family in Transition", "meta": "Trainin, Ofir, dir. Family in Transition. 2018.", "desc": "Israeli documentary following a family navigating a parent's gender transition, examining resilience, love, and generational change across cultural and religious contexts.", "url": "https://www.imdb.com/title/tt8731308/"}, {"name": "TRANSformation", "meta": "TRANSformation. MTV, n.d.", "desc": "MTV documentary following trans teens and young adults as they pursue gender-affirming lives, seeking acceptance from family and community.", "url": "https://www.youtube.com/watch?v=qA5fNBQNVyE"}, {"name": "XY Chelsea", "meta": "Travers Hawkins, Tim, dir. XY Chelsea. Showtime / Dogwoof, 2019.", "desc": "Intimate documentary following Chelsea Manning from her 2017 prison release through her public life as a trans woman, activist, and Senate candidate, exploring identity, courage, and consequence.", "url": "https://www.imdb.com/title/tt6905676/"}, {"name": "Treasure: From Tragedy to TransJustice", "meta": "Treasure: From Tragedy to TransJustice. 2012.", "desc": "Documents the 2011 murder of Shelly 'Treasure' Hilliard, a young Black trans woman in Detroit, and the community activism that arose in response.", "url": "https://video.alexanderstreet.com/watch/treasure-from-tragedy-to-trans-justice"}], "Academic & Scholarly References": [{"name": "Recent Legal Challenges Involving a Child's Gender Identity in School", "meta": "Eckes, Suzanne E., and Maggie L. Paino. \"Recent Legal Challenges Involving a Child's Gender Identity in School: An Exploration of the 'Fundamental' Rights of Parents.\" Wisconsin Journal of Law, Gender, & Society 38 (2023): 36.", "desc": "Surveys the emerging wave of litigation framing parental 'fundamental rights' in conflicts over students' gender identities at school, analyzing how courts are balancing student privacy, trans-inclusive school policies, and parental authority.", "url": "https://repository.law.wisc.edu/s/uwlaw/item/323261"}, {"name": "Putting the ‘T’ in ‘Resource", "meta": "Greytak, Emily A., Joseph G. Kosciw, and Madelyn J. Boesen. \"Putting the ‘T’ in ‘Resource’: The Benefits of LGBT-Related School Resources for Transgender Youth.\" Journal of LGBT Youth, vol. 10, no. 1–2, 2013, pp. 45–63.", "desc": "Empirical study linking the availability of LGBT-related school resources — including GSAs, supportive educators, and inclusive curriculum — to significantly improved academic, social, and mental health outcomes for transgender youth.", "url": "https://www.tandfonline.com/doi/abs/10.1080/19361653.2012.718522"}, {"name": "Transgender Solidarity and Gender Out of Place", "meta": "Mayo, Cris. \"Transgender Solidarity and Gender Out of Place.\" Educational Studies, vol. 60, no. 5, 2024, pp. 483–494.", "desc": "Theorizes 'gender out of place' as a framework for understanding trans students' disruption of normative school spaces, and argues for practices of trans solidarity in educational settings as a counter to legislative erasure.", "url": "https://doi.org/10.1080/00131946.2024.2379042"}, {"name": "Teaching, Affirming, and Recognizing Trans and Gender Creative Youth: A Queer Literacy Framework", "meta": "Miller, sj, ed. Teaching, Affirming, and Recognizing Trans and Gender Creative Youth: A Queer Literacy Framework. Palgrave Macmillan, 2016.", "desc": "Cornerstone edited volume offering a Queer Literacy Framework for affirming trans and gender-creative youth in K–12 classrooms. Won the 2017 AERA Exemplary Research Award for Outstanding Book. Chapters by practitioners and scholars across grade levels and disciplines.", "url": "https://link.springer.com/book/10.1057/978-1-137-56766-6"}], "label": "High School", "count": "134 resources · 10 categories"}, "post": {"Recommended Readings": [{"name": "Sex Is as Sex Does: Governing Transgender Identity", "meta": "Currah, Paisley. Sex Is as Sex Does: Governing Transgender Identity. NYU Press, 2022.", "desc": "Examines how US government agencies — from Homeland Security to Departments of Motor Vehicles — each establish their own rules for sex classification, leaving transgender and non-binary people navigating contradictory legal frameworks. Winner of the Sexuality and Politics Book Award from the American Political Science Association. Essential for educators studying the legal and policy dimensions of trans existence.", "url": "https://doi.org/10.18574/nyu/9781479812011.001.0001"}, {"name": "Organizing While Undocumented", "meta": "Escudero, Kevin. Organizing While Undocumented: Immigrant Youth’s Political Activism under the Law. NYU Press, 2020.", "desc": "Examines how undocumented immigrant youth in San Francisco, Chicago, and New York organized politically despite the threat of deportation, developing intersectional coalitions across racial, gender, and sexual identity lines. Includes a chapter on undocuqueer activists. Finalist, 2020 C. Wright Mills Award.", "url": "https://doi.org/10.18574/nyu/9781479803194.001.0001"}, {"name": "Gender and Sexualities in Education: A Reader", "meta": "Meyer, Elizabeth J., and Dennis Carlson, eds. Gender and Sexualities in Education: A Reader. Peter Lang, 2014.", "desc": "Comprehensive reader bridging queer theory, critical pedagogy, and education policy, offering frameworks for advanced study and teacher preparation in gender and sexuality across K–12 and higher education.", "url": "https://www.peterlang.com/document/1051405"}, {"name": "Miller, sj – ‘Trans*+ and Gender Identity Diverse Students’ Right to Use a Bathroom’ (2019)", "meta": "Miller, sj. “Trans*+ and Gender Identity Diverse Students’ Right to Use a Bathroom: Debating Human Dignity.” Democratic Discord in Schools: Cases and Commentaries in Educational Ethics, edited by Meira Levinson and Jacob Fay, Harvard Education Press, 2019, pp. 191–194.", "desc": "Case study commentary exploring the ethical, legal, and human rights dimensions of restroom access for trans+ and gender-diverse students, situated within a broader volume on democratic ethical dilemmas in K–12 education. Part of a seven-commentary case on bathroom access framed around dignity and civic education.", "url": "https://hep.gse.harvard.edu/9781682533024/democratic-discord-in-schools/"}, {"name": "Advancing Racial Literacies in Teacher Education", "meta": "Price-Dennis, Detra, and Yolanda Sealey-Ruiz. Advancing Racial Literacies in Teacher Education: Activism for Equity in Digital Spaces. Teachers College Press, 2021.", "desc": "Presents frameworks for teacher educators to develop racial literacies and digital activism strategies in preservice education, addressing how educators can resist harmful narratives online and in classrooms. Winner of the 2022 NCTE David H. Russell Award and 2022 Literacy Research Association Edward B. Fry Book Award.", "url": "https://www.tcpress.com/advancing-racial-literacies-in-teacher-education-9780807765500"}, {"name": "Creating an LGBT+ Inclusive University", "meta": "Shane, Kryss. Creating an LGBT+ Inclusive University: A Practical Resource Guide for Faculty and Administrators. Routledge, 2022.", "desc": "Practical guide for higher education faculty and administrators on creating affirming campus environments for LGBT+ students, covering teaching, policy, campus climate, and student affairs. Third in Shane’s series following her K–12 and workplace guides.", "url": "https://www.routledge.com/Creating-an-LGBT-Inclusive-University-A-Practical-Resource-Guide-for-Faculty-and-Administrators/Shane/p/book/9781032180847"}, {"name": "Transgender History: The Roots of Today’s Revolution (2nd ed.)", "meta": "Stryker, Susan. Transgender History: The Roots of Today’s Revolution. 2nd ed., Seal Press, 2017.", "desc": "Authoritative and accessible chronological history of US transgender activism and community from the post-WWII era through the 2010s, with a new introduction and updated material in the second edition. Widely used in gender studies, queer studies, and teacher education courses. Susan Stryker is Professor Emerita of Gender and Women’s Studies at the University of Arizona and founding co-editor of TSQ.", "url": "https://www.amazon.com/Transgender-History-second-Todays-Revolution/dp/158005689X"}], "News Articles & Substacks": [{"name": "Conroy, J Oliver – “US Universities Face Choice to Surrender or Fight Back Against Trump’s ‘Takeover’” (The Guardian, March 20, 2025)", "meta": "Conroy, J Oliver. “US Universities Face Choice to Surrender or Fight Back Against Trump’s ‘Takeover’.” The Guardian, 20 Mar. 2025.", "desc": "Investigates the Trump administration’s unprecedented pressure campaign against American higher education, including the freezing of $175 million to the University of Pennsylvania over transgender athlete policies, cancellation of $400 million in Columbia grants, and how universities are weighing whether to comply, negotiate, or resist.", "url": "https://www.theguardian.com/us-news/2025/mar/20/universities-trump-administration"}, {"name": "Higher Ed Dive", "meta": "Higher Ed Dive. Higher Ed Dive. Informa TechTarget, 2017–, www.highereddive.com.", "desc": "Leading higher education news publication covering policy, enrollment, DEI, campus climate, equity, and legal developments in higher ed. Daily free newsletter reaching 67,000+ decision makers. Recent coverage includes anti-DEI legislation, transgender student policies, federal funding fights, and LGBTQ+ campus issues.", "url": "https://www.highereddive.com/"}, {"name": "LGBTQ Nation", "meta": "LGBTQ Nation. LGBTQ Nation. Q.Digital, 2009–, www.lgbtqnation.com.", "desc": "The world’s most-followed LGBTQ news source, covering politics, policy, arts, culture, and community. LGBTQ+-owned and operated by Q.Digital; pro-LGBTQ+ editorial perspective. Active daily coverage of trans rights, anti-LGBTQ legislation, campus policy, and higher education issues.", "url": "https://www.lgbtqnation.com/"}, {"name": "Magpantay, Glenn D. – “Take These Precautions Before Trump Takes Office” (HuffPost, 2016)", "meta": "Magpantay, Glenn D. “Take These Precautions Before Trump Takes Office.” HuffPost, 2016.", "desc": "Opinion piece by civil rights attorney and NQAPIA executive director advising LGBT Asian Americans, South Asians, Southeast Asians, and Pacific Islanders on immigration documentation, healthcare, and legal protections under a Trump administration. Covers intersections of queer and immigrant identity.", "url": "https://www.huffingtonpost.com/glenn-magpantay/take-these-precautions-be_b_13458594.html"}, {"name": "Zimmerman, Alex – “NYC Public Schools Revive LGBTQ History Videos Deleted by PBS” (Chalkbeat NY, Feb. 19, 2025)", "meta": "Zimmerman, Alex. “NYC Public Schools Revive LGBTQ History Videos That Were Deleted from PBS Website.” Chalkbeat New York, 19 Feb. 2025.", "desc": "Reports on how NYC Public Schools republished LGBTQ history videos from the Hidden Voices curriculum after PBS deleted them in response to Trump executive orders on DEI, covering the Lavender Scare, Stonewall, Audre Lorde, and Bayard Rustin. Directly relevant for higher education instructors seeking accessible historical media.", "url": "https://www.chalkbeat.org/newyork/2025/02/19/nyc-public-schools-publishes-lgbtq-history-videos-deleted-by-pbs-wnet/"}, {"name": "Time – “The History Behind the LGBTQ Fight Against Police Violence” (June 2020)", "meta": "“The History Behind the LGBTQ Fight Against Police Violence.” Time, 19 June 2020.", "desc": "Traces how Black trans women and women of color, including Marsha P. Johnson, Sylvia Rivera, Miss Major Griffin-Gracy, and Stormé DeLarverie, were the vanguard of the LGBTQ rights movement from Stonewall to the 2020 Brooklyn Liberation march for Black trans lives, with 15,000 marchers.", "url": "https://time.com/5855232/lgbtq-protest-history/"}], "Policy Reports": [{"name": "American Indian College Fund – Two-Spirit and LGBTQ+ Initiative (2022–ongoing)", "meta": "American Indian College Fund. Two-Spirit and LGBTQ+ Initiative. American Indian College Fund, 2022–, collegefund.org/two-spirit-and-lgbtq/.", "desc": "Capacity-building and knowledge-sharing initiative supporting Two-Spirit and LGBTQ+ students, faculty, staff, and leadership at Tribal Colleges and Universities (TCUs). Includes virtual session recordings, slides, and resources developed with facilitator Alfred Walking Bull (Walking Bull Story + Culture) to support advocacy, education, healing, and campus climate at TCUs.", "url": "https://collegefund.org/two-spirit-and-lgbtq/"}, {"name": "Jones, Brandy, et al. – “Modeling Inclusion: HBCUs and LGBTQ+ Support” (CMSI/HRC Foundation, 2020)", "meta": "Jones, Brandy, et al. Modeling Inclusion: HBCUs and LGBTQ+ Support. Rutgers Center for Minority Serving Institutions and Human Rights Campaign Foundation, 2020.", "desc": "Research brief examining the steps HBCUs are taking to establish LGBTQ+-inclusive policies and practices across admissions, health and wellness, student life, and housing. Highlights model HBCUs including Spelman College (trans-inclusive admissions), Bowie State University (first HBCU LGBTQ health center), and North Carolina Central University, with actionable recommendations.", "url": "https://cmsi.gse.rutgers.edu/sites/default/files/CMSI%20and%20HRC%20LGBTQ%2B%20Brief.pdf"}, {"name": "National Women’s Law Center – Title IX Resources and Amicus Briefs (2024)", "meta": "National Women’s Law Center. “Biden’s New Title IX Rule: Fact Sheet and Chart.” NWLC, 12 June 2024, nwlc.org/resource/bidens-new-title-ix-rule-fact-sheet-and-chart/.", "desc": "NWLC’s 2024 Title IX resources include a fact sheet and chart explaining the Biden administration’s 2024 Title IX rule and its protections for LGBTQI+ students, survivors, and pregnant/parenting students, as well as multiple amicus briefs filed in 2024 defending trans and nonbinary students’ rights under Title IX in federal appellate courts (Eighth, Fifth, and Tenth Circuits).", "url": "https://nwlc.org/resource/bidens-new-title-ix-rule-fact-sheet-and-chart/"}], "Policy Trackers": [{"name": "AAUP Reports on Academic Freedom and LGBTQ+ Inclusion", "meta": "American Association of University Professors. \"On Academic Freedom and Transphobia.\" AAUP, aaup.org/report/academic-freedom-and-transphobia.", "desc": "AAUP produces multiple confirmed reports directly relevant to LGBTQ+ inclusion in higher education: “On Academic Freedom and Transphobia” (Committee on Gender and Sexuality in the Academic Profession); “On Eliminating Discrimination and Achieving Equality in Higher Education” (Jan. 2024); “Political Interference and Academic Freedom in Florida’s Public Higher Education System” (2024, documenting assault on LGBTQ+ rights at New College); and “Diversity, Equity, and Inclusion Criteria for Faculty Evaluation” (Oct. 2024).", "url": "https://www.aaup.org/academe/issues/winter-2022/academic-freedom-and-transphobia"}, {"name": "National Women’s Law Center – Title IX Resources (2024)", "meta": "National Women’s Law Center. “Biden’s New Title IX Rule: Fact Sheet and Chart.” NWLC, 12 June 2024, nwlc.org/resource/bidens-new-title-ix-rule-fact-sheet-and-chart/.", "desc": "NWLC’s 2024 Title IX resources include a fact sheet and chart explaining the 2024 Biden Title IX rule and its protections for LGBTQI+ students, as well as amicus briefs filed in 2024 defending trans and nonbinary students’ rights in federal appellate courts (Eighth, Fifth, and Tenth Circuits). General education and Title IX resource hub: nwlc.org/issue/education-title-ix/.", "url": "https://nwlc.org/resource/bidens-new-title-ix-rule-fact-sheet-and-chart/"}, {"name": "Trans Legislation Tracker", "meta": "Trans Legislation Tracker. Trans Legislation Tracker. translegislation.com, 2021–.", "desc": "Real-time tracker monitoring anti-transgender legislation introduced and passed in state legislatures across the U.S., covering education, healthcare, sports, facilities, ID/documentation, and other categories. Widely cited by educators, researchers, and advocates tracking the policy landscape affecting trans students and faculty.", "url": "https://translegislation.com/"}], "Political & Social Organizations": [{"name": "50501", "meta": "50501. 50501: 50 Protests, 50 States, 1 Movement. fiftyfifty.one, 2025–.", "desc": "Decentralized grassroots movement organizing nationwide protests against the Trump administration’s executive overreach. Founded on Reddit in Jan. 2025, coordinated major “No Kings” days of action on June 14 and Oct. 18, 2025, drawing millions of participants across all 50 states. Part of the No Kings Coalition with 200+ partner organizations.", "url": "https://www.fiftyfifty.one/"}, {"name": "American Association of University Professors (AAUP)", "meta": "American Association of University Professors. AAUP: Advancing Academic Freedom and Shared Governance. AAUP, aaup.org.", "desc": "Professional organization for college and university faculty advocating academic freedom, tenure, shared governance, and faculty rights. Produces reports and policy statements directly relevant to LGBTQ+ inclusion in higher education, including “On Academic Freedom and Transphobia” and “Political Interference and Academic Freedom in Florida’s Public Higher Education System” (2024).", "url": "https://www.aaup.org/"}, {"name": "American Indian College Fund", "meta": "American Indian College Fund. American Indian College Fund. American Indian College Fund, collegefund.org.", "desc": "Largest charity supporting Native American higher education; provides scholarships, curricular resources, and the Two-Spirit and LGBTQ+ Initiative (2022–present), which offers capacity-building resources for Two-Spirit and LGBTQ+ students, faculty, staff, and leadership at Tribal Colleges and Universities (TCUs) nationwide.", "url": "https://collegefund.org/"}, {"name": "Consortium of Higher Education LGBT Resource Professionals", "meta": "Consortium of Higher Education LGBT Resource Professionals. Consortium of Higher Education LGBT Resource Professionals. Consortium of Higher Education LGBT Resource Professionals, lgbtcampus.org.", "desc": "Member-based organization supporting LGBTQ+ professionals working in higher education settings (gender and sexuality center staff, faculty, administrators). Advocates for LGBTQ+-inclusive campus policies and practices, maintains a national map of LGBTQ+ campus resource centers, and publishes policy and practice guidance. Active 2026.", "url": "https://www.lgbtcampus.org/"}, {"name": "Gender Justice League", "meta": "Gender Justice League. Gender Justice League: Trans and GNC Rights. Gender Justice League, 2012–, genderjusticeleague.org.", "desc": "Washington State civil and human rights organization elevating the rights of Two-Spirit, Trans, and Gender Diverse (2STGD) communities through advocacy, direct services, shared leadership development, and Trans Pride Seattle. Provides safety planning, financial assistance, and survivor support for 2STGD communities; doubled revenue in 2024; active in anti-trans legislation response.", "url": "https://www.genderjusticeleague.org/"}, {"name": "ILGA World", "meta": "ILGA World. ILGA World: International Lesbian, Gay, Bisexual, Trans and Intersex Association. ILGA World, 2024, ilga.org.", "desc": "Global federation of 2,000+ organizations in 160+ countries advocating for LGBTQ+ human rights, documenting legal status of LGBTQ+ people worldwide, and advocating at the United Nations. Publishes annual “State-Sponsored Homophobia” report tracking criminalization laws globally.", "url": "https://ilga.org/"}, {"name": "The Lincoln Project", "meta": "Lincoln Project. The Lincoln Project. Lincoln Project, lincolnproject.us.", "desc": "Political action committee founded by former Republican strategists opposing the Trump administration and authoritarian governance. Produces political advertising and organizing content targeting swing-state voters and policy fights around democratic institutions.", "url": "https://lincolnproject.us/"}, {"name": "TGI Justice Project (TGIJP) / Miss Major Alexander L. Lee TGIJP Black Trans Cultural Center", "meta": "Miss Major Alexander L. Lee TGIJP Black Trans Cultural Center (TGI Justice Project). TGI Justice Project: Black Trans-Led Mutual Aid. TGIJP, 2004–, tgijp.org.", "desc": "San Francisco-based Black trans–led organization working to end human rights abuses against transgender, gender-variant, and intersex people inside and outside of California prisons, jails, and detention centers. Programs include political education, re-entry and housing support, name/gender marker change clinics, legal case management, and mutual aid. Founded 2004; purchased a building in San Francisco as a permanent Black Trans Cultural Center.", "url": "https://tgijp.org/"}, {"name": "National Center for Lesbian Rights (NCLR)", "meta": "National Center for Lesbian Rights. NCLR: Advancing Rights and Justice for LGBTQ+ People. NCLR, nclrights.org.", "desc": "Legal advocacy organization advancing rights and justice for LGBTQ+ people through litigation, legislation, and public policy. Areas of focus include family law, youth protections, trans rights, sports, and immigration. Litigates landmark cases and provides legal resources for LGBTQ+ youth and families.", "url": "https://www.nclrights.org/"}, {"name": "National Conference on Race & Ethnicity in American Higher Education (NCORE)", "meta": "National Conference on Race and Ethnicity in American Higher Education. NCORE. University of Oklahoma Outreach, 1988–, ncore.ou.edu.", "desc": "Leading annual higher education conference on race, ethnicity, and equity, organized by the University of Oklahoma’s Southwest Center for Human Relations Studies. Brings together faculty, administrators, and practitioners for five days of sessions on institutional transformation, diverse student access, and social justice in higher education. The 37th annual NCORE took place in New York City, May 27–31, 2025.", "url": "https://clintonwhitehouse4.archives.gov/Initiatives/OneAmerica/Practices/pp_19980915.3947.html"}, {"name": "Outright International (formerly OutRight Action International)", "meta": "Outright International. Outright International: Advancing Human Rights for LGBTIQ+ People. Outright International, outrightinternational.org.", "desc": "Global LGBTIQ human rights NGO founded 1990. First and only U.S.-based LGBTIQ organization with ECOSOC consultative status at the United Nations. Works in 150+ countries through regional programs in Asia, MENA, Africa, and Latin America/Caribbean; conducts research, UN advocacy, capacity building, and emergency response.", "url": "https://outrightinternational.org/"}, {"name": "Transgender Law Center (TLC)", "meta": "Transgender Law Center. Transgender Law Center. Transgender Law Center, 2002–, transgenderlawcenter.org.", "desc": "Largest national trans-led legal organization in the U.S., founded 2002. Works through impact litigation, community-driven legal services, public policy advocacy, and education to advance the rights of transgender and gender-nonconforming people, prioritizing BIPOC, disabled, and HIV+ communities. Programs include Black Trans Circles, Gender Justice Leadership Programs, the Black LGBTQIA+ Migrant Project, and legal services for incarcerated trans people.", "url": "https://transgenderlawcenter.org/"}], "Podcasts & Webinars": [{"name": "AfroQueer", "meta": "AfroQueer. AQ Studios, n.d., aqstudios.fm/afro-queer.", "desc": "Podcast documenting the lives, loves, and struggles of queer Africans on the continent and in the diaspora, covering law, migration, family, and identity through character-driven storytelling.", "url": "https://afroqueerpodcast.wordpress.com/about-us/"}, {"name": "All My Relations", "meta": "All My Relations. n.d., www.allmyrelationspodcast.com.", "desc": "Indigenous-hosted podcast co-created by Dr. Adrienne Keene and Matika Wilbur exploring Indigenous relationships, identity, land, and colonization, including Two-Spirit and LGBTQ+ lives.", "url": "https://www.allmyrelationspodcast.com"}, {"name": "Black & Trans Substack", "meta": "Black Trans Perspectives. Black & Trans Substack. blackntrans.substack.com, n.d.", "desc": "Substack newsletter centering Black trans perspectives on identity, healing, resistance, and liberation, offering educators authentic material for discussing intersectionality, Black trans history, and youth voice.", "url": "https://blackntrans.substack.com"}, {"name": "Trans News That Doesn't Suck", "meta": "Brookins, KB. Trans News That Doesn't Suck. transnews.substack.com, n.d.", "desc": "Weekly Substack newsletter and video series by award-winning Black trans writer and educator KB Brookins, curating positive and affirming trans news from around the web as an antidote to anti-trans rhetoric.", "url": "https://transnews.substack.com"}, {"name": "Gender Reveal", "meta": "Gender Reveal. Hosted by Tuck Woodstock. n.d., www.genderpodcast.com.", "desc": "Weekly podcast exploring the vast diversity of trans and nonbinary experiences through interviews with artists, activists, academics, and everyday trans people. Created in 2017; over 150 episodes.", "url": "https://www.genderpodcast.com"}, {"name": "Glisten Educator Webinars", "meta": "Glisten. Glisten Educator Webinars. n.d., glisten.org.", "desc": "Ongoing professional development webinar series from Glisten providing educators with best practices, inclusive pedagogical strategies, and policy guidance for supporting LGBTQ+ students in K–12 schools, including secondary math and STEM contexts.", "url": "https://glisten.org"}, {"name": "History Is Gay", "meta": "History Is Gay. n.d., historyisgaypodcast.com.", "desc": "Explores overlooked queer and trans histories across cultures, time periods, and geographies through a collaborative, accessible storytelling format.", "url": "https://www.historyisgaypodcast.com"}, {"name": "Making Gay History", "meta": "Making Gay History. n.d., makinggayhistory.com.", "desc": "Oral history podcast bringing LGBTQ pioneers and civil rights activists to life using rare archival recordings; each episode centers a different trailblazer from the last century.", "url": "https://makinggayhistory.com"}, {"name": "OutCasting", "meta": "OutCasting. Minor Foundation for Public Good, n.d., mfpg.org.", "desc": "Youth-driven public radio program and podcast giving LGBTQ+ teens a platform to share their own stories, produced by the Minor Foundation for Public Good.", "url": "https://www.mfpg.org"}, {"name": "Pride in STEM Podcast", "meta": "Pride in STEM. Pride in STEM Podcast. Hosted by Dr. Craig Poku. prideinstem.org, 2021–present.", "desc": "Award-nominated podcast bringing forward the voices of LGBTQIA+ people facing barriers in STEM fields, with a focus on intersectionality (race, disability, gender identity). UK-based; broad international relevance for STEM educators.", "url": "https://prideinstem.org"}, {"name": "Prideful Connections", "meta": "Prideful Connections. Hosted by Tony Ferraiolo and Sarah Celotto. n.d.", "desc": "Podcast hosted by a trans advocate and a parent of a transgender youth, covering advocacy, inclusive faith, school support, and lived experiences within the transgender community.", "url": "https://www.facebook.com/HCAILLC/videos/in-episode-one-of-prideful-connections-podcast-tony-ferraiolo-explains-to-sarah-/1764838124293726/"}, {"name": "Queer America", "meta": "Queer America. Learning for Justice / History UnErased, n.d., www.learningforjustice.org/podcasts/queer-america.", "desc": "Podcast produced by Learning for Justice in partnership with History UnErased (unerased.org), featuring LGBTQ+ educators sharing strategies for navigating restrictive laws and teaching inclusive history across K–12 contexts.", "url": "https://www.learningforjustice.org/podcasts/queer-america"}, {"name": "QueerAF", "meta": "QueerAF. wearequeeraf.com, 2016–present.", "desc": "Award-winning British LGBTQIA+ podcast and newsletter mentoring emerging queer creatives; each podcast episode is produced by a different budding LGBTQIA+ audio professional. Multiple British Podcast Awards nominations; 2025 Audio Production Awards 'Changemaker' Gold.", "url": "https://www.wearequeeraf.com"}, {"name": "Sounds Fake but Okay", "meta": "Sounds Fake but Okay. n.d., soundsfakepod.com.", "desc": "Weekly comedy podcast co-hosted by two friends — one asexual, one aromantic — exploring asexuality, aromanticism, and broader LGBTQ+ identity with warmth, humor, and personal honesty.", "url": "https://soundsfakepod.com"}, {"name": "Teaching While Queer", "meta": "Teaching While Queer. Hosted by Bryan Stanton. teachingwhilequeer.org, 2022–present.", "desc": "Podcast and nonprofit at the intersection of queerness, education, and resistance, featuring LGBTQ+ educators navigating book bans, identity erasure, burnout, and hostile policies. Hosted by Bryan Stanton (they/them), award-winning educator and founder of the Teaching While Queer movement.", "url": "https://teachingwhilequeer.org"}, {"name": "TransLash Podcast with Imara Jones", "meta": "TransLash. TransLash Podcast with Imara Jones. translash.org, n.d.", "desc": "Weekly podcast hosted by journalist and activist Imara Jones, covering anti-trans legislation, grassroots activism, trans culture, and the human stories behind the headlines.", "url": "https://translash.org"}, {"name": "Uncloseted Media", "meta": "Uncloseted Media. unclosetedmedia.com, 2024–present.", "desc": "Investigative LGBTQ-focused nonprofit newsroom (launched September 2024) publishing rigorous, nonpartisan journalism on the anti-LGBTQ landscape, with a podcast launched March 2025. Partner publication with Gay Times; Gracie Award–winning journalism team.", "url": "https://www.unclosetedmedia.com"}, {"name": "Transitics", "meta": "Vaca, Aleksandra. Transitics. transitics.substack.com, n.d.", "desc": "Substack newsletter by transgender journalist Aleksandra Vaca providing grounded political analysis and news on policies affecting the trans and broader LGBTQ+ community, including a comprehensive anti-trans policy and litigation tracker (CATPALM).", "url": "https://transitics.substack.com"}], "Open-Access Curricula & OER Repositories": [{"name": "CUNY OpenEd – LGBTQ+ Open Educational Resources", "meta": "City University of New York. CUNY OpenEd / OER Hub. City University of New York, opened.cuny.edu.", "desc": "CUNY’s curated digital library of open educational resources by and for CUNY faculty and students. The CUNY OER Hub includes subject-specific collections. Confirmed LGBTQ+ OER includes Brooklyn College’s SPCL 3000 LGBTQ Youth in Educational Contexts (Dr. Emily Greytak, 2023) and the CUNY Graduate Center’s Free Queer CUNY open pedagogy project.", "url": "https://opened.cuny.edu/"}, {"name": "Digital Transgender Archive (DTA)", "meta": "Digital Transgender Archive. Digital Transgender Archive (DTA). College of the Holy Cross, 2016–, digitaltransgenderarchive.net.", "desc": "International open-access archive and finding aid aggregating trans-related primary sources from 60+ colleges, universities, nonprofit organizations, and private collections worldwide. Provides a single search engine for digitized historical materials, born-digital materials, and archival holdings focused on non-normative gender practices. Received a $500,000 Mellon Foundation grant in 2024 to establish a West Coast hub at Northeastern University (Oakland).", "url": "https://www.digitaltransgenderarchive.net/"}, {"name": "OER Commons – LGBTQ+ Open Educational Resources", "meta": "OER Commons. LGBTQ+ Open Educational Resources. ISKME, oercommons.org/browse?f.keyword=lgbtq.", "desc": "Open digital library aggregating freely licensed LGBTQ+-related syllabi, course materials, textbooks, lesson plans, and modules. Includes “Introduction to LGBTQ+ Studies” (Milne Open Textbooks Collection), queer theory modules, and LGBTQ history units. Free to access and download without login.", "url": "https://oercommons.org/browse?f.keyword=lgbtq"}, {"name": "OpenStax – Introduction to Sociology 2e, Ch. 12: Gender, Sex, and Sexuality", "meta": "OpenStax. \"Introduction to Gender, Sex, and Sexuality.\" Introduction to Sociology 2e, OpenStax, openstax.org/books/introduction-sociology-2e/pages/12-introduction-to-gender-sex-and-sexuality.", "desc": "Free, peer-reviewed open textbook chapter covering the social construction of gender and sexuality, queer theory, gender identity, sexual orientation, and intersectional inequalities. Chapter 12 of Introduction to Sociology 2e (CC BY). Used widely in introductory general education courses. An updated Sociology 3e edition with an equivalent chapter is also available at openstax.org.", "url": "https://openstax.org/books/introduction-sociology-2e/pages/12-introduction-to-gender-sex-and-sexuality"}, {"name": "Queer Zine Archive Project (QZAP)", "meta": "Queer Zine Archive Project. Queer Zine Archive Project (QZAP). Milo Miller and Chris Wilde, 2003–, qzap.org.", "desc": "Milwaukee-based community archive and free searchable online database of 4,500+ queer zines, 600+ digitized and downloadable. Covers queer punk, ACT UP, gender and sexuality, and community life from the 1970s to 2020s. Digitized items also available through the Digital Transgender Archive.", "url": "https://www.qzap.org/"}, {"name": "Society for Queer Asian Studies (SQAS) – Syllabus Sharing Initiative", "meta": "Society for Queer Asian Studies. Society for Queer Asian Studies (SQAS). sqasaas.org.", "desc": "AAS-affiliated scholarly society promoting research on queer genders and sexualities in Asia. Hosts a syllabus-sharing initiative where faculty submit and request syllabi related to queer Asian studies. Also sponsors conference panels, awards, and networking for scholars researching queer Asian topics across disciplines and diaspora contexts.", "url": "https://researchers.mq.edu.au/en/activities/society-for-queer-asian-studies-external-organisation/"}, {"name": "Teach-Out Series (University of Michigan)", "meta": "University of Michigan Michigan Online. Teach-Outs. University of Michigan Michigan Online, online.umich.edu/teach-outs/.", "desc": "Free, open online learning events from the University of Michigan. The LGBTQ Pride Teach-Out is a free 5-hour mini-course on the history and complexity of Pride, produced by the U-M Spectrum Center and Office for Academic Innovation. Also available on Coursera. Additional queer and LGBTQ+ Teach-Outs are available on the platform.", "url": "https://online.umich.edu/teach-outs/"}], "Activist Groups & Campaigns": [{"name": "Advocates for Trans Equality (A4TE)", "meta": "Advocates for Trans Equality. n.d., transequality.org.", "desc": "National trans-led nonprofit formed in 2024 from the merger of TLDEF and NCTE, advancing legal rights and political equality for transgender people through litigation, policy advocacy, and direct services.", "url": "https://transequality.org"}, {"name": "AWM Inclusive Teaching Modules", "meta": "Association for Women in Mathematics. Inclusive Teaching Modules. n.d., awm-math.org.", "desc": "Classroom modules and resources from the Association for Women in Mathematics supporting gender and LGBTQ+ inclusion in postsecondary mathematics courses and departments.", "url": "https://awm-math.org"}, {"name": "Audre Lorde Project", "meta": "Audre Lorde Project. The Audre Lorde Project: Community Organizing Center for LGBTQ People of Color. n.d., alp.org.", "desc": "Community organizing center for LGBTQ people of color in New York City, providing direct services, advocacy, and leadership development toward wellness, justice, and liberation.", "url": "https://alp.org"}, {"name": "Black & Pink", "meta": "Black & Pink. n.d., www.blackandpink.org.", "desc": "Prison abolitionist organization dedicated to liberating LGBTQIA2S+ people and people l  [{"name": "Education Law Center. \"Making the Grade: How Fair Is School Funding in Your State?\"", "meta": "Education Law Center. \"Making the Grade: How Fair Is School Funding in Your State?\" Education Law Center, edlawcenter.org/research/making-the-grade/. Accessed 3 May 2026.", "desc": "Annual report by the Education Law Center grading all 50 states on school funding equity, adequacy, and effort. Provides state-level data to inform advocates, policymakers, and community leaders working to improve public school funding and resource equity, with particular attention to underserved student populations.", "url": "https://edlawcenter.org/research/making-the-grade/"}, {"name": "National Education Policy Center. \"Policy Briefs.\"", "meta": "National Education Policy Center. \"Policy Briefs.\" National Education Policy Center, nepc.colorado.edu/publications/policy-briefs. Accessed 3 May 2026.", "desc": "University research center at the University of Colorado Boulder that publishes accessible policy briefs synthesizing education research for policymakers, educators, and the public. Equity-focused analysis is produced through its Initiative on Diversity, Equity, and Learning (IDEAL), with relevance to school reform and inclusion.", "url": "https://nepc.colorado.edu/publications/policy-briefs"}, {"name": "Williams Institute, UCLA School of Law. \"Publications.\"", "meta": "Williams Institute, UCLA School of Law. \"Publications.\" Williams Institute, williamsinstitute.law.ucla.edu/publications/. Accessed 3 May 2026.", "desc": "Think tank at UCLA School of Law producing rigorous, independent research on sexual orientation and gender identity law and public policy. Includes empirical studies on LGBTQ youth experiences in K–12 schools, school climate, legal protections, and demographic data relevant to supporting transgender and LGBTQ+ students.", "url": "https://williamsinstitute.law.ucla.edu/publications/"}], "Political & Social Organizations": [{"name": "Glisten (formerly GLSEN)", "meta": "Glisten. Glisten. n.d., glisten.org.", "desc": "Leading national organization championing LGBTQ+ issues in K–12 education through research, policy advocacy, educator training, and student GSA club support. Founded in 1990; formerly known as GLSEN (Gay, Lesbian & Straight Education Network); rebranded as Glisten in February 2026.", "url": "https://glisten.org"}, {"name": "Welcoming Schools (HRC Foundation)", "meta": "Human Rights Campaign Foundation. Welcoming Schools. n.d., www.welcomingschools.org.", "desc": "HRC Foundation's comprehensive K–12 bias-based bullying prevention program providing LGBTQ-inclusive, anti-bullying, and family-diversity resources, lesson plans, and professional development for educators.", "url": "https://www.welcomingschools.org"}], "Podcasts & Webinars": [{"name": "EdWeb.net Educator Webinars", "meta": "EdWeb.net Educator Webinars. edWeb.net, n.d., home.edweb.net.", "desc": "A free professional learning platform offering hundreds of live and on-demand webinars for PreK–12 educators on topics including inclusive classrooms, student well-being, and affirming school environments; CE certificates available and accepted in 42 states.", "url": "https://home.edweb.net"}, {"name": "Glisten Educator Webinar Series", "meta": "Glisten Educator Webinar Series. Glisten, n.d., www.glisten.org.", "desc": "A webinar series from Glisten (formerly GLSEN) offering educator-focused professional development on LGBTQ+ inclusion, pronouns, policy, and supporting transgender and gender-nonconforming students in K–12 schools.", "url": "https://www.glisten.org"}, {"name": "NAEYC Professional Learning Institute", "meta": "NAEYC Professional Learning Institute. National Association for the Education of Young Children, n.d., www.naeyc.org/our-work/professional-learning.", "desc": "Professional development webinars and resources from NAEYC addressing diversity, equity, and inclusion in early childhood and PreK–3 education, including sessions on anti-bias education, culturally responsive teaching, and equitable learning environments.", "url": "https://www.naeyc.org/our-work/professional-learning"}, {"name": "Queer America", "meta": "Queer America. Learning for Justice, n.d., www.learningforjustice.org/podcasts/queer-america.", "desc": "A podcast series from Learning for Justice, hosted by historians Leila Rupp and John D'Emilio, exploring the history of sexual orientation and gender identity in the United States to help educators integrate LGBTQ+ history into their curricula.", "url": "https://www.learningforjustice.org/podcasts/queer-america"}, {"name": "Teaching Hard History", "meta": "Teaching Hard History. Learning for Justice, n.d., www.learningforjustice.org/podcasts/teaching-hard-history.", "desc": "A podcast series from Learning for Justice hosted by historian Hasan Kwame Jeffries, Ph.D., examining the history of American slavery and the Civil Rights Movement through conversations with leading scholars and educators; includes professional development resources and episode guides for K–12 teachers.", "url": "https://www.learningforjustice.org/podcasts/teaching-hard-history"}, {"name": "Teaching While Queer: Advocacy, Community, and Resources for LGBTQ+ Educators", "meta": "Teaching While Queer: Advocacy, Community, and Resources for LGBTQ+ Educators. Teaching While Queer, n.d., teachingwhilequeer.org.", "desc": "A podcast hosted by Bryan Stanton (they/them) centering the real-world experiences of LGBTQ+ educators, covering topics including burnout, tokenism, advocacy, inclusive classroom strategies, and building community for queer teachers across K–12 and higher education.", "url": "https://teachingwhilequeer.org"}, {"name": "UnErasing LGBTQ History and Identities: A Podcast for Teachers", "meta": "UnErasing LGBTQ History and Identities: A Podcast for Teachers. History UnErased, n.d., unerased.org/resource/podcasts.", "desc": "A podcast series from History UnErased offering practical strategies and real-world advice for K–12 educators working to create LGBTQ-inclusive classrooms, featuring teachers sharing firsthand experiences and guidance on inclusion, curriculum, and navigating educator challenges.", "url": "https://unerased.org/resource/podcasts"}], "Open-Access Curricula & OER Repositories": [{"name": "Gender Spectrum", "meta": "Gender Spectrum. n.d.", "desc": "Lesson plans, discussion guides, and educator resources for supporting gender-expansive youth.", "url": "https://genderspectrum.org"}, {"name": "Learning for Justice", "meta": "Learning for Justice. n.d.", "desc": "Inclusive lesson plans, book lists, and professional development resources.", "url": "https://www.learningforjustice.org"}, {"name": "Our Family Coalition – Education Resources", "meta": "Our Family Coalition. Our Family Coalition Education Resources. n.d., ourfamily.org/programs-services/education/.", "desc": "Classroom toolkits, educator guides, and professional development resources on LGBTQ+ family diversity and inclusion, developed by California's largest LGBTQ family organization for PreK–12 educators.", "url": "https://ourfamily.org/programs-services/education/"}, {"name": "Teaching Tolerance Digital Toolbox (archived via Learning for Justice)", "meta": "Teaching Tolerance Digital Toolbox. Learning for Justice, n.d., www.learningforjustice.org.", "desc": "Classic toolkits with open-access anti-bias lessons for younger grades, now archived and accessible through the Learning for Justice website. Note: Teaching Tolerance rebranded as Learning for Justice in 2021; these resources are no longer maintained separately.", "url": "https://www.learningforjustice.org"}, {"name": "Teachstone CLASS Resources", "meta": "Teachstone CLASS Resources. Teachstone, n.d., teachstone.com.", "desc": "Evidence-based frameworks and professional development tools focused on improving classroom interactions in PreK–12 settings. Relevant to equity in early grades; not specifically LGBTQ+-focused.", "url": "https://teachstone.com"}, {"name": "Welcoming Schools – HRC Foundation", "meta": "Welcoming Schools. Human Rights Campaign Foundation, n.d., www.welcomingschools.org.", "desc": "Anti-bias curriculum and educator resources.", "url": "https://www.welcomingschools.org"}], "Activist Groups & Campaigns": [{"name": "Family Equality", "meta": "Family Equality. Family Equality: The National Nonprofit for LGBTQ+ Families. familyequality.org.", "desc": "Leading national organization for LGBTQ+ families; supports educators in affirming diverse family structures through advocacy, storytelling, community, and education; active through 2025–2026.", "url": "https://familyequality.org"}, {"name": "Gender Spectrum", "meta": "Gender Spectrum. Gender Spectrum: Supporting Gender-Diverse Youth. genderspectrum.org.", "desc": "Advocacy and support network for gender-diverse youth and their families; offers educator guides, trainings, and resources for creating gender-inclusive schools and classrooms.", "url": "https://www.genderspectrum.org"}, {"name": "Glisten — Changing the Game Campaign", "meta": "Glisten. Changing the Game. Glisten, glsen.org/changing-the-game.", "desc": "Student-led national campaign focusing on gender-affirming physical education and youth athletics; helps educators embed identity literacy into movement, health, and PE instruction.", "url": "https://www.glsen.org/changing-the-game"}, {"name": "Mokros & Parsons — Connecting the LGBTQ+ Community with Science Centers and Youth Programs (NSTA Connected Science Learning, Nov.–Dec. 2022)", "meta": "Mokros, Jan, and Jen Tuttle Parsons. \"Connecting the LGBTQ+ Community with Science Centers and Youth Programs.\" Connected Science Learning, vol. 4, no. 6, Nov.–Dec. 2022. https://www.nsta.org/connected-science-learning/connected-science-learning-november-december-2022/connecting-lgbtq.", "desc": "Features inclusive science programming models from national science centers that educators can adapt; demonstrates how identity, inquiry, and public science learning can intersect at younger ages.", "url": "https://www.nsta.org/connected-science-learning/connected-science-learning-november-december-2022/connecting-lgbtq"}, {"name": "Rethinking Schools", "meta": "Rethinking Schools. Rethinking Schools: Teaching for Justice. Rethinking Schools, rethinkingschools.org.", "desc": "Nonprofit magazine and book publisher dedicated to strengthening public education through social justice teaching and education activism; recent titles include “Transgender Justice in Schools.” Founded 1986.", "url": "https://rethinkingschools.org"}, {"name": "Trans Youth Equality Foundation (TYEF)", "meta": "Trans Youth Equality Foundation. TYEF: Education, Advocacy, and Support for Transgender Youth. transyouthequality.org.", "desc": "National nonprofit providing education, advocacy, and support for transgender youth and their families; offers educator workshops, resources, summer camp, and the TransWaves podcast.", "url": "https://www.transyouthequality.org"}, {"name": "Trans Youth Family Allies (TYFA)", "meta": "Trans Youth Family Allies. TYFA: Supporting Trans, Gender Variant, and Gender Questioning Youth and Families. TYFA, imatyfa.org.", "desc": "Empowers children and families by partnering with educators, service providers, and communities to develop supportive environments where gender may be expressed and respected.", "url": "https://www.imatyfa.org"}], "Films, Documentaries & Visual Media": [{"name": "A Kid Like Jake", "meta": "A Kid Like Jake. Directed by Silas Howard. IFC Films, 2018.", "desc": "Feature film following two Brooklyn parents navigating kindergarten applications and their gender-expansive four-year-old son. Useful for exploring adult responses to childhood gender nonconformity.", "url": "https://www.imdb.com/title/tt6884200/"}, {"name": "A Place in the Middle", "meta": "A Place in the Middle. Directed by Dean Hamer and Joe Wilson. 2014.", "desc": "Short documentary about a Hawaiian student who identifies across genders, exploring the Native Hawaiian concept of māhū and how a supportive teacher and school community affirm their identity. Includes educator guide.", "url": "https://www.aplaceinthemiddle.org"}, {"name": "Being Me", "meta": "Being Me. Directed by Erin Brown Thomas. Journeyman Pictures, 2015.", "desc": "Documentary following 10-year-old Isabelle Langley and other transgender youth, exploring their journeys of self-discovery and the support they find from families and medical professionals. Offers elementary educators tools for fostering empathy and inclusion around trans student experiences.", "url": "https://www.imdb.com/title/tt2820328/"}, {"name": "Gender Revolution: A Journey with Katie Couric", "meta": "Gender Revolution: A Journey with Katie Couric. National Geographic, 2017.", "desc": "National Geographic documentary in which journalist Katie Couric explores evolving understandings of gender identity across the United States, interviewing trans children, families, scientists, and activists with accessible explanation.", "url": "https://www.youtube.com/playlist?list=PLivjPDlt6ApTL79_aIL-dHceH2PUccvly"}, {"name": "Growing Up Coy", "meta": "Growing Up Coy. Directed by Eric Juhola. 2016.", "desc": "Documentary following Coy Mathis and her family's landmark legal case for her right to use the school restroom consistent with her gender identity, exploring broader questions of transgender rights in K–12 education.", "url": "https://www.imdb.com/title/tt5648966/"}, {"name": "In a Heartbeat", "meta": "In a Heartbeat. Directed by Esteban Bravo and Beth David. Ringling College of Art and Design, 2017.", "desc": "Animated short (4 min.) depicting a closeted boy whose heart literally leaps from his chest to chase his crush, another boy. Widely praised for its wordless, inclusive depiction of same-sex affection for younger audiences. Available on YouTube.", "url": "https://www.imdb.com/title/tt6969946/"}, {"name": "It's Elementary: Talking About Gay Issues
