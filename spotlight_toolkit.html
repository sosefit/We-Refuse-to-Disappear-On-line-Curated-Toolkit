<title>ELA Spotlight Toolkit</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;background:#f7f6f3;color:#1c1c1a;min-height:100vh}

/* ── Subject colors ─────────────────────────────────────── */
:root{
  --subj-bg:#2171c7;
  --subj-nav-bg:#1a5fa8;
  --subj-border:#144d8a;
  --subj-active:#0e3d70;
  --subj-home-sep:#0e3d70;
  --grade-accent:#e8799e;
  --grade-active-text:#4B1528;
  --card-top:#378ADD;
  --link-color:#185FA5;
  --link-hover:#0C447C;
  --search-bg:#1a5fa8;
  --search-border:#144d8a;
  --search-input-bg:#0e3d70;
  --search-focus:#e8799e;
  --sb-active-bg:#e8799e;
  --sb-active-text:#4B1528;
  --sb-active-border:#e8799e;
}
body.subj-ss{
  --subj-bg:#1a7a4a;
  --subj-nav-bg:#15693d;
  --subj-border:#0f5230;
  --subj-active:#0a3d22;
  --subj-home-sep:#0a3d22;
  --grade-accent:#d4a017;
  --grade-active-text:#3B2800;
  --card-top:#1a7a4a;
  --link-color:#0f5230;
  --link-hover:#0a3d22;
  --search-bg:#15693d;
  --search-border:#0f5230;
  --search-input-bg:#0a3d22;
  --search-focus:#d4a017;
  --sb-active-bg:#d4a017;
  --sb-active-text:#3B2800;
  --sb-active-border:#d4a017;
}


body.subj-ela{
  --subj-bg:#BA7517;
  --subj-nav-bg:#9E6112;
  --subj-border:#7D4D0E;
  --subj-active:#5C390A;
  --subj-home-sep:#5C390A;
  --grade-accent:#F5C842;
  --grade-active-text:#3B2200;
  --card-top:#BA7517;
  --link-color:#7D4D0E;
  --link-hover:#5C390A;
  --search-bg:#9E6112;
  --search-border:#7D4D0E;
  --search-input-bg:#5C390A;
  --search-focus:#F5C842;
  --sb-active-bg:#F5C842;
  --sb-active-text:#3B2200;
  --sb-active-border:#F5C842;
}

/* ── Header ─────────────────────────────────────────────── */
.hdr{background:var(--subj-bg);padding:2rem 2.5rem 0;transition:background .25s}
.hdr-eyebrow{font-family:'Courier New',monospace;font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:#fff;margin-bottom:.4rem}
.hdr h1{font-family:Georgia,serif;font-size:26px;font-weight:600;color:#fff}

/* ── Subject nav ─────────────────────────────────────────── */
.subject-nav{display:flex;gap:0;background:var(--subj-nav-bg);border-top:1px solid var(--subj-border);border-bottom:1px solid var(--subj-border);overflow-x:auto;transition:background .25s}
.snav-btn{font-family:'Courier New',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:9px 18px;background:transparent;border:none;border-right:1px solid var(--subj-border);color:rgba(255,255,255,.65);cursor:pointer;transition:all .15s;white-space:nowrap;display:inline-block;line-height:1;text-decoration:none}
.snav-btn:last-child{border-right:none}
.snav-btn:hover{background:var(--subj-border);color:#fff}
.snav-btn.active{color:#fff;background:var(--subj-active);font-weight:700}
.snav-home{border-right:2px solid var(--subj-home-sep)!important;margin-right:4px;text-decoration:none}

/* ── Grade tabs ──────────────────────────────────────────── */
.grade-tabs{display:flex;gap:0;border-top:1px solid var(--grade-accent);margin-top:.5rem;overflow-x:auto}
.gtab{font-family:'Courier New',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:12px 20px;background:transparent;border:none;border-right:1px solid var(--subj-border);color:#fff;cursor:pointer;transition:all .15s;position:relative;white-space:nowrap}
.gtab:last-child{border-right:none}
.gtab:hover{background:var(--grade-accent);color:var(--grade-active-text)}
.gtab.active{color:var(--grade-active-text);background:var(--grade-accent)}
.gtab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--grade-active-text)}

/* ── Layout ──────────────────────────────────────────────── */
.layout{display:flex;min-height:calc(100vh - 160px)}
.sidebar{width:210px;flex-shrink:0;background:#fff;border-right:1px solid #e5e3de;padding:1.5rem 0;position:sticky;top:0;height:calc(100vh - 160px);overflow-y:auto}
.sb-label{font-family:'Courier New',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#aaa;padding:0 1.25rem;margin-bottom:.6rem;display:block}
.sb-btn{display:block;width:100%;text-align:left;padding:7px 1.25rem 7px 1rem;font-size:12px;color:#666;background:transparent;border:none;border-left:3px solid transparent;cursor:pointer;line-height:1.4;transition:all .12s}
.sb-btn:hover{background:#f7f6f3;color:#1c1c1a;border-left-color:#ccc}
.sb-btn.active{color:var(--sb-active-text);font-weight:500;background:var(--sb-active-bg);border-left-color:var(--sb-active-border)}
.sb-all{margin-top:1rem;font-style:italic;font-size:11px;color:#aaa}
.content{flex:1;padding:2rem 2.5rem 3rem;max-width:900px}
.content-hdr{margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #e5e3de}
.content-hdr h2{font-family:Georgia,serif;font-size:20px;font-weight:600;color:#1c1c1a;margin-bottom:3px}
.content-hdr p{font-size:12px;color:#999}
.cat-block{margin-bottom:2.25rem}
.cat-title{font-family:'Courier New',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#444;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid #ece9e3}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.card{background:#fff;border:1px solid #e5e3de;border-top:3px solid var(--card-top);border-radius:0 0 8px 8px;padding:14px 16px;display:flex;flex-direction:column;gap:5px;transition:border-top-color .25s}
.card:hover{border-color:#c8dff5;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.card-type{font-family:'Courier New',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--card-top)}
.card-name{font-family:Georgia,serif;font-size:13px;font-weight:700;line-height:1.45;color:#0D1B2A}
.card-meta{font-size:11.5px;color:#444;font-style:normal;line-height:1.5}
.card-desc{font-size:12px;color:#333;line-height:1.6;flex:1}
.card-link{font-family:'Courier New',monospace;font-size:10px;font-weight:700;color:var(--link-color);text-decoration:none;margin-top:5px;display:inline-flex;align-items:center;gap:3px}
.card-link:hover{color:var(--link-hover);text-decoration:underline}

/* ── Search ──────────────────────────────────────────────── */
.search-bar{background:var(--search-bg);padding:10px 2.5rem;display:flex;align-items:center;gap:10px;border-top:1px solid var(--search-border);transition:background .25s}
.search-wrap{position:relative;flex:1;max-width:560px}
.search-input{width:100%;padding:8px 12px 8px 36px;border:1px solid var(--search-border);border-radius:6px;background:var(--search-input-bg);color:#fff;font-family:'Courier New',monospace;font-size:12px;outline:none}
.search-input::placeholder{color:rgba(255,255,255,.45)}
.search-input:focus{border-color:var(--search-focus);background:rgba(0,0,0,.3)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.5);font-size:14px;pointer-events:none}
.search-clear{background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;font-size:18px;padding:0 2px;line-height:1;display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%)}
.search-clear.visible{display:block}
.search-count{font-family:'Courier New',monospace;font-size:11px;color:rgba(255,255,255,.6);white-space:nowrap;min-width:90px}
.search-grade-tag{font-family:'Courier New',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--grade-accent);margin-bottom:2px}
.no-results{padding:3rem 0;font-size:14px;color:#aaa;font-style:italic;text-align:center}
mark{background:#fff3cd;color:#0D1B2A;border-radius:2px;padding:0 1px}

footer{background:#0D1B2A;padding:1.5rem 2.5rem}
footer p{font-family:'Courier New',monospace;font-size:11px;color:#4a6a8a;letter-spacing:.05em}

@media(max-width:680px){
  .sidebar{display:none}
  .hdr{padding:1.25rem 1rem 0}
  .content{padding:1.25rem 1rem 2rem}
  .grade-tabs{overflow-x:auto}
  .gtab{padding:10px 14px}
  .search-bar{padding:10px 1rem}
}
</style>

let curSubj = 'math';
let curGrade = 'cross';
let curCat = null;

// ── Subject switcher ─────────────────────────────────────────────────────────
function switchSubject(subj) {
  if (!SUBJECTS[subj]) return;
  curSubj = subj;
  curGrade = SUBJECTS[subj].defaultGrade;
  curCat = null;

  // Update body class for CSS variable switching
  document.body.className = SUBJECTS[subj].bodyClass;

  // Update title
  document.getElementById('subj-title').textContent = SUBJECTS[subj].title;
  document.title = SUBJECTS[subj].title + ' Spotlight Toolkit';

  // Update nav active state
  document.querySelectorAll('.snav-btn[data-subj]').forEach(b => {
    b.classList.toggle('active', b.dataset.subj === subj);
  });

  // Rebuild grade tabs
  buildGradeTabs();

  // Clear search
  document.getElementById('searchInput').value = '';
  document.getElementById('searchCount').textContent = '';
  document.getElementById('searchClear').classList.remove('visible');
  document.getElementById('sidebar').style.display = '';

  render();
}

// ── Grade tabs ───────────────────────────────────────────────────────────────
function buildGradeTabs() {
  const subj = SUBJECTS[curSubj];
  const container = document.getElementById('grade-tabs');
  container.innerHTML = '';
  subj.grades.forEach((g, i) => {
    const btn = document.createElement('button');
    btn.className = 'gtab' + (g === curGrade ? ' active' : '');
    btn.textContent = subj.gradeLabels[g];
    btn.addEventListener('click', () => {
      document.querySelectorAll('.gtab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      curGrade = g;
      curCat = null;
      document.getElementById('searchInput').value = '';
      document.getElementById('searchCount').textContent = '';
      document.getElementById('searchClear').classList.remove('visible');
      document.getElementById('sidebar').style.display = '';
      render();
    });
    container.appendChild(btn);
  });
}

// ── MLA formatter ────────────────────────────────────────────────────────────
function formatMLA(raw){
  if(!raw) return '';
  var s = raw.trim();
  if(s.indexOf('"')!==-1||s.indexOf('\u201c')!==-1||s.indexOf('\u201d')!==-1){
    s=s.replace(/(["\u201d]\.?)\s+([A-Z][^,]+?)(?=,)/g,function(m,q,container){return q+' <i>'+container.trim()+'</i>';});
    return s;
  }
  if(/https?:\/\/|www\.|n\.d\./.test(s)) return s;
  var candidates=[],rx=/\.\s+(?=[A-Z])/g,mc;
  while((mc=rx.exec(s))!==null) candidates.push(mc);
  var authorEnd=-1;
  for(var i=0;i<candidates.length;i++){
    var pos=candidates[i].index;
    var before=s.substring(0,pos);
    var wm=before.match(/\b([\w\-]+)$/);
    if(!wm) continue;
    var wb=wm[1];
    if(wb.length===1&&wb===wb.toUpperCase()) continue;
    if(/^(al|jr|sr|mr|mrs|ms|dr|st|vol|no|pp|inc|corp|ltd|dept|assn|natl|intl|govt)$/i.test(wb)) continue;
    authorEnd=candidates[i].index+candidates[i][0].length;
    break;
  }
  if(authorEnd>0){
    var author=s.substring(0,authorEnd);
    var rest=s.substring(authorEnd);
    var titleEndM=rest.match(/\.\s+/);
    if(titleEndM){
      var title=rest.substring(0,titleEndM.index);
      var after=rest.substring(titleEndM.index);
      var authorClean=author.replace(/[.,\s]/g,'').toLowerCase();
      var titleClean=title.replace(/[.,\s]/g,'').toLowerCase();
      if(titleClean===authorClean) return s;
      if(title.length<4) return s;
      if(/^\d{4}$/.test(title.trim())) return s;
      return author+'<i>'+title+'</i>'+after;
    }
  }
  return s;
}

// ── Card builder ─────────────────────────────────────────────────────────────
function buildCard(e){
  const el=document.createElement('div');
  el.className='card';
  let h='<div class="card-name">'+e.name+'</div>';
  if(e.meta)h+='<div class="card-meta">'+formatMLA(e.meta)+'</div>';
  if(e.desc)h+='<div class="card-desc">'+e.desc+'</div>';
  if(e.url)h+='<a class="card-link" href="'+e.url+'" target="_blank">Visit resource &#8599;</a>';
  el.innerHTML=h;
  return el;
}

// ── Sidebar ──────────────────────────────────────────────────────────────────
function buildSidebar(){
  const sb=document.getElementById('sidebar');
  const d=ALL_DATA[curSubj][curGrade];
  sb.innerHTML='<span class="sb-label">Categories</span>';
  CATS.forEach(cat=>{
    if(!d[cat]||d[cat].length===0)return;
    const btn=document.createElement('button');
    btn.className='sb-btn'+(curCat===cat?' active':'');
    btn.textContent=cat;
    btn.onclick=()=>{curCat=cat;render();};
    sb.appendChild(btn);
  });
  const all=document.createElement('button');
  all.className='sb-btn sb-all'+(!curCat?' active':'');
  all.textContent='Show all categories';
  all.onclick=()=>{curCat=null;render();};
  sb.appendChild(all);
}

// ── Main render ──────────────────────────────────────────────────────────────
function render(){
  const d=ALL_DATA[curSubj][curGrade];
  const subj=SUBJECTS[curSubj];
  buildSidebar();
  const area=document.getElementById('content');
  area.innerHTML='';
  const hdr=document.createElement('div');
  hdr.className='content-hdr';
  hdr.innerHTML='<h2>'+d.label+'</h2><p>'+d.count+'</p>';
  area.appendChild(hdr);
  const allEmpty=CATS.every(cat=>!d[cat]||d[cat].length===0);
  if(allEmpty){
    const msg=document.createElement('div');
    msg.style.cssText='padding:3rem 0;font-size:14px;color:#aaa;font-style:italic';
    msg.textContent='Resources for this section are coming soon.';
    area.appendChild(msg);
    return;
  }
  const toShow=curCat?[curCat]:CATS;
  toShow.forEach(cat=>{
    const entries=d[cat];
    if(!entries||entries.length===0)return;
    const block=document.createElement('div');
    block.className='cat-block';
    block.innerHTML='<div class="cat-title">'+cat+'</div>';
    const grid=document.createElement('div');
    grid.className='grid';
    entries.forEach(e=>grid.appendChild(buildCard(e)));
    block.appendChild(grid);
    area.appendChild(block);
  });
}

// ── Search ───────────────────────────────────────────────────────────────────
function escapeRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function highlight(text,term){
  if(!term) return text;
  const re=new RegExp('('+escapeRe(term)+')','gi');
  return text.replace(re,'<mark>$1</mark>');
}
function matchesQuery(entry,q){
  return [entry.name||'',entry.desc||'',entry.meta||''].join(' ').toLowerCase().includes(q);
}
function buildSearchCard(entry,q,gradeLabel){
  const el=document.createElement('div');
  el.className='card';
  let h='<div class="search-grade-tag">'+gradeLabel+'</div>';
  h+='<div class="card-name">'+highlight(entry.name,q)+'</div>';
  if(entry.meta)h+='<div class="card-meta">'+highlight(formatMLA(entry.meta),q)+'</div>';
  if(entry.desc)h+='<div class="card-desc">'+highlight(entry.desc,q)+'</div>';
  if(entry.url)h+='<a class="card-link" href="'+entry.url+'" target="_blank">Visit resource &#8599;</a>';
  el.innerHTML=h;
  return el;
}
function runSearch(q){
  q=q.trim().toLowerCase();
  const area=document.getElementById('content');
  const sidebar=document.getElementById('sidebar');
  const subj=SUBJECTS[curSubj];
  if(!q){
    sidebar.style.display='';
    document.getElementById('searchClear').classList.remove('visible');
    document.getElementById('searchCount').textContent='';
    render();
    return;
  }
  document.getElementById('searchClear').classList.add('visible');
  sidebar.style.display='none';
  const results=[];
  subj.grades.forEach(grade=>{
    const gdata=ALL_DATA[curSubj][grade];
    CATS.forEach(cat=>{
      const entries=gdata[cat];
      if(!entries||!entries.length)return;
      entries.forEach(entry=>{
        if(matchesQuery(entry,q))results.push({entry,grade,cat});
      });
    });
  });
  area.innerHTML='';
  const hdr=document.createElement('div');
  hdr.className='content-hdr';
  hdr.innerHTML='<h2>Search Results</h2><p>'+results.length+' resource'+(results.length!==1?'s':'')+' matching "'+q+'" across all grade bands</p>';
  area.appendChild(hdr);
  document.getElementById('searchCount').textContent=results.length+' result'+(results.length!==1?'s':'');
  if(!results.length){
    const msg=document.createElement('div');
    msg.className='no-results';
    msg.textContent='No resources matched "'+q+'". Try a different keyword.';
    area.appendChild(msg);
    return;
  }
  const byCat={};
  results.forEach(r=>{if(!byCat[r.cat])byCat[r.cat]=[];byCat[r.cat].push(r);});
  CATS.forEach(cat=>{
    if(!byCat[cat]||!byCat[cat].length)return;
    const block=document.createElement('div');
    block.className='cat-block';
    block.innerHTML='<div class="cat-title">'+cat+' <span style="font-size:10px;color:#aaa">('+byCat[cat].length+')</span></div>';
    const grid=document.createElement('div');
    grid.className='grid';
    byCat[cat].forEach(r=>{
      grid.appendChild(buildSearchCard(r.entry,q,subj.gradeLabels[r.grade]||r.grade));
    });
    block.appendChild(grid);
    area.appendChild(block);
  });
}

let debounceTimer;
document.getElementById('searchInput').addEventListener('input',function(){
  clearTimeout(debounceTimer);
  debounceTimer=setTimeout(()=>runSearch(this.value),220);
});
document.getElementById('searchInput').addEventListener('keydown',function(e){
  if(e.key==='Escape'){this.value='';runSearch('');}
});
document.getElementById('searchClear').addEventListener('click',function(){
  document.getElementById('searchInput').value='';
  runSearch('');
  document.getElementById('searchInput').focus();
});

// ── Init ─────────────────────────────────────────────────────────────────────
(function(){
  const startSubj = 'ela';
  curSubj = startSubj;
  curGrade = SUBJECTS[startSubj].defaultGrade;
  document.body.className = SUBJECTS[startSubj].bodyClass;
  document.getElementById('subj-title').textContent = SUBJECTS[startSubj].title;
  document.title = SUBJECTS[startSubj].title + ' Spotlight Toolkit';
  buildGradeTabs();
  render();
})();
</script>
