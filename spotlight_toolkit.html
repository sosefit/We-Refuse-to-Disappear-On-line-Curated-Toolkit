thout Gender. Directed by Milene Larsson and Alana McVerry. Vice Media, 2017.", "desc": "Vice documentary (approx. 30 min.) following a family in Sweden raising their children outside strict gender norms, and visiting gender-aware kindergartens. Explores how Swedish educational policy and practice support gender-neutral child-rearing.", "url": "https://www.imdb.com/title/tt9233180/"}, {"name": "Straightlaced: How Gender's Got Us All Tied Up", "meta": "Straightlaced: How Gender's Got Us All Tied Up. Directed by Debra Chasnoff. GroundSpark, 2009.", "desc": "Documentary in which more than 50 teens from diverse backgrounds speak candidly about how gender expectations and homophobia constrict their lives. Explores how clothing, sexuality, sports, and emotion intersect with rigid gender norms. Useful for teacher study on early socialization.", "url": "https://www.imdb.com/title/tt1404412/"}, {"name": "The Bravest Knight (TV series)", "meta": "The Bravest Knight. Created by Daniel Errico. Big Bad Boo Studios / Hulu, 2019–present.", "desc": "Animated Hulu original TV series featuring Sir Cedric, a gay knight married to Prince Andrew, raising an adopted daughter. One of the first children's animated series with an openly gay main character. Note: This is a TV series, not a film. Winner of the 2020 GLAAD Media Award for Outstanding Kids and Family Programming.", "url": "https://www.imdb.com/title/tt10394790/"}, {"name": "The Family Journey: Raising Gender Nonconforming Children", "meta": "The Family Journey: Raising Gender Nonconforming Children. Directed by Jonathan Skurnik. Youth & Gender Media Project, n.d.", "desc": "Short documentary (14 min.) in which parents and siblings of gender-nonconforming children share their journeys from uncertainty to acceptance, demonstrating how love and support allow gender-nonconforming kids to thrive. Part of the Youth & Gender Media Project.", "url": "https://www.newday.com/films/the-family-journey-raising-gender-nonconforming-children"} ans and gender questioning youth.", "url": "https://www.imatyfa.org"}, {"name": "Trans Youth Justice Project", "meta": "Trans Youth Justice Project. Trans Youth Justice Project. transyouthjusticeproject.com.", "desc": "Leadership development and political education program for trans youth ages 16–22 grounded in racial and gender justice; supports youth-led resistance to restrictive legislation.", "url": "https://transyouthjusticeproject.wordpress.com/"}, {"name": "We Are Family Charleston", "meta": "We Are Family. We Are Family: LGBTQI+ Youth Organization. wearefamilycharleston.org.", "desc": "Charleston, SC-based nonprofit providing leadership development, health and wellness, and movement building for LGBTQ+ young people up to age 24; founded 1995; state partner for National Association of GSA Networks.", "url": "https://www.wearefamilycharleston.org"}], "Films, Documentaries & Visual Media": [{"name": "A Kid Like Jake", "meta": "A Kid Like Jake. Directed by Silas Howard. IFC Films, 2018.", "desc": "Feature film following Brooklyn parents navigating kindergarten applications while coming to terms with their gender-expansive four-year-old. Useful for exploring adult responses to childhood gender nonconformity.", "url": "https://www.imdb.com/title/tt6884200/"}, {"name": "Being Thunder", "meta": "Being Thunder. Directed by Stéphanie Lamorré. Film Movement, 2021.", "desc": "Documentary following Sherenté Harris, a Two-Spirit Narragansett teenager from Rhode Island, as they perform traditional dance at regional powwows despite discrimination from tribal elders.", "url": "https://www.imdb.com/title/tt14908696/"}, {"name": "Changing the Game", "meta": "Changing the Game. Directed by Michael Barnett. Hulu / Motto Pictures, 2019.", "desc": "Documentary following three transgender high school athletes as they compete in their chosen sports and navigate state policies that determine whether they can participate.", "url": "https://www.imdb.com/title/tt10011320/"}, {"name": "Family Acceptance Project – Family Video Series", "meta": "Family Acceptance Project. Family Video Series. SF State University, n.d., familyproject.sfsu.edu/family-videos.", "desc": "Research-based short documentary series showing diverse families' journeys toward affirming their LGBTQ children. Used by educators and counselors for family engagement. Note: this is a resource page, not a standalone theatrical film.", "url": "https://familyproject.sfsu.edu/family-videos"}, {"name": "Gay Chorus Deep South", "meta": "Gay Chorus Deep South. Directed by David Charles Rodrigues. MTV Documentary Films, 2019.", "desc": "Documentary following the San Francisco Gay Men's Chorus on a tour through Mississippi, Tennessee, Alabama, and the Carolinas, building unexpected connections through music in response to anti-LGBTQ legislation.", "url": "https://www.imdb.com/title/tt8840232/"}, {"name": "Gender Matters", "meta": "Gender Matters. Vice Media, 2015.", "desc": "Six short Vice films profiling trans and gender nonconforming young adults navigating identity, community, and self-expression.", "url": "https://www.youtube.com/watch?v=YmGbJlL558U"}, {"name": "Gender Revolution: A Journey with Katie Couric", "meta": "Gender Revolution: A Journey with Katie Couric. National Geographic, 2017.", "desc": "National Geographic documentary in which journalist Katie Couric explores evolving understandings of gender identity, interviewing trans children, families, scientists, and activists.", "url": "https://www.youtube.com/playlist?list=PLivjPDlt6ApTL79_aIL-dHceH2PUccvly"}, {"name": "Growing Up Coy", "meta": "Growing Up Coy. Directed by Eric Juhola. 2016.", "desc": "Documentary following Coy Mathis and her family's landmark legal case for her right to use the school restroom consistent with her gender identity.", "url": "https://www.imdb.com/title/tt5648966/"}, {"name": "Growing Up Trans", "meta": "Growing Up Trans. Directed by Miri Navasky and Karen O'Connor. PBS Frontline, 2015.", "desc": "PBS Frontline documentary following eight transgender youth ages 9–19 and their families as they navigate identity, medical decisions, and community responses.", "url": "https://www.imdb.com/title/tt4689752/"}, {"name": "I'm Just Anneke", "meta": "I'm Just Anneke. Directed by Jonathan Skurnik. Youth & Gender Media Project, 2010.", "desc": "Short documentary (11 min.) following Anneke, a 12-year-old gender-fluid youth from Vancouver, as she navigates puberty, identity, family, and school. Winner of the Changemaker Award 2010.", "url": "https://www.imdb.com/title/tt1753935/"}, {"name": "Let's Get Real", "meta": "Let's Get Real. Directed by Debra Chasnoff. GroundSpark / Women's Educational Media, 2003.", "desc": "Documentary in which middle schoolers speak candidly about name-calling, bullying, and bias — told entirely from youth perspectives. Designed for teacher study in middle school settings.", "url": "https://www.newday.com/films/lets-get-real"}, {"name": "Picture a Scientist", "meta": "Picture a Scientist. Directed by Ian Cheney and Sharon Shattuck. Submarine Deluxe / NOVA, 2020.", "desc": "Documentary profiling women and nonbinary scientists facing gender discrimination in STEM fields, featuring powerful testimony about institutional bias. Relevant for science and math classrooms.", "url": "https://www.imdb.com/title/tt11906032/"}, {"name": "Pink Boy", "meta": "Pink Boy. Directed by Eric Rockey. 2015.", "desc": "Intimate 25-minute portrait of a gender-creative boy in rural Florida and the butch lesbian parent navigating where it is safe for him to be himself. Multiple festival awards.", "url": "https://www.imdb.com/title/tt4177250/"}, {"name": "Raised Without Gender", "meta": "Raised Without Gender. Directed by Milene Larsson and Alana McVerry. Vice Media, 2017.", "desc": "Vice documentary following a family in Sweden raising their children outside strict gender norms and visiting gender-aware kindergartens.", "url": "https://www.imdb.com/title/tt9233180/"}, {"name": "Real Boy", "meta": "Real Boy. Directed by Shaleece Haas. 2016.", "desc": "Documentary following trans teen musician Bennett Wallace through his transition and search for community, with an intimate portrait of his father's parallel journey of acceptance.", "url": "https://www.imdb.com/title/tt3993760/"}, {"name": "Straightlaced: How Gender's Got Us All Tied Up", "meta": "Straightlaced: How Gender's Got Us All Tied Up. Directed by Debra Chasnoff. GroundSpark, 2009.", "desc": "Documentary in which more than 50 diverse California teens speak candidly about how gender expectations and homophobia constrict their lives.", "url": "https://www.imdb.com/title/tt1404412/"}, {"name": "The Family Journey: Raising Gender Nonconforming Children", "meta": "The Family Journey: Raising Gender Nonconforming Children. Directed by Jonathan Skurnik. Youth & Gender Media Project, n.d.", "desc": "Short documentary (14 min.) in which parents and siblings of gender-nonconforming children share their journeys from uncertainty to acceptance. Part of the Youth & Gender Media Project.", "url": "https://www.newday.com/films/the-family-journey-raising-gender-nonconforming-children"}, {"name": "The Mask You Live In", "meta": "The Mask You Live In. Directed by Jennifer Siebel Newsom. The Representation Project, 2015.", "desc": "Documentary examining societal pressures on boys to conform to narrow masculine ideals and the consequences for their mental health and relationships.", "url": "https://therepproject.org/films/the-mask-you-live-in/"}, {"name": "Transgender Basics", "meta": "Transgender Basics. Gender Identity Project, New York City, 2005.", "desc": "Short introductory film explaining transgender concepts and terminology, produced by the NYC Gender Identity Project.", "url": "https://www.youtube.com/watch?v=UXI9w0PbBXY"}, {"name": "Transhood", "meta": "Transhood. Directed by Sharon Liese. HBO Documentary Films, 2020.", "desc": "HBO documentary following four transgender children and their : The Benefits of LGBT-Related School Resources for Transgender Youth.\" Journal of LGBT Youth, vol. 10, no. 1–2, 2013, pp. 45–63.", "desc": "Quantitative study linking the availability of LGBT-related school resources — supportive educators, GSAs, and inclusive curriculum — to improved academic outcomes and safety for transgender youth.", "url": "https://www.tandfonline.com/doi/abs/10.1080/19361653.2012.718522"}]}, "high": {"label": "High School", "count": "~133 resources · 10 categories", "Recommended Readings": [{"name": "Kirby & Boylan — Trans Anthology Project: Reflections of Self-Discovery and Acceptance (2024)", "meta": "Kirby, Heather H., and Chrissy Boylan. Trans Anthology Project: Reflections of Self-Discovery and Acceptance. Trans Anthology Project / Kirby Creative Clinical Solutions, 2024.", "desc": "Collection of over 200 firsthand accounts from trans, nonbinary, and gender-diverse youth and their parents, offering educators and students authentic narratives of identity, resilience, and affirmation.", "url": "https://bookshop.org/p/books/trans-anthology-project-reflections-of-self-discovery-and-acceptance-chrissy-boylan/3688611cd8a16050"}, {"name": "Long — Growing a Gender-Inclusive Biology Curriculum: A Framework and Reflections for Secondary Science Teachers (The Assembly, Fall 2019)", "meta": "Long, Sam. \"Growing a Gender-Inclusive Biology Curriculum: A Framework and Reflections for Secondary Science Teachers.\" The Assembly: A Journal for Public Scholarship on Education, Issue 2, Fall 2019, colorado.edu/journal/assembly.", "desc": "Denver high school biology teacher’s framework and reflections on redesigning secondary biology to include trans and nonbinary students; seminal practitioner piece that preceded the Gender-Inclusive Biology initiative.", "url": "https://www.colorado.edu/journal/assembly/taxonomy/term/131"}, {"name": "Mayo — LGBTQ Youth and Education: Policies and Practices (Teachers College Press, 2013)", "meta": "Mayo, Cris. LGBTQ Youth and Education: Policies and Practices. Teachers College Press, 2013.", "desc": "Examines how policy and pedagogy intersect in secondary schools, providing frameworks for teachers resisting exclusionary laws and building affirming practice.", "url": "https://eric.ed.gov/?id=ED617676"}, {"name": "Mendoza — A (TRANS)formative Approach to Gender-Inclusive Science Education (JRST, 2024)", "meta": "Mendoza, Karla R. \"A (TRANS)formative Approach to Gender-Inclusive Science Education.\" Journal of Research in Science Teaching, vol. 61, no. 4, 2024, pp. 937–971. https://doi.org/10.1002/tea.21928.", "desc": "Introduces the TRANS framework (interrogating power, resisting essentialism, embracing experiential knowledge) derived from interviews with 10 trans/nonbinary K–12 science teachers; provides guiding principles for gender-inclusive science education pedagogy.", "url": "https://doi.org/10.1002/tea.21928"}, {"name": "NEA — Supporting Transgender, Non-binary, and Gender Non-conforming Students (Professional Learning Module)", "meta": "National Education Association. \"Supporting Transgender, Non-binary, and Gender Non-conforming Students.\" Safety, Bias, & LGBTQ+ Issues Professional Learning Series, NEA, nea.org/professional-excellence/professional-learning/resources/supporting-transgender-non-binary-and-gender-non-conforming-students.", "desc": "Educator professional learning module on creating safer learning spaces for trans, nonbinary, and gender non-conforming students; covers terminology, BIPOC student needs, and classroom action steps; adaptable to HS labs, group work, and field investigations.", "url": "https://www.nea.org/professional-excellence/professional-learning/resources/supporting-transgender-non-binary-and-gender-non-conforming-students"}, {"name": "Shane — The Educator’s Guide to LGBT+ Inclusion (Jessica Kingsley Publishers, 2020)", "meta": "Shane, Kryss. The Educator’s Guide to LGBT+ Inclusion: A Practical Resource for K–12 Teachers, Administrators, and School Support Staff. Jessica Kingsley Publishers, 2020.", "desc": "Offers clear, research-backed strategies educators can use to create affirming and inclusive school communities across K–12 settings.", "url": "https://us.jkp.com/products/the-educators-guide-to-lgbt-inclusion"}, {"name": "sj Miller — About Gender Identity Justice in Schools and Communities (Teachers College Press, 2019)", "meta": "Miller, sj. About Gender Identity Justice in Schools and Communities. Teachers College Press, 2019.", "desc": "Expands frameworks of refusal and trans+ justice across K–12 and higher education, offering practical and theoretical insights for high school educators.", "url": "https://www.tcpress.com/about-gender-identity-justice-in-schools-and-communities-9780807761250"}, {"name": "sj Miller — The Impact and Role of Emotions in Schools for Teachers and Students with Complex Gender Identities (Teachers College Record, 2019)", "meta": "Miller, sj. \"The Impact and Role of Emotions in Schools for Teachers and Students with Complex Gender Identities.\" Teachers College Record, vol. 121, no. 13, 2019. https://doi.org/10.1177/016146811912101307.", "desc": "Explores how affect and emotion shape the experiences of educators and students with complex gender identities, illuminating pathways toward empathy, equity, and affirmation in schooling.", "url": "https://doi.org/10.1177/016146811912101307"}], "News Articles & Substacks": [{"name": "Alcock — Creating an Inclusive Transgender Policy (We Are In Beta / Substack, Sept. 17, 2023)", "meta": "Alcock, Niall. \"Creating an Inclusive Transgender Policy.\" We Are In Beta, Substack, 17 Sept. 2023, weareinbeta.substack.com/p/creating-an-inclusive-transgender.", "desc": "Comprehensive secondary-school-focused guide for building trans-inclusive policy frameworks, with practical templates and policy insights for administrators and educators.", "url": "https://weareinbeta.substack.com/p/creating-an-inclusive-transgender"}, {"name": "Balingit — Virginia Beach Students Battling Youngkin’s Transgender Policies (WaPo, Sept. 20, 2023)", "meta": "Balingit, Moriah. \"The Virginia Beach Students Battling Youngkin’s School Transgender Policies.\" Washington Post, 20 Sept. 2023, washingtonpost.com/education/2023/09/20/youngkin-school-transgender-policies-virginia-beach/.", "desc": "Profiles Virginia Beach high school students defending trans peers from Youngkin’s rollback of transgender student protections; highlights student activism and teachers’ support.", "url": "https://www.washingtonpost.com/education/2023/09/20/youngkin-school-transgender-policies-virginia-beach/"}, {"name": "Casper & Long (Phys.org) — Trans Students Benefit from Gender-Inclusive Classrooms (Aug. 31, 2023)", "meta": "Casper, Aramati, and Sam Long. \"Trans Students Benefit from Gender-Inclusive Classrooms — so Do the Other Students and Science Itself.\" The Conversation (reprinted at Phys.org), 31 Aug. 2023, phys.org/news/2023-08-trans-students-benefit-gender-inclusive-classroomsso.html.", "desc": "Summarizes evidence that high school and secondary biology lessons using precise, nonbinary frameworks increase learning accuracy and reduce bias for all students; co-authored by Gender-Inclusive Biology founder Sam Long.", "url": "https://phys.org/news/2023-08-trans-students-benefit-gender-inclusive-classroomsso.html"}, {"name": "Eddy & Casper — Creating Cell Biology Courses Inclusive for People Who Are Intersex and/or Have Queer Genders (ASBMB Today, 2022)", "meta": "Eddy, Sarah L., and Aramati Casper. \"Creating Cell Biology Courses Inclusive for People Who Are Intersex and/or Have Queer Genders.\" ASBMB Today, June 2022, asbmb.org/asbmb-today/opinions/060822/inclusive-courses-intersex-queer-genders.", "desc": "Secondary/HS-focused biology teaching guide showing how binary-default terms create misconceptions and exclude intersex, trans, and nonbinary students; published by the American Society for Biochemistry and Molecular Biology.", "url": "https://www.asbmb.org/asbmb-today/opinions/060822/inclusive-courses-intersex-queer-genders"}, {"name": "Edutopia — Creating Inclusive Learning Spaces for Students of All Genders (Aug. 13, 2024)", "meta": "\"Creating Inclusive Learning Spaces for Students of All Genders.\" Edutopia, 13 Aug. 2024, edutopia.org/article/creating-inclusive-learning-spaces-maker-education-arts/.", "desc": "High-school teacher strategies for building gender-inclusive classroom culture through maker education and the arts (norm-setting, language moves, inclusive assessment); transferable to lab groups and science units.", "url": "https://www.edutopia.org/article/creating-inclusive-learning-spaces-maker-education-arts/"}, {"name": "Salman — School Clubs for Gay Students Move Underground After Kentucky’s Anti-LGBTQ Law (Hechinger Report, Dec. 18, 2023)", "meta": "Salman, Javeria. \"School Clubs for Gay Students Move Underground After Kentucky’s Anti-LGBTQ Law Goes Into Effect.\" The Hechinger Report, 18 Dec. 2023, hechingerreport.org/school-clubs-for-gay-students-move-underground-after-kentuckys-anti-lgbtq-law-goes-into-effect/.", "desc": "Documents how GSA clubs in Kentucky high schools have been driven from campuses by the state’s sweeping anti-LGBTQ+ law, with firsthand accounts from students and the adults fighting to protect them.", "url": "https://hechingerreport.org/school-clubs-for-gay-students-move-underground-after-kentuckys-anti-lgbtq-law-goes-into-effect/"}, {"name": "Sosin — Trans Advocates Offer Guidance on How to Support Kids in Schools (The 19th, Feb. 5, 2025)", "meta": "Sosin, Kate. \"Trans Advocates Offer Guidance on How to Support Kids in Schools.\" The 19th, 5 Feb. 2025, 19thnews.org/2025/02/trans-advocates-guidance-support-kids-schools/.", "desc": "Profiles trans advocates and authors Vanessa Ford and Rebecca Kling on practical strategies for educators and administrators seeking to support trans students under shifting policy mandates.", "url": "https://19thnews.org/2025/02/trans-advocates-guidance-support-kids-schools/"}], "Policy Reports": [{"name": "2025 National School Climate Survey: The Experiences of LGBTQ+ Youth in Our Nation's Schools", "meta": "Glisten. 2025 National School Climate Survey: The Experiences of LGBTQ+ Youth in Our Nation's Schools. Glisten, 2026.", "desc": "The 13th installment of Glisten's NSCS, drawing on survey data from April–October 2024 (2,800 students) and focus groups from June–July 2025. Finds 2 in 3 LGBTQ+ students felt unsafe due to their sexual orientation or gender identity, and that the 2024–2025 school year felt more hostile amid escalating anti-LGBTQ+ political rhetoric.", "url": "https://glisten.org/nscs2025/"}, {"name": "Anti-LGBTQ+ School Policies and LGBTQ+ Young People", "meta": "The Trevor Project. Anti-LGBTQ+ School Policies and LGBTQ+ Young People. Research Brief. Trevor Project, Aug. 2024.", "desc": "Demonstrates that LGBTQ+ students in schools with restrictive policies — on pronouns, bathrooms, and GSAs — face significantly elevated risks of depression, suicidality, and victimization, and have access to fewer protective resources.", "url": "https://www.thetrevorproject.org/research-briefs/anti-lgbtq-school-policies-and-lgbtq-young-people/"}, {"name": "Policy Spotlight: Curriculum Censorship & Hostile School Climate Bills", "meta": "Movement Advancement Project. Policy Spotlight: Curriculum Censorship & Hostile School Climate Bills. MAP, Mar. 2022.", "desc": "Analyzes the wave of state bills censoring discussions of race, religion, and LGBTQ people in schools and undermining safe school climates; documents near-quadrupling of such bills from 2020 to 2022.", "url": "https://www.lgbtmap.org/2022-spotlight-school-bills-report"}, {"name": "The 2021 National School Climate Survey: The Experiences of LGBTQ+ Youth in Our Nation's Schools", "meta": "Kosciw, Joseph G., Caitlin M. Clark, and Leesh L. Menard. The 2021 National School Climate Survey: The Experiences of LGBTQ+ Youth in Our Nation's Schools. GLSEN, 2022.", "desc": "The 12th installment of GLSEN's NSCS, documenting pervasive anti-LGBTQ+ harassment and the critical role of supportive educators, inclusive curricula, GSAs, and school policies in creating safer learning environments.", "url": "https://eric.ed.gov/?id=ED625378"}, {"name": "The Impact of 2024 Anti-Transgender Legislation on Youth", "meta": "Redfield, Elana, Kerith J. Conron, and Christy Mallory. The Impact of 2024 Anti-Transgender Legislation on Youth. Williams Institute, UCLA School of Law, Apr. 2024.", "desc": "Estimates how 2024 laws — gender-affirming care bans, sports bans, bathroom bans, pronoun restrictions — affect transgender youth ages 13–17 nationwide; maps policy exposure across school contexts.", "url": "https://williamsinstitute.law.ucla.edu/publications/2024-anti-trans-legislation/"}, {"name": "Under Fire: Erasing LGBTQ People from Schools and Public Life", "meta": "Movement Advancement Project. Under Fire: Erasing LGBTQ People from Schools and Public Life. MAP, Mar. 2023.", "desc": "Second in MAP's Under Fire series; documents eight coordinated tactics used to erase LGBTQ people from schools, including curriculum censorship, book bans, bathroom bills, and laws that penalize or criminalize supportive educators.", "url": "https://www.mapresearch.org/under-fire-report"}], "Policy Trackers": [{"name": "Education Commission of the States (ECS)", "meta": "Education Commission of the States. Education Commission of the States: Policy Snapshots. ECS, ecs.org.", "desc": "Nonpartisan organization providing policy analysis, state comparisons, and snapshots on K–12 and secondary education policy; useful for tracking state-level shifts in curriculum and inclusion mandates.", "url": "https://www.ecs.org"}, {"name": "PRRI — LGBTQ Research Reports", "meta": "Public Religion Research Institute. LGBTQ Research. PRRI, prri.org/prri-research/prri-issues/lgbtq/.", "desc": "Polling data and policy analysis on LGBTQ+ rights, identity, and public opinion; includes annual American Values Atlas with state-level data, youth surveys, and surveys tracking trends from 2015–present.", "url": "https://prri.org/prri-research/prri-issues/lgbtq/"}], "Political & Social Organizations": [{"name": "50501 Movement", "meta": "50501 Movement. 50501: 50 Protests, 50 States, 1 Movement. fiftyfifty.one.", "desc": "Progressive grassroots political movement founded January 2025 to organize nationwide protests against the second Trump administration; goals include protecting LGBTQ rights, upholding the Constitution, and ending executive overreach.", "url": "https://www.fiftyfifty.one/"}, {"name": "Glisten (GLSEN) — LGBTQ+ K–12 Education", "meta": "Glisten. Glisten: Championing LGBTQ+ Issues in K–12 Education. glisten.org.", "desc": "National K–12 advocacy organization offering curriculum resources, research (NSCS, secondary school data), professional development, and policy guidance for LGBTQ-inclusive education.", "url": "https://www.glisten.org"}, {"name": "NEA — LGBTQ+ Resources", "meta": "National Education Association. NEA LGBTQ+ Resources. NEA, nea.org/resource-library/nea-lgbtq-resources.", "desc": "NEA’s LGBTQ+ resource hub for educators: professional learning modules, policy guidance, advocacy tools, and resources for supporting trans and nonbinary students at the secondary level.", "url": "https://www.nea.org/resource-library/nea-lgbtq-resources"}, {"name": "Out to Innovate (NOGLSTP)", "meta": "Out to Innovate (formerly NOGLSTP). Out to Innovate: LGBTQ+ STEM Professional Society. Out to Innovate, outtoinnovate.org.", "desc": "Long-standing LGBTQ+ STEM professional society (founded 1983); provides role-model networks, speaker lists, and STEM pathway supports for HS teachers to connect students to; rebranding from NOGLSTP to Out to Innovate is ongoing.", "url": "https://www.outtoinnovate.org"}, {"name": "Project Biodiversify — Inclusive Biology Teaching Resources", "meta": "Project Biodiversify. Project Biodiversify: Inclusive Biology Teaching Resources. projectbiodiversify.org.", "desc": "Science-education hub offering HS-ready inclusive lesson revisions, scientist spotlights, and resources correcting biased biology content; focused on diversifying who is represented as a scientist.", "url": "https://projectbiodiversify.org"}], "Podcasts & Webinars": [{"name": "AfroQueer", "meta": "AfroQueer. AQ Studios, n.d., aqstudios.fm/afro-queer.", "desc": "Podcast documenting the lives, loves, and struggles of queer Africans on the continent and in the diaspora, covering law, migration, family, and identity through character-driven storytelling.", "url": "https://afroqueerpodcast.wordpress.com/about-us/"}, {"name": "All My Relations", "meta": "All My Relations. n.d., www.allmyrelationspodcast.com.", "desc": "Indigenous-hosted podcast co-created by Dr. Adrienne Keene and Matika Wilbur exploring Indigenous relationships, identity, land, and colonization, including Two-Spirit and LGBTQ+ lives.", "url": "https://www.allmyrelationspodcast.com"}, {"name": "Black & Trans Substack", "meta": "Black Trans Perspectives. Black & Trans Substack. blackntrans.substack.com, n.d.", "desc": "Substack newsletter centering Black trans perspectives on identity, healing, resistance, and liberation, offering educators authentic material for discussing intersectionality, Black trans history, and youth voice.", "url": "https://blackntrans.substack.com"}, {"name": "Gender Reveal", "meta": "Gender Reveal. Hosted by Tuck Woodstock. n.d., www.genderpodcast.com.", "desc": "Weekly podcast exploring the vast diversity of trans and nonbinary experiences through interviews with artists, activists, academics, and everyday trans people. Created in 2017; over 150 episodes.", "url": "https://www.genderpodcast.com"}, {"name": "Glisten Educator Webinars", "meta": "Glisten. Glisten Educator Webinars. n.d., glisten.org.", "desc": "Ongoing professional development webinar series from Glisten providing educators with best practices, inclusive pedagogical strategies, and policy guidance for supporting LGBTQ+ students in K–12 schools, including secondary math and STEM contexts.", "url": "https://glisten.org"}, {"name": "History Is Gay", "meta": "History Is Gay. n.d., historyisgaypodcast.com.", "desc": "Explores overlooked queer and trans histories across cultures, time periods, and geographies through a collaborative, accessible storytelling format.", "url": "https://www.historyisgaypodcast.com"}, {"name": "Making Gay History", "meta": "Making Gay History. n.d., makinggayhistory.com.", "desc": "Oral history podcast bringing LGBTQ pioneers and civil rights activists to life using rare archival recordings; each episode centers a different trailblazer from the last century.", "url": "https://makinggayhistory.com"}, {"name": "OutCasting", "meta": "OutCasting. Minor Foundation for Public Good, n.d., mfpg.org.", "desc": "Youth-driven public radio program and podcast giving LGBTQ+ teens a platform to share their own stories, produced by the Minor Foundation for Public Good.", "url": "https://www.mfpg.org"}, {"name": "Pride in STEM Podcast", "meta": "Pride in STEM. Pride in STEM Podcast. Hosted by Dr. Craig Poku. prideinstem.org, 2021–present.", "desc": "Award-nominated podcast bringing forward the voices of LGBTQIA+ people facing barriers in STEM fields, with a focus on intersectionality (race, disability, gender identity). UK-based; broad international relevance for STEM educators.", "url": "https://prideinstem.org"}, {"name": "Prideful Connections", "meta": "Prideful Connections. Hosted by Tony Ferraiolo and Sarah Celotto. n.d.", "desc": "Podcast hosted by a trans advocate and a parent of a transgender youth, covering advocacy, inclusive faith, school support, and lived experiences within the transgender community.", "url": "https://www.facebook.com/HCAILLC/videos/in-episode-one-of-prideful-connections-podcast-tony-ferraiolo-explains-to-sarah-/1764838124293726/"}, {"name": "Queer America", "meta": "Q uption of normative school spaces, and argues for practices of trans solidarity in educational settings as a counter to legislative erasure.", "url": "https://doi.org/10.1080/00131946.2024.2379042"}]}, "post": {"label": "Postsecondary", "count": "~148 resources · 10 categories", "Recommended Readings": [{"name": "Currah — Sex Is as Sex Does: Governing Transgender Identity (NYU Press, 2022)", "meta": "Currah, Paisley. Sex Is as Sex Does: Governing Transgender Identity. NYU Press, 2022.", "desc": "Examines how U.S. government agencies govern sex classification, revealing why those systems fail transgender and non-binary people; implications for institutional policy and trans student rights.", "url": "https://nyupress.org/9780814717103/sex-is-as-sex-does/"}, {"name": "Hales — Signaling Inclusivity in Undergraduate Biology Courses through Deliberate Framing of Genetics Topics Relevant to Gender Identity, Disability, and Race (CBE–Life Sciences Education, 2020)", "meta": "Hales, Karen G. \"Signaling Inclusivity in Undergraduate Biology Courses through Deliberate Framing of Genetics Topics Relevant to Gender Identity, Disability, and Race.\" CBE–Life Sciences Education, vol. 19, no. 2, 2020, es2. https://doi.org/10.1187/cbe.19-08-0156.", "desc": "Research on how deliberate biology teaching language choices (separating sperm/egg from gendered terms, inclusive pedigree charts) increase LGBTQ+/trans students’ sense of belonging and science identity in college genetics.", "url": "https://doi.org/10.1187/cbe.19-08-0156"}, {"name": "Mercer-Mapstone et al. — Breaking the Binary: Teaching Inclusive Conceptions of Sex and Gender in Undergraduate Science (Teaching & Learning Inquiry, 2021)", "meta": "Mercer-Mapstone, Lucy, Sarah Bajan, Kasia Banas, Arthur Morphett, and Kristine McGrath. \"Breaking the Binary: Teaching Inclusive Conceptions of Sex and Gender in Undergraduate Science.\" Teaching & Learning Inquiry, vol. 9, no. 2, 2021. https://doi.org/10.20343/teachlearninqu.9.2.6.", "desc": "Student–faculty co-designed module in first-year undergraduate biology that separates sex traits from gender identity, taught at an Australian university; students with minority identities showed significantly more positive attitudes; open access.", "url": "https://doi.org/10.20343/teachlearninqu.9.2.6"}, {"name": "Meyer & Carlson — Gender and Sexualities in Education: A Reader (Peter Lang, 2014)", "meta": "Meyer, Elizabeth J., and Dennis Carlson, eds. Gender and Sexualities in Education: A Reader. Peter Lang, 2014.", "desc": "Comprehensive anthology bridging queer theory, critical pedagogy, and education policy, offering frameworks for advanced study and teacher preparation.", "url": "https://www.peterlang.com/document/1051405"}, {"name": "Shane — Creating an LGBT+ Inclusive University (Routledge, 2022)", "meta": "Shane, Kryss. Creating an LGBT+ Inclusive University: A Practical Resource Guide for Faculty and Administrators. Routledge, 2022.", "desc": "Offers strategic tools for embedding LGBTQ+ inclusion across teaching, policy, and campus climate at the postsecondary level.", "url": "https://www.routledge.com/Creating-an-LGBT-Inclusive-University-A-Practical-Resource-Guide-for-Faculty-and-Administrators/Shane/p/book/9781032180847"}, {"name": "sj Miller — Trans*+ and Gender Identity Diverse Students’ Right to Use a Bathroom (Harvard Education Press, 2019)", "meta": "Miller, sj. \"Trans*+ and Gender Identity Diverse Students’ Right to Use a Bathroom: Debating Human Dignity.\" Democratic Discord in Schools: Cases and Commentaries in Educational Ethics, edited by Meira Levinson and Jacob Fay, Harvard Education Press, 2019, pp. 191–194.", "desc": "Case study exploring the ethical, legal, and human rights dimensions of restroom access for trans+ and gender-diverse students, advancing frameworks for dignity, inclusion, and educational justice.", "url": "https://hep.gse.harvard.edu/9781682533024/democratic-discord-in-schools/"}, {"name": "Stryker — Transgender olving a Child’s Gender Identity in School: An Exploration of the ‘Fundamental’ Rights of Parents.” Wisconsin Journal of Law, Gender, & Society, vol. 38, no. 1, 2023, p. 36.", "desc": "Surveys the emerging wave of litigation framing parental 'fundamental rights' in conflicts over students' gender identities at school, analyzing how courts balance student privacy, trans-inclusive school policies, and parental authority.", "url": "https://repository.law.wisc.edu/s/uwlaw/item/323261"}, {"name": "Recommitting to the Affirmation of Trans Lives", "meta": "Association for the Study of Higher Education. “Recommitting to the Affirmation of Trans Lives.” ASHE, 20 Aug. 2021.", "desc": "ASHE institutional position statement recommitting to the affirmation of trans lives amid a wave of legislation targeting trans athletes, situating intercollegiate athletics as one site among many where trans people experience violence and erasure in postsecondary education.", "url": "https://www.ashe.ws/position-taking"}, {"name": "Teachers' Professional Learning to Affirm Transgender, Non-Binary, and Gender-Creative Youth", "meta": "Meyer, Elizabeth J., and Bethy Leonardi. “Teachers’ Professional Learning to Affirm Transgender, Non-Binary, and Gender-Creative Youth: Experiences and Recommendations from the Field.” Sex Education, vol. 18, no. 4, 2018, pp. 449–463.", "desc": "Field-informed guidance for teacher professional learning to affirm trans and gender-creative youth, drawing on interviews with 26 educators from preschool to secondary and offering concrete concepts for preparation programs: 'pedagogies of exposure' and 'culture of conversation.'", "url": "https://doi.org/10.1080/14681811.2017.1411254"}, {"name": "Trans* in College", "meta": "Nicolazzo, Z. Trans* in College: Transgender Students' Strategies for Navigating Campus Life and the Institutional Politics of Inclusion. Stylus, 2017.", "desc": "Ethnographic study of nine trans* students at a pseudonymous university, examining how they navigate campus life, build resilience practices, and resist institutional erasure. Winner of the 2017 AERA Division J Outstanding Publication Award.", "url": "https://styluspub.presswarehouse.com/browse/book/9781620364567/Trans-in-College"}, {"name": "Trans*versing the DMZ", "meta": "Stewart, Dafina-Lazarus. “Trans*versing the DMZ: A Non-Binary Autoethnographic Exploration of Gender and Masculinity.” International Journal of Qualitative Studies in Education, vol. 30, no. 3, 2017, pp. 285–304.", "desc": "Abductive, critical-poststructuralist autoethnography examining how masculine-of-center, non-binary/genderqueer trans* identities navigate the 'demilitarized zone' of binary gender systems enforced in U.S. higher education.", "url": "https://doi.org/10.1080/09518398.2016.1254302"}, {"name": "Transcending the Gender Binary under International Law", "meta": "O’Connor, Aoife M., Maximillian Seunik, Blas Radi, Liberty Matthyse, Lance Gable, Hanna E. Huffstetler, and Benjamin Mason Meier. “Transcending the Gender Binary under International Law: Advancing Health-Related Human Rights for Trans* Populations.” Journal of Law, Medicine & Ethics, vol. 50, no. 3, 2022, pp. 409–424.", "desc": "Legal analysis showing how international human rights frameworks can advance health-related rights for trans* populations, examining gaps between formal legal protections and substantive health access.", "url": "https://pubmed.ncbi.nlm.nih.gov/36398651/"}, {"name": "Transgender Persons (Protection of Rights) Act of India", "meta": "Bhattacharya, Shamayeta, Debarchana Ghosh, and Bandana Purkayastha. “Transgender Persons (Protection of Rights) Act of India: An Analysis of Substantive Access to Rights of a Transgender Community.” Journal of Human Rights Practice, vol. 14, no. 2, 2022, pp. 676–697.", "desc": "Evaluates India's 2019 Transgender Persons (Protection of Rights) Act against the lived experiences of 15 trans community members in Kolkata, identifying significant gaps between legal provisions and substantive access to rights in family, workplace, education, and healthcare.", "url": "https://doi.org/10.1093/jhuman/huac004"}, {"name": "Transgender Solidarity and Gender Out of Place", "meta": "Mayo, Cris. “Transgender Solidarity and Gender Out of Place.” Educational Studies, vol. 60, no. 5, 2024, pp. 483–494.", "desc": "Theorizes 'gender out of place' as a framework for understanding trans students' disruption of normative school spaces, arguing for practices of trans solidarity in educational settings as a counter to legislative erasure.", "url": "https://doi.org/10.1080/00131946.2024.2379042"}, {"name": "Working Within Trans-Affirmative, Anti-Trans, and Cisnormative Storylines", "meta": "McEntarfer, Heather Killelea, and Matthew D. Rice. “Working within Trans-Affirmative, Anti-Trans, and Cisnormative Storylines: The Experiences of Transgender and Non-Binary Teachers.” Teaching and Teacher Education, vol. 135, 2023, p. 104333.", "desc": "Qualitative study using positioning theory to analyze interviews with 33 transgender and non-binary teachers across K–12 school contexts, finding wide variability in support and transphobia and particular marginalization of trans teachers of color and non-binary teachers.", "url": "https://doi.org/10.1016/j.tate.2023.104333"}]}, "cross": {"label": "Cross-Band Resources", "count": "~120 resources · 10 categories", "Recommended Readings": [{"name": "NSTA — Gender Equity in Science Education (Position Statement)", "meta": "National Science Teaching Association. \"Gender Equity in Science Education.\" NSTA Official Position Statements, NSTA, nsta.org/nstas-official-positions.", "desc": "NSTA’s official position statement on gender equity in science education; addresses gender identity, expression, and sexual orientation alongside race, ethnicity, and ability; guidance for designing inclusive K–16 labs and lessons.", "url": "https://www.nsta.org/nstas-official-positions"}, {"name": "sj Miller — Teaching, Affirming, let curSubj = 'math';
let curGrade = 'cross';
let curCat = null;

// ── Subject switcher ─────────────────────────────────────────────────────────
function switchSubject(subj) {
  if (!SUBJECTS[subj]) return;
  curSubj = subj;
  curGrade = SUBJECTS[subj].defaultGrade;
  curCat = null;

  // Update body class for CSS variable switching
  document.body.className = SUBJECTS[subj].bodyClass;

  // Update title
  document.getElementById('subj-title').textContent = SUBJECTS[subj].title;
  document.title = SUBJECTS[subj].title + ' Spotlight Toolkit';

  // Update nav active state
  document.querySelectorAll('.snav-btn[data-subj]').forEach(b => {
    b.classList.toggle('active', b.dataset.subj === subj);
  });

  // Rebuild grade tabs
  buildGradeTabs();

  // Clear search
  document.getElementById('searchInput').value = '';
  document.getElementById('searchCount').textContent = '';
  document.getElementById('searchClear').classList.remove('visible');
  document.getElementById('sidebar').style.display = '';

  render();
}

// ── Grade tabs ───────────────────────────────────────────────────────────────
function buildGradeTabs() {
  const subj = SUBJECTS[curSubj];
  const container = document.getElementById('grade-tabs');
  container.innerHTML = '';
  subj.grades.forEach((g, i) => {
    const btn = document.createElement('button');
    btn.className = 'gtab' + (g === curGrade ? ' active' : '');
    btn.textContent = subj.gradeLabels[g];
    btn.addEventListener('click', () => {
      document.querySelectorAll('.gtab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      curGrade = g;
      curCat = null;
      document.getElementById('searchInput').value = '';
      document.getElementById('searchCount').textContent = '';
      document.getElementById('searchClear').classList.remove('visible');
      document.getElementById('sidebar').style.display = '';
      render();
    });
    container.appendChild(btn);
  });
}

// ── MLA formatter ────────────────────────────────────────────────────────────
function formatMLA(raw){
  if(!raw) return '';
  var s = raw.trim();
  if(s.indexOf('"')!==-1||s.indexOf('\u201c')!==-1||s.indexOf('\u201d')!==-1){
    s=s.replace(/(["\u201d]\.?)\s+([A-Z][^,]+?)(?=,)/g,function(m,q,container){return q+' <i>'+container.trim()+'</i>';});
    return s;
  }
  if(/https?:\/\/|www\.|n\.d\./.test(s)) return s;
  var candidates=[],rx=/\.\s+(?=[A-Z])/g,mc;
  while((mc=rx.exec(s))!==null) candidates.push(mc);
  var authorEnd=-1;
  for(var i=0;i<candidates.length;i++){
    var pos=candidates[i].index;
    var before=s.substring(0,pos);
    var wm=before.match(/\b([\w\-]+)$/);
    if(!wm) continue;
    var wb=wm[1];
    if(wb.length===1&&wb===wb.toUpperCase()) continue;
    if(/^(al|jr|sr|mr|mrs|ms|dr|st|vol|no|pp|inc|corp|ltd|dept|assn|natl|intl|govt)$/i.test(wb)) continue;
    authorEnd=candidates[i].index+candidates[i][0].length;
    break;
  }
  if(authorEnd>0){
    var author=s.substring(0,authorEnd);
    var rest=s.substring(authorEnd);
    var titleEndM=rest.match(/\.\s+/);
    if(titleEndM){
      var title=rest.substring(0,titleEndM.index);
      var after=rest.substring(titleEndM.index);
      var authorClean=author.replace(/[.,\s]/g,'').toLowerCase();
      var titleClean=title.replace(/[.,\s]/g,'').toLowerCase();
      if(titleClean===authorClean) return s;
      if(title.length<4) return s;
      if(/^\d{4}$/.test(title.trim())) return s;
      return author+'<i>'+title+'</i>'+after;
    }
  }
  return s;
}

// ── Card builder ─────────────────────────────────────────────────────────────
function buildCard(e){
  const el=document.createElement('div');
  el.className='card';
  let h='<div class="card-name">'+e.name+'</div>';
  if(e.meta)h+='<div class="card-meta">'+formatMLA(e.meta)+'</div>';
  if(e.desc)h+='<div class="card-desc">'+e.desc+'</div>';
  if(e.url)h+='<a class="card-link" href="'+e.url+'" target="_blank">Visit resource &#8599;</a>';
  el.innerHTML=h;
  return el;
}

// ── Sidebar ──────────────────────────────────────────────────────────────────
function buildSidebar(){
  const sb=document.getElementById('sidebar');
  const d=ALL_DATA[curSubj][curGrade];
  sb.innerHTML='<span class="sb-label">Categories</span>';
  CATS.forEach(cat=>{
    if(!d[cat]||d[cat].length===0)return;
    const btn=document.createElement('button');
    btn.className='sb-btn'+(curCat===cat?' active':'');
    btn.textContent=cat;
    btn.onclick=()=>{curCat=cat;render();};
    sb.appendChild(btn);
  });
  const all=document.createElement('button');
  all.className='sb-btn sb-all'+(!curCat?' active':'');
  all.textContent='Show all categories';
  all.onclick=()=>{curCat=null;render();};
  sb.appendChild(all);
}

// ── Main render ──────────────────────────────────────────────────────────────
function render(){
  const d=ALL_DATA[curSubj][curGrade];
  const subj=SUBJECTS[curSubj];
  buildSidebar();
  const area=document.getElementById('content');
  area.innerHTML='';
  const hdr=document.createElement('div');
  hdr.className='content-hdr';
  hdr.innerHTML='<h2>'+d.label+'</h2><p>'+d.count+'</p>';
  area.appendChild(hdr);
  const allEmpty=CATS.every(cat=>!d[cat]||d[cat].length===0);
  if(allEmpty){
    const msg=document.createElement('div');
    msg.style.cssText='padding:3rem 0;font-size:14px;color:#aaa;font-style:italic';
    msg.textContent='Resources for this section are coming soon.';
    area.appendChild(msg);
    return;
  }
  const toShow=curCat?[curCat]:CATS;
  toShow.forEach(cat=>{
    const entries=d[cat];
    if(!entries||entries.length===0)return;
    const block=document.createElement('div');
    block.className='cat-block';
    block.innerHTML='<div class="cat-title">'+cat+'</div>';
    const grid=document.createElement('div');
    grid.className='grid';
    entries.forEach(e=>grid.appendChild(buildCard(e)));
    block.appendChild(grid);
    area.appendChild(block);
  });
}

// ── Search ───────────────────────────────────────────────────────────────────
function escapeRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function highlight(text,term){
  if(!term) return text;
  const re=new RegExp('('+escapeRe(term)+')','gi');
  return text.replace(re,'<mark>$1</mark>');
}
function matchesQuery(entry,q){
  return [entry.name||'',entry.desc||'',entry.meta||''].join(' ').toLowerCase().includes(q);
}
function buildSearchCard(entry,q,gradeLabel){
  const el=document.createElement('div');
  el.className='card';
  let h='<div class="search-grade-tag">'+gradeLabel+'</div>';
  h+='<div class="card-name">'+highlight(entry.name,q)+'</div>';
  if(entry.meta)h+='<div class="card-meta">'+highlight(formatMLA(entry.meta),q)+'</div>';
  if(entry.desc)h+='<div class="card-desc">'+highlight(entry.desc,q)+'</div>';
  if(entry.url)h+='<a class="card-link" href="'+entry.url+'" target="_blank">Visit resource &#8599;</a>';
  el.innerHTML=h;
  return el;
}
function runSearch(q){
  q=q.trim().toLowerCase();
  const area=document.getElementById('content');
  const sidebar=document.getElementById('sidebar');
  const subj=SUBJECTS[curSubj];
  if(!q){
    sidebar.style.display='';
    document.getElementById('searchClear').classList.remove('visible');
    document.getElementById('searchCount').textContent='';
    render();
    return;
  }
  document.getElementById('searchClear').classList.add('visible');
  sidebar.style.display='none';
  const results=[];
  subj.grades.forEach(grade=>{
    const gdata=ALL_DATA[curSubj][grade];
    CATS.forEach(cat=>{
      const entries=gdata[cat];
      if(!entries||!entries.length)return;
      entries.forEach(entry=>{
        if(matchesQuery(entry,q))results.push({entry,grade,cat});
      });
    });
  });
  area.innerHTML='';
  const hdr=document.createElement('div');
  hdr.className='content-hdr';
  hdr.innerHTML='<h2>Search Results</h2><p>'+results.length+' resource'+(results.length!==1?'s':'')+' matching "'+q+'" across all grade bands</p>';
  area.appendChild(hdr);
  document.getElementById('searchCount').textContent=results.length+' result'+(results.length!==1?'s':'');
  if(!results.length){
    const msg=document.createElement('div');
    msg.className='no-results';
    msg.textContent='No resources matched "'+q+'". Try a different keyword.';
    area.appendChild(msg);
    return;
  }
  const byCat={};
  results.forEach(r=>{if(!byCat[r.cat])byCat[r.cat]=[];byCat[r.cat].push(r);});
  CATS.forEach(cat=>{
    if(!byCat[cat]||!byCat[cat].length)return;
    const block=document.createElement('div');
    block.className='cat-block';
    block.innerHTML='<div class="cat-title">'+cat+' <span style="font-size:10px;color:#aaa">('+byCat[cat].length+')</span></div>';
    const grid=document.createElement('div');
    grid.className='grid';
    byCat[cat].forEach(r=>{
      grid.appendChild(buildSearchCard(r.entry,q,subj.gradeLabels[r.grade]||r.grade));
    });
    block.appendChild(grid);
    area.appendChild(block);
  });
}

let debounceTimer;
document.getElementById('searchInput').addEventListener('input',function(){
  clearTimeout(debounceTimer);
  debounceTimer=setTimeout(()=>runSearch(this.value),220);
});
document.getElementById('searchInput').addEventListener('keydown',function(e){
  if(e.key==='Escape'){this.value='';runSearch('');}
});
document.getElementById('searchClear').addEventListener('click',function(){
  document.getElementById('searchInput').value='';
  runSearch('');
  document.getElementById('searchInput').focus();
});

// ── Init ─────────────────────────────────────────────────────────────────────
(function(){
  const hashSubj = window.location.hash.replace('#','');
  const startSubj = (hashSubj && SUBJECTS[hashSubj]) ? hashSubj : 'math';
  switchSubject(startSubj);
})();
</script>
